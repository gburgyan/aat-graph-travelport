# Held booking base template — creates a PNR without payment/ticketing.
# Slots: trip-search (search + price + addOffer), traveler (1 or 2 travelers).
# createWorkbench runs independently in parallel with search.

intent:
  description: "Book a held flight (no payment, no ticketing)"

execution:
  steps:
    - node: createWorkbench
      description: "Create a reservation workbench (booking session)"

    - slot: trip-search

    - slot: traveler
      dependsOn: [trip-search]

    - node: commitReservation
      dependsOn: [traveler]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}
