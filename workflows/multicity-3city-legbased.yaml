# Multi-city 3-city leg-based booking template.
# Leg-based search: initial search sends both legs with SearchRepresentation=Leg,
# API returns only leg 1 offerings. BuildNext with leg 1 selection returns
# [selected_leg1, leg2_options...]. Reference pricing uses IDs only — no flight
# details needed, which correctly handles connecting flights.

intent:
  description: "Book a 2-leg flight (round-trip, open jaw, or multi-city) using reference-based flow"

execution:
  steps:
    - node: searchFlights2Leg
      description: "Search for multi-city flights (leg-based: returns only leg 1 offerings)"
      values:
        searchRepresentation: Leg

    - node: searchFlightsNextLeg
      id: searchNextLeg2
      description: "BuildNext with leg 1 selection to get leg 2 offerings"
      dependsOn: [searchFlights2Leg]
      selections:
        leg1:
          from: searchFlights2Leg.catalogProductOfferings
          strategy: first
      values:
        catalogProductOfferingsId: {from: searchFlights2Leg.catalogProductOfferingsId}
        offeringId: {fromSelection: leg1.offeringId}
        productId: {fromSelection: leg1.productId}

    - node: priceOfferReference
      description: "Price the selected leg 1 and leg 2 flights using reference identifiers"
      dependsOn: [searchFlights2Leg, searchNextLeg2]
      selections:
        leg1:
          from: searchFlights2Leg.catalogProductOfferings
          strategy: first
        leg2:
          from: searchNextLeg2.catalogProductOfferings
          strategy: index
          index: 1
      values:
        catalogProductOfferingsId: {from: searchNextLeg2.catalogProductOfferingsId}
        offeringId: {fromSelection: leg1.offeringId}
        productIds: {fromSelection: leg1.productIds}
        leg2OfferingId: {fromSelection: leg2.offeringId}
        leg2ProductIds: {fromSelection: leg2.productIds}

    - node: createWorkbench
      dependsOn: [priceOfferReference]

    - node: addOfferReference
      description: "Add multi-city offer to workbench using reference identifiers"
      dependsOn: [createWorkbench, searchFlights2Leg, searchNextLeg2]
      selections:
        leg1:
          from: searchFlights2Leg.catalogProductOfferings
          strategy: first
        leg2:
          from: searchNextLeg2.catalogProductOfferings
          strategy: index
          index: 1
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        catalogProductOfferingsId: {from: searchNextLeg2.catalogProductOfferingsId}
        offeringId: {fromSelection: leg1.offeringId}
        productIds: {fromSelection: leg1.productIds}
        leg2OfferingId: {fromSelection: leg2.offeringId}
        leg2ProductIds: {fromSelection: leg2.productIds}

    - node: addTraveler
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}

    - node: addFormOfPaymentCash
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}

    - node: addPayment
      dependsOn: [addOfferReference, addTraveler, addFormOfPaymentCash, createWorkbench, priceOfferReference]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        amount: {from: priceOfferReference.totalPrice}
        currencyCode: {from: priceOfferReference.currencyCode}
        fopIdentifierValue: {from: addFormOfPaymentCash.fopIdentifierValue}
        offerIdentifierValue: {from: addOfferReference.offerIdentifierValue}
        offerId: {from: priceOfferReference.offerId}
        offerAuthority: {from: addOfferReference.offerAuthority}

    - node: commitReservation
      dependsOn: [addPayment, createWorkbench]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
