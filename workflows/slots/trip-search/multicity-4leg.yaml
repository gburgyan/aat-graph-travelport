# Multi-city 4-leg trip-search slot: leg-based search with 3x BuildNext + reference pricing.

execution:
  steps:
    - node: searchFlights4Leg
      description: "Search for multi-city flights (leg-based: returns only leg 1 offerings)"
      values:
        searchRepresentation: Leg

    - node: searchFlightsNextLeg
      id: searchNextLeg2
      description: "BuildNext with leg 1 selection to get leg 2 offerings"
      dependsOn: [searchFlights4Leg]
      selections:
        leg1:
          from: searchFlights4Leg.catalogProductOfferings
          strategy: first
      values:
        catalogProductOfferingsId: {from: searchFlights4Leg.catalogProductOfferingsId}
        offeringId: {fromSelection: leg1.offeringId}
        productId: {fromSelection: leg1.productId}

    - node: searchFlightsNextLeg
      id: searchNextLeg3
      description: "BuildNext with leg 2 selection to get leg 3 offerings"
      dependsOn: [searchNextLeg2]
      selections:
        leg2:
          from: searchNextLeg2.catalogProductOfferings
          strategy: index
          index: 1
      values:
        catalogProductOfferingsId: {from: searchNextLeg2.catalogProductOfferingsId}
        offeringId: {fromSelection: leg2.offeringId}
        productId: {fromSelection: leg2.productId}

    - node: searchFlightsNextLeg
      id: searchNextLeg4
      description: "BuildNext with leg 3 selection to get leg 4 offerings"
      dependsOn: [searchNextLeg3]
      selections:
        leg3:
          from: searchNextLeg3.catalogProductOfferings
          strategy: index
          index: 2
      values:
        catalogProductOfferingsId: {from: searchNextLeg3.catalogProductOfferingsId}
        offeringId: {fromSelection: leg3.offeringId}
        productId: {fromSelection: leg3.productId}

    - node: priceOfferReference
      id: pricing
      description: "Price the selected leg 1, leg 2, leg 3, and leg 4 flights"
      dependsOn: [searchFlights4Leg, searchNextLeg2, searchNextLeg3, searchNextLeg4]
      selections:
        leg1:
          from: searchFlights4Leg.catalogProductOfferings
          strategy: first
        leg2:
          from: searchNextLeg2.catalogProductOfferings
          strategy: index
          index: 1
        leg3:
          from: searchNextLeg3.catalogProductOfferings
          strategy: index
          index: 2
        leg4:
          from: searchNextLeg4.catalogProductOfferings
          strategy: index
          index: 3
      values:
        catalogProductOfferingsId: {from: searchNextLeg4.catalogProductOfferingsId}
        offeringId: {fromSelection: leg1.offeringId}
        productId: {fromSelection: leg1.productId}
        leg2OfferingId: {fromSelection: leg2.offeringId}
        leg2ProductId: {fromSelection: leg2.productId}
        leg3OfferingId: {fromSelection: leg3.offeringId}
        leg3ProductId: {fromSelection: leg3.productId}
        leg4OfferingId: {fromSelection: leg4.offeringId}
        leg4ProductId: {fromSelection: leg4.productId}

    - node: addOfferReference
      description: "Add multi-city offer to workbench using reference identifiers"
      dependsOn: [priceOfferReference, createWorkbench, searchFlights4Leg, searchNextLeg2, searchNextLeg3, searchNextLeg4]
      selections:
        leg1:
          from: searchFlights4Leg.catalogProductOfferings
          strategy: first
        leg2:
          from: searchNextLeg2.catalogProductOfferings
          strategy: index
          index: 1
        leg3:
          from: searchNextLeg3.catalogProductOfferings
          strategy: index
          index: 2
        leg4:
          from: searchNextLeg4.catalogProductOfferings
          strategy: index
          index: 3
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        catalogProductOfferingsId: {from: searchNextLeg4.catalogProductOfferingsId}
        offeringId: {fromSelection: leg1.offeringId}
        productId: {fromSelection: leg1.productId}
        leg2OfferingId: {fromSelection: leg2.offeringId}
        leg2ProductId: {fromSelection: leg2.productId}
        leg3OfferingId: {fromSelection: leg3.offeringId}
        leg3ProductId: {fromSelection: leg3.productId}
        leg4OfferingId: {fromSelection: leg4.offeringId}
        leg4ProductId: {fromSelection: leg4.productId}
