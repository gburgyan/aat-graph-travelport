# Round-trip trip-search slot: journey-based search + full-payload pricing + addOffer.
# searchFlights returns offerings for BOTH legs when returnDate is provided.
# Two named selections (outbound/inbound) pick different elements from the same array.

execution:
  steps:
    - node: searchFlights
      description: "Search for round-trip flights (journey-based: both legs in one call)"
      values:
        departureDate:
          pool: ["{{today + 7 days}}", "{{today + 8 days}}", "{{today + 9 days}}", "{{today + 10 days}}", "{{today + 14 days}}"]
        returnDate:
          pool: ["{{today + 18 days}}", "{{today + 21 days}}", "{{today + 25 days}}", "{{today + 28 days}}", "{{today + 35 days}}"]

    - node: priceOfferFullPayload
      description: "Price the selected outbound and return flights using full payload"
      dependsOn: [searchFlights]
      selections:
        outbound:
          from: searchFlights.catalogProductOfferings
          strategy: first
        inbound:
          from: searchFlights.catalogProductOfferings
          strategy: index
          index: 1
      values:
        carrier: {fromSelection: outbound.carrier}
        flightNumber: {fromSelection: outbound.flightNumber}
        departureDate: {fromSelection: outbound.departureDate}
        departureTime: {fromSelection: outbound.departureTime}
        arrivalDate: {fromSelection: outbound.arrivalDate}
        arrivalTime: {fromSelection: outbound.arrivalTime}
        origin: {fromSelection: outbound.departure}
        destination: {fromSelection: outbound.arrival}
        classOfService: {fromSelection: outbound.classOfService}
        returnCarrier: {fromSelection: inbound.carrier}
        returnFlightNumber: {fromSelection: inbound.flightNumber}
        returnDepartureDate: {fromSelection: inbound.departureDate}
        returnDepartureTime: {fromSelection: inbound.departureTime}
        returnArrivalDate: {fromSelection: inbound.arrivalDate}
        returnArrivalTime: {fromSelection: inbound.arrivalTime}
        returnOrigin: {fromSelection: inbound.departure}
        returnDestination: {fromSelection: inbound.arrival}
        returnClassOfService: {fromSelection: inbound.classOfService}

    - node: addOfferFullPayload
      description: "Add round-trip offer to workbench using full payload"
      dependsOn: [priceOfferFullPayload, createWorkbench, searchFlights]
      selections:
        outbound:
          from: searchFlights.catalogProductOfferings
          strategy: first
        inbound:
          from: searchFlights.catalogProductOfferings
          strategy: index
          index: 1
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        carrier: {fromSelection: outbound.carrier}
        flightNumber: {fromSelection: outbound.flightNumber}
        departureDate: {fromSelection: outbound.departureDate}
        departureTime: {fromSelection: outbound.departureTime}
        arrivalDate: {fromSelection: outbound.arrivalDate}
        arrivalTime: {fromSelection: outbound.arrivalTime}
        origin: {fromSelection: outbound.departure}
        destination: {fromSelection: outbound.arrival}
        classOfService: {fromSelection: outbound.classOfService}
        returnCarrier: {fromSelection: inbound.carrier}
        returnFlightNumber: {fromSelection: inbound.flightNumber}
        returnDepartureDate: {fromSelection: inbound.departureDate}
        returnDepartureTime: {fromSelection: inbound.departureTime}
        returnArrivalDate: {fromSelection: inbound.arrivalDate}
        returnArrivalTime: {fromSelection: inbound.arrivalTime}
        returnOrigin: {fromSelection: inbound.departure}
        returnDestination: {fromSelection: inbound.arrival}
        returnClassOfService: {fromSelection: inbound.classOfService}
