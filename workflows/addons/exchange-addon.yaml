# Exchange addon.
# Attaches after commitReservation to exchange tickets on the booking.
# Requires the booking to have been ticketed.

intent:
  description: "Exchange tickets on an existing booking (post-commit addon)"

execution:
  steps:
    - node: getExchangeEligibility
      description: "Check if tickets on the reservation are eligible for exchange"
      values:
        locator: AUTOWIRE

    - node: createWorkbenchFromLocator
      description: "Open workbench from the existing reservation"
      dependsOn: [getExchangeEligibility]
      values:
        locator: AUTOWIRE

    - node: searchExchange
      description: "Search for exchange flights"
      dependsOn: [createWorkbenchFromLocator]
      values:
        reservationIdentifier: {from: createWorkbenchFromLocator.workbenchId}
        offerId: {from: createWorkbenchFromLocator.offerId}
        productId: {from: createWorkbenchFromLocator.productId}
        origin: {fromInput: searchFlights.origin}
        destination: {fromInput: searchFlights.destination}
        departureDate: {fromInput: searchFlights.departureDate}

    - node: addExchangeOffer
      description: "Add the selected exchange offer to the workbench"
      dependsOn: [searchExchange, createWorkbenchFromLocator]
      selections:
        exchangeOffering:
          from: searchExchange.exchangeOfferings
          strategy: first
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}
        catalogOfferingsIdentifierValue: {from: searchExchange.catalogOfferingsIdentifierValue}
        catalogOfferingIdentifierValue: {fromSelection: exchangeOffering.offeringIdentifierValue}

    - node: addFormOfPaymentForfeit
      dependsOn: [createWorkbenchFromLocator]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}
        formOfPaymentId: {from: createWorkbenchFromLocator.formOfPaymentId}

    - node: addPayment
      dependsOn: [addExchangeOffer, addFormOfPaymentForfeit]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}
        totalPrice: {from: addExchangeOffer.totalPrice}
        currencyCode: {from: addExchangeOffer.currencyCode}
        fopIdentifierValue: {from: addFormOfPaymentForfeit.fopIdentifierValue}
        offerIdentifierValue: {from: addExchangeOffer.offerIdentifierValue}
        offerId: {from: addExchangeOffer.offerId}
        offerAuthority: {from: addExchangeOffer.offerAuthority}

    - node: addDocumentOverrides
      description: "Add document overrides for exchange ticketing"
      dependsOn: [addExchangeOffer, createWorkbenchFromLocator]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}

    - node: commitExchangeTicket
      dependsOn: [addPayment, addDocumentOverrides]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
