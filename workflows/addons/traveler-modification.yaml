# Traveler modification sub-workflow template.
# Two-step traveler update: discover updatable fields, then apply changes.
# The caller provides workbenchId, travelerIdentifierValue, and updateValue.

intent:
  description: "Discover updatable traveler fields and apply a change (email update)"

execution:
  steps:
    - node: getUpdatableTravelerItems
      description: "Discover which traveler fields can be modified"
      values:
        workbenchId: AUTOWIRE
        travelerIdentifierValue: AUTOWIRE

    - node: updateTraveler
      description: "Apply the traveler modification (update email)"
      dependsOn: [getUpdatableTravelerItems]
      assertions:
        mechanical:
          - type: status
            expect: 204
      selections:
        item:
          from: getUpdatableTravelerItems.updatableItems
          strategy: first
      values:
        workbenchId: AUTOWIRE
        updatableItemsIdentifier: {from: getUpdatableTravelerItems.updatableItemsIdentifier}
        updatableItemId: {fromSelection: item.updatableItemId}
