# Ancillary booking sub-workflow template.
# Search and add ancillary services (bags, meals, etc.) within an existing workbench.
# The caller provides workbenchId, offerIdentifierValue, and travelerRefId.

intent:
  description: "Search for and add ancillary services within an existing workbench"

execution:
  steps:
    - node: searchAncillaries
      description: "Search for available ancillary services"
      values:
        workbenchId: AUTOWIRE
        offerIdentifierValue: AUTOWIRE

    - node: addAncillaryOffer
      description: "Add the selected ancillary offer to the workbench"
      dependsOn: [searchAncillaries]
      selections:
        ancillary:
          from: searchAncillaries.ancillaryOfferings
          strategy: first
      values:
        workbenchId: AUTOWIRE
        catalogOfferingsIdentifierValue: {from: searchAncillaries.catalogOfferingsIdentifierValue}
        catalogOfferingsId: {from: searchAncillaries.catalogOfferingsId}
        ancillaryOfferingId: {fromSelection: ancillary.ancillaryId}
        ancillaryProductId: {fromSelection: ancillary.ancillaryProductId}
        travelerRefId: AUTOWIRE
