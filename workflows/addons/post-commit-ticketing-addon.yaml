# Post-commit ticketing addon.
# Attaches after commitReservation to issue tickets for a held booking.
# Opens a workbench from the PNR, adds FOP and payment, then commits with ticketing.

intent:
  description: "Issue tickets for a held booking (post-commit addon)"

execution:
  steps:
    - node: createWorkbenchFromLocator
      description: "Open workbench from the held booking PNR"
      values:
        locator: AUTOWIRE

    - node: addFormOfPaymentCash
      dependsOn: [createWorkbenchFromLocator]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}

    - node: addPayment
      dependsOn: [addFormOfPaymentCash, createWorkbenchFromLocator]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}
        totalPrice: {pool: [50.00, 100.00, 150.00, 250.00, 500.00]}
        currencyCode: {pool: [USD, EUR, GBP, CAD, AUD]}
        fopIdentifierValue: {from: addFormOfPaymentCash.fopIdentifierValue}
        offerIdentifierValue: {from: createWorkbenchFromLocator.offerIdentifierValue}
        offerId: {from: createWorkbenchFromLocator.offerId}
        offerAuthority: {from: createWorkbenchFromLocator.offerAuthority}

    - node: commitTicket
      dependsOn: [addPayment, createWorkbenchFromLocator]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}

