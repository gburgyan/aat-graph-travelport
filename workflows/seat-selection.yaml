# Seat selection sub-workflow template.
# Searches the seat map using pricing identifiers and adds a seat offer.
# The caller provides offerListIdentifier, offerId, productId (from pricing),
# workbenchId, and travelerIdentifierValue. seatAssignment comes from the seat map.

intent:
  description: "Search seat map and assign a seat within an existing workbench"

execution:
  steps:
    - node: searchSeatMap
      description: "Request seat availability for the flight segment"
      values:
        offerListIdentifier: AUTOWIRE
        offerId: AUTOWIRE
        productId: AUTOWIRE

    - node: addSeatOffer
      description: "Add the selected seat to the workbench"
      dependsOn: [searchSeatMap]
      selections:
        seat:
          from: searchSeatMap.seatOfferings
          strategy: first
      values:
        workbenchId: AUTOWIRE
        catalogOfferingsIdentifierValue: {from: searchSeatMap.catalogOfferingsIdentifierValue}
        seatOfferingIdentifierValue: {fromSelection: seat.seatIdentifierValue}
        travelerIdentifierValue: AUTOWIRE
        seatAssignment: {fromSelection: seat.seatAssignment}
