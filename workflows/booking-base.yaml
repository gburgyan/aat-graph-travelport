# Booking base template with slot markers.
# Slots: trip-search (search + price + addOffer), traveler (1 or 2 travelers), payment (form of payment).
# createWorkbench runs after pricing completes.

intent:
  description: "Book a flight"

execution:
  steps:
    - slot: trip-search

    - node: createWorkbench
      description: "Create a reservation workbench (booking session)"
      dependsOn: [pricing]

    - slot: traveler
      dependsOn: [trip-search, createWorkbench]

    - slot: payment
      dependsOn: [trip-search]

    - node: addPayment
      dependsOn: [trip-search, payment, traveler]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        totalPrice: AUTOWIRE
        currencyCode: AUTOWIRE
        fopIdentifierValue: AUTOWIRE
        offerIdentifierValue: AUTOWIRE
        offerId: AUTOWIRE
        offerAuthority: AUTOWIRE

    - node: commitReservation
      dependsOn: [addPayment]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}
