# Special services addon.
# Add special service requests (wheelchair, meal preference, etc.) within an existing workbench.

intent:
  description: "Add special service requests to the reservation"

execution:
  steps:
    - node: addSpecialService
      description: "Add the special service request"
      values:
        workbenchId: AUTOWIRE
        ssrCode: {pool: [WCHR, WCHS, WCHC]}
        text: {pool: ["Wheelchair assistance needed", "Steps assistance required", "Wheelchair to cabin seat"]}
