# Document overrides addon.
# Add document overrides (commissions, restrictions, tour codes) within an existing workbench.

intent:
  description: "Add document overrides to the reservation"

execution:
  steps:
    - node: addDocumentOverrides
      description: "Add document overrides"
      values:
        workbenchId: AUTOWIRE
        commissionAmount: {pool: [0, 5, 10, 15, 25]}
        commissionCurrencyCode: {pool: [USD, EUR, GBP, CAD, AUD]}
