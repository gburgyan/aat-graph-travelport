# One-way full-payload booking template.
# Search for flights, price using full payload, and book with workbench flow.
# The LLM fills origin, destination, dates, and traveler details.

intent:
  description: "Book a one-way flight using full-payload flow"

execution:
  steps:
    - node: searchFlights
      description: "Search for one-way flights"
      values:
        origin: {pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]}
        destination:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != origin"
        departureDate:
          pool: ["{{today + 7 days}}", "{{today + 10 days}}", "{{today + 14 days}}", "{{today + 21 days}}", "{{today + 30 days}}"]

    - node: priceOfferFullPayload
      description: "Price the selected flight using full payload"
      dependsOn: [searchFlights]
      selections:
        offering:
          from: searchFlights.catalogProductOfferings
          strategy: first
      values:
        carrier: {fromSelection: offering.carrier}
        flightNumber: {fromSelection: offering.flightNumber}
        departureDate: {fromSelection: offering.departureDate}
        departureTime: {fromSelection: offering.departureTime}
        arrivalDate: {fromSelection: offering.arrivalDate}
        arrivalTime: {fromSelection: offering.arrivalTime}
        origin: {fromSelection: offering.departure}
        destination: {fromSelection: offering.arrival}
        classOfService: {fromSelection: offering.classOfService}

    - node: createWorkbench
      dependsOn: [priceOfferFullPayload]

    - node: addOfferFullPayload
      description: "Add the priced offer to the workbench"
      dependsOn: [createWorkbench, searchFlights]
      selections:
        offering:
          from: searchFlights.catalogProductOfferings
          strategy: first
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        carrier: {fromSelection: offering.carrier}
        flightNumber: {fromSelection: offering.flightNumber}
        departureDate: {fromSelection: offering.departureDate}
        departureTime: {fromSelection: offering.departureTime}
        arrivalDate: {fromSelection: offering.arrivalDate}
        arrivalTime: {fromSelection: offering.arrivalTime}
        origin: {fromSelection: offering.departure}
        destination: {fromSelection: offering.arrival}

    - node: addTraveler
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        givenName: {pool: [James, Maria, Robert, Sarah, David, Emily, Michael, Ana, William, Sofia]}
        surname: {pool: [Smith, Johnson, Garcia, Williams, Martinez, Brown, Lee, Wilson, Anderson, Taylor]}
        birthDate: {pool: ["1985-03-15", "1990-07-22", "1978-11-08", "1995-01-30", "1982-06-17"]}
        gender: {pool: [Male, Female]}

    - node: addFormOfPaymentCash
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}

    - node: addPayment
      dependsOn: [addOfferFullPayload, addTraveler, addFormOfPaymentCash, createWorkbench, priceOfferFullPayload]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        amount: {from: priceOfferFullPayload.totalPrice}
        currencyCode: {from: priceOfferFullPayload.currencyCode}
        fopIdentifierValue: {from: addFormOfPaymentCash.fopIdentifierValue}
        offerIdentifierValue: {from: addOfferFullPayload.offerIdentifierValue}
        offerId: {from: priceOfferFullPayload.offerId}
        offerAuthority: {from: addOfferFullPayload.offerAuthority}

    - node: commitReservation
      dependsOn: [addPayment, createWorkbench]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
