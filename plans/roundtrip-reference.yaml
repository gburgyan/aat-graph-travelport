# Round-trip reference-based booking template.
# Journey-based: searchFlights returns both legs when returnDate is provided.
# Two named selections (outbound/inbound) pick different elements from the
# same array based on departure airport.

intent:
  description: "Book a round-trip flight using reference-based (identifier) flow"

execution:
  steps:
    - node: searchFlights
      description: "Search for round-trip flights"
      values:
        origin: DEN
        destination: SFO
        departureDate: "{{today + 14 days}}"
        returnDate: "{{today + 21 days}}"

    - node: priceOfferReference
      description: "Price outbound and return using reference identifiers"
      dependsOn: [searchFlights]
      selections:
        outbound:
          from: searchFlights.catalogProductOfferings
          strategy: match
          filter: "departure == 'DEN'"
        inbound:
          from: searchFlights.catalogProductOfferings
          strategy: match
          filter: "departure == 'SFO'"
      values:
        catalogProductOfferingsId: {from: searchFlights.catalogProductOfferingsId}
        offeringId: {fromSelection: outbound.offeringId}
        productIds: {fromSelection: outbound.productIds}
        returnOfferingId: {fromSelection: inbound.offeringId}
        returnProductIds: {fromSelection: inbound.productIds}

    - node: createWorkbench
      dependsOn: [priceOfferReference]

    - node: addOfferReference
      description: "Add round-trip offer to workbench using reference identifiers"
      dependsOn: [createWorkbench, searchFlights]
      selections:
        outbound:
          from: searchFlights.catalogProductOfferings
          strategy: match
          filter: "departure == 'DEN'"
        inbound:
          from: searchFlights.catalogProductOfferings
          strategy: match
          filter: "departure == 'SFO'"
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        catalogProductOfferingsId: {from: searchFlights.catalogProductOfferingsId}
        offeringId: {fromSelection: outbound.offeringId}
        productIds: {fromSelection: outbound.productIds}
        returnOfferingId: {fromSelection: inbound.offeringId}
        returnProductIds: {fromSelection: inbound.productIds}

    - node: addTraveler
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        givenName: Test
        surname: Traveler
        birthDate: "1990-01-15"
        gender: Male

    - node: addFormOfPaymentCash
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}

    - node: addPayment
      dependsOn: [addOfferReference, addTraveler, addFormOfPaymentCash, createWorkbench, priceOfferReference]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        amount: {from: priceOfferReference.totalPrice}
        currencyCode: {from: priceOfferReference.currencyCode}
        offerIdentifierValue: {from: addOfferReference.offerIdentifierValue}
        offerAuthority: {from: addOfferReference.offerAuthority}

    - node: commitReservation
      dependsOn: [addPayment, createWorkbench]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
