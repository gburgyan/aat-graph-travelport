metadata:
    created: 2026-02-21T00:14:51.54378-06:00
    prompt: book a two leg trip
    graphVersion: 1.0.0
intent:
    description: Book a 2-leg flight (round-trip, open jaw, or multi-city) using reference-based flow
execution:
    steps:
        - node: searchFlights2Leg
          description: Search for a two-leg (multi-city) flight itinerary using the workflow defaults and randomized pool inputs.
          values:
            searchRepresentation: Leg
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - id: searchNextLeg2
          node: searchFlightsNextLeg
          dependsOn:
            - searchFlights2Leg
          description: Select an offer for leg 1 and retrieve compatible offers for leg 2.
          selections:
            leg1:
                from: searchFlights2Leg.catalogProductOfferings
                strategy: first
          values:
            catalogProductOfferingsId:
                from: searchFlights2Leg.catalogProductOfferingsId
            offeringId:
                fromSelection: leg1.offeringId
            productId:
                fromSelection: leg1.productId
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - node: priceOfferReference
          dependsOn:
            - searchFlights2Leg
            - searchNextLeg2
          description: Build price references for the selected leg 1 and leg 2 offers to enable pricing/booking.
          selections:
            leg1:
                from: searchFlights2Leg.catalogProductOfferings
                strategy: first
            leg2:
                from: searchNextLeg2.catalogProductOfferings
                strategy: index
                index: 1
          values:
            catalogProductOfferingsId:
                from: searchNextLeg2.catalogProductOfferingsId
            leg2OfferingId:
                fromSelection: leg2.offeringId
            leg2ProductIds:
                fromSelection: leg2.productIds
            offeringId:
                fromSelection: leg1.offeringId
            productIds:
                fromSelection: leg1.productIds
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - node: createWorkbench
          dependsOn:
            - priceOfferReference
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - node: addOfferReference
          dependsOn:
            - createWorkbench
            - priceOfferReference
            - searchFlights2Leg
            - searchNextLeg2
          description: Add the selected leg 1 and leg 2 offers to the booking cart/reference for checkout.
          selections:
            leg1:
                from: searchFlights2Leg.catalogProductOfferings
                strategy: first
            leg2:
                from: searchNextLeg2.catalogProductOfferings
                strategy: index
                index: 1
          values:
            catalogProductOfferingsId:
                from: searchNextLeg2.catalogProductOfferingsId
            leg2OfferingId:
                fromSelection: leg2.offeringId
            leg2ProductIds:
                fromSelection: leg2.productIds
            offeringId:
                fromSelection: leg1.offeringId
            productIds:
                fromSelection: leg1.productIds
            workbenchId:
                from: createWorkbench.workbenchId
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - node: addTraveler
          dependsOn:
            - createWorkbench
          values:
            workbenchId:
                from: createWorkbench.workbenchId
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - node: addFormOfPaymentCash
          dependsOn:
            - createWorkbench
          values:
            workbenchId:
                from: createWorkbench.workbenchId
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - node: addPayment
          dependsOn:
            - addFormOfPaymentCash
            - addOfferReference
            - addTraveler
            - createWorkbench
            - priceOfferReference
          values:
            amount:
                from: priceOfferReference.totalPrice
            currencyCode:
                from: priceOfferReference.currencyCode
            fopIdentifierValue:
                from: addFormOfPaymentCash.fopIdentifierValue
            offerAuthority:
                from: addOfferReference.offerAuthority
            offerId:
                from: priceOfferReference.offerId
            offerIdentifierValue:
                from: addOfferReference.offerIdentifierValue
            workbenchId:
                from: createWorkbench.workbenchId
          assertions:
            mechanical:
                - type: status
                  expect: 200
        - node: commitReservation
          dependsOn:
            - addOfferReference
            - addPayment
            - addTraveler
            - createWorkbench
          isGoal: true
          values:
            workbenchId:
                from: createWorkbench.workbenchId
          assertions:
            mechanical:
                - type: status
                  expect: 200
    cleanup:
        - node: ignoreWorkbench
          runOn: always
