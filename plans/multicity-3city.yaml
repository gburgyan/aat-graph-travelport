# Multi-city 3-city booking template.
# Journey-based search with two legs in a single search call.
# Two named selections (leg1/leg2) pick different elements from the
# same array. The LLM fills origins, destinations, dates, and traveler details.

intent:
  description: "Book a multi-city (including round-trip) flight with two legs"

execution:
  steps:
    - node: searchFlights2Leg
      description: "Search for multi-city flights"
      values:
        leg1Origin: {pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]}
        leg1Destination:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg1Origin"
        leg1DepartureDate:
          pool: ["{{today + 7 days}}", "{{today + 8 days}}", "{{today + 9 days}}", "{{today + 10 days}}", "{{today + 14 days}}"]
        leg2Origin: {fromResolved: leg1Destination}
        leg2Destination:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg2Origin"
        leg2DepartureDate:
          pool: ["{{today + 20 days}}", "{{today + 21 days}}", "{{today + 22 days}}", "{{today + 23 days}}", "{{today + 28 days}}"]

    - node: priceOfferFullPayload
      description: "Price the selected leg 1 and leg 2 flights"
      dependsOn: [searchFlights2Leg]
      selections:
        leg1:
          from: searchFlights2Leg.catalogProductOfferings
          strategy: first
        leg2:
          from: searchFlights2Leg.catalogProductOfferings
          strategy: index
          index: 1
      values:
        carrier: {fromSelection: leg1.carrier}
        flightNumber: {fromSelection: leg1.flightNumber}
        departureDate: {fromSelection: leg1.departureDate}
        departureTime: {fromSelection: leg1.departureTime}
        arrivalDate: {fromSelection: leg1.arrivalDate}
        arrivalTime: {fromSelection: leg1.arrivalTime}
        origin: {fromSelection: leg1.departure}
        destination: {fromSelection: leg1.arrival}
        classOfService: {fromSelection: leg1.classOfService}
        leg2Carrier: {fromSelection: leg2.carrier}
        leg2FlightNumber: {fromSelection: leg2.flightNumber}
        leg2DepartureDate: {fromSelection: leg2.departureDate}
        leg2DepartureTime: {fromSelection: leg2.departureTime}
        leg2ArrivalDate: {fromSelection: leg2.arrivalDate}
        leg2ArrivalTime: {fromSelection: leg2.arrivalTime}
        leg2Origin: {fromSelection: leg2.departure}
        leg2Destination: {fromSelection: leg2.arrival}
        leg2ClassOfService: {fromSelection: leg2.classOfService}

    - node: createWorkbench
      dependsOn: [priceOfferFullPayload]

    - node: addOfferFullPayload
      description: "Add multi-city offer to workbench"
      dependsOn: [createWorkbench, searchFlights2Leg]
      selections:
        leg1:
          from: searchFlights2Leg.catalogProductOfferings
          strategy: first
        leg2:
          from: searchFlights2Leg.catalogProductOfferings
          strategy: index
          index: 1
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        carrier: {fromSelection: leg1.carrier}
        flightNumber: {fromSelection: leg1.flightNumber}
        departureDate: {fromSelection: leg1.departureDate}
        departureTime: {fromSelection: leg1.departureTime}
        arrivalDate: {fromSelection: leg1.arrivalDate}
        arrivalTime: {fromSelection: leg1.arrivalTime}
        origin: {fromSelection: leg1.departure}
        destination: {fromSelection: leg1.arrival}
        classOfService: {fromSelection: leg1.classOfService}
        leg2Carrier: {fromSelection: leg2.carrier}
        leg2FlightNumber: {fromSelection: leg2.flightNumber}
        leg2DepartureDate: {fromSelection: leg2.departureDate}
        leg2DepartureTime: {fromSelection: leg2.departureTime}
        leg2ArrivalDate: {fromSelection: leg2.arrivalDate}
        leg2ArrivalTime: {fromSelection: leg2.arrivalTime}
        leg2Origin: {fromSelection: leg2.departure}
        leg2Destination: {fromSelection: leg2.arrival}
        leg2ClassOfService: {fromSelection: leg2.classOfService}

    - node: addTraveler
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        givenName: {pool: [James, Maria, Robert, Sarah, David, Emily, Michael, Ana, William, Sofia]}
        surname: {pool: [Smith, Johnson, Garcia, Williams, Martinez, Brown, Lee, Wilson, Anderson, Taylor]}
        birthDate: {pool: ["1985-03-15", "1990-07-22", "1978-11-08", "1995-01-30", "1982-06-17"]}
        gender: {pool: [Male, Female]}

    - node: addFormOfPaymentCash
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}

    - node: addPayment
      dependsOn: [addOfferFullPayload, addTraveler, addFormOfPaymentCash, createWorkbench, priceOfferFullPayload]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        amount: {from: priceOfferFullPayload.totalPrice}
        currencyCode: {from: priceOfferFullPayload.currencyCode}
        fopIdentifierValue: {from: addFormOfPaymentCash.fopIdentifierValue}
        offerIdentifierValue: {from: addOfferFullPayload.offerIdentifierValue}
        offerId: {from: priceOfferFullPayload.offerId}
        offerAuthority: {from: addOfferFullPayload.offerAuthority}

    - node: commitReservation
      dependsOn: [addPayment, createWorkbench]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
