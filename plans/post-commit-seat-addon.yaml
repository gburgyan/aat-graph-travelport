# Post-commit seat selection addon.
# Attaches after commitReservation to add seat selection to an existing booking.
# Uses the PNR locator from the base booking to open a post-commit workbench.

intent:
  description: "Add seat selection to an existing booking (post-commit addon)"

execution:
  steps:
    - node: createWorkbenchFromLocator
      description: "Open workbench from the committed booking PNR"
      values:
        locator: AUTOWIRE

    - node: retrieveWorkbench
      description: "Retrieve workbench to get offer and product identifiers"
      dependsOn: [createWorkbenchFromLocator]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}

    - node: searchSeatMapFromWorkbench
      description: "Search seat availability from the reservation workbench"
      dependsOn: [createWorkbenchFromLocator, retrieveWorkbench]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}
        offerIdentifierValue: {from: createWorkbenchFromLocator.offerIdentifierValue}
        productIdentifierValue: {from: retrieveWorkbench.wbProductIdentifierValue}

    - node: addSeatOffer
      description: "Add the selected seat to the workbench"
      dependsOn: [searchSeatMapFromWorkbench, createWorkbenchFromLocator]
      selections:
        seat:
          from: searchSeatMapFromWorkbench.seatOfferings
          strategy: first
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}
        catalogOfferingsIdentifierValue: {from: searchSeatMapFromWorkbench.catalogOfferingsIdentifierValue}
        seatOfferingIdentifierValue: {fromSelection: seat.seatIdentifierValue}
        seatAssignment: {fromSelection: seat.seatAssignment}

    - node: commitReservation
      id: commitSeat
      description: "Commit the seat addition"
      dependsOn: [addSeatOffer, createWorkbenchFromLocator]
      values:
        workbenchId: {from: createWorkbenchFromLocator.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
