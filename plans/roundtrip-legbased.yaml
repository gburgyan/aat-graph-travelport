# Round-trip flight booking using leg-based search.
# First search returns outbound flights, then searchFlightsNextLeg returns
# return flights based on the selected outbound offering.

intent:
  description: "Book a round-trip flight MEL→SYD→MEL using leg-based search"

execution:
  steps:
    - node: searchFlights
      description: "Search for outbound flights MEL→SYD"
      values:
        origin: MEL
        destination: SYD
        departureDate: "{{today + 14 days}}"

    - node: searchFlightsNextLeg
      description: "Search for return flights SYD→MEL based on selected outbound"
      dependsOn: [searchFlights]
      selections:
        outbound:
          from: searchFlights.catalogProductOfferings
          strategy: first
      values:
        catalogProductOfferingsId: {from: searchFlights.catalogProductOfferingsId}
        offeringId: {fromSelection: outbound.offeringId}
        productId: {fromSelection: outbound.productId}

    - node: priceOfferFullPayload
      description: "Price both outbound and return flights together"
      dependsOn: [searchFlights, searchFlightsNextLeg]
      selections:
        outbound:
          from: searchFlights.catalogProductOfferings
          strategy: first
        inbound:
          from: searchFlightsNextLeg.catalogProductOfferings
          strategy: first
      values:
        carrier: {fromSelection: outbound.carrier}
        flightNumber: {fromSelection: outbound.flightNumber}
        departureDate: {fromSelection: outbound.departureDate}
        departureTime: {fromSelection: outbound.departureTime}
        arrivalDate: {fromSelection: outbound.arrivalDate}
        arrivalTime: {fromSelection: outbound.arrivalTime}
        origin: MEL
        destination: SYD
        classOfService: {fromSelection: outbound.classOfService}
        returnCarrier: {fromSelection: inbound.carrier}
        returnFlightNumber: {fromSelection: inbound.flightNumber}
        returnDepartureDate: {fromSelection: inbound.departureDate}
        returnDepartureTime: {fromSelection: inbound.departureTime}
        returnArrivalDate: {fromSelection: inbound.arrivalDate}
        returnArrivalTime: {fromSelection: inbound.arrivalTime}
        returnOrigin: SYD
        returnDestination: MEL
        returnClassOfService: {fromSelection: inbound.classOfService}

    - node: createWorkbench
      dependsOn: [priceOfferFullPayload]

    - node: addOfferFullPayload
      description: "Add round-trip offer to workbench"
      dependsOn: [createWorkbench, searchFlights, searchFlightsNextLeg]
      selections:
        outbound:
          from: searchFlights.catalogProductOfferings
          strategy: first
        inbound:
          from: searchFlightsNextLeg.catalogProductOfferings
          strategy: first
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        carrier: {fromSelection: outbound.carrier}
        flightNumber: {fromSelection: outbound.flightNumber}
        departureDate: {fromSelection: outbound.departureDate}
        departureTime: {fromSelection: outbound.departureTime}
        arrivalDate: {fromSelection: outbound.arrivalDate}
        arrivalTime: {fromSelection: outbound.arrivalTime}
        origin: MEL
        destination: SYD
        returnCarrier: {fromSelection: inbound.carrier}
        returnFlightNumber: {fromSelection: inbound.flightNumber}
        returnDepartureDate: {fromSelection: inbound.departureDate}
        returnDepartureTime: {fromSelection: inbound.departureTime}
        returnArrivalDate: {fromSelection: inbound.arrivalDate}
        returnArrivalTime: {fromSelection: inbound.arrivalTime}
        returnOrigin: SYD
        returnDestination: MEL

    - node: addTraveler
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        givenName: Test
        surname: Traveler
        birthDate: "1990-01-15"
        gender: Male

    - node: addFormOfPaymentCash
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}

    - node: addPayment
      dependsOn: [addOfferFullPayload, addTraveler, addFormOfPaymentCash, createWorkbench, priceOfferFullPayload]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        amount: {from: priceOfferFullPayload.totalPrice}
        currencyCode: {from: priceOfferFullPayload.currencyCode}
        offerIdentifierValue: {from: addOfferFullPayload.offerIdentifierValue}
        offerAuthority: {from: addOfferFullPayload.offerAuthority}

    - node: commitReservation
      dependsOn: [addPayment, createWorkbench]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
