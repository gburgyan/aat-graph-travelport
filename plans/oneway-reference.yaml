# One-way reference-based booking template.
# Search for flights, price using identifier references, and book with workbench flow.
# Uses priceOfferReference + addOfferReference instead of full-payload equivalents.

intent:
  description: "Book a one-way flight using reference-based (identifier) flow"

execution:
  steps:
    - node: searchFlights
      description: "Search for one-way flights"
      values:
        origin: {pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]}
        destination:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != origin"
        departureDate:
          pool: ["{{today + 7 days}}", "{{today + 10 days}}", "{{today + 14 days}}", "{{today + 21 days}}", "{{today + 30 days}}"]

    - node: priceOfferReference
      description: "Price the selected flight using reference identifiers"
      dependsOn: [searchFlights]
      selections:
        offering:
          from: searchFlights.catalogProductOfferings
          strategy: first
      values:
        catalogProductOfferingsId: {from: searchFlights.catalogProductOfferingsId}
        offeringId: {fromSelection: offering.offeringId}
        productIds: {fromSelection: offering.productIds}

    - node: createWorkbench
      dependsOn: [priceOfferReference]

    - node: addOfferReference
      description: "Add the priced offer to the workbench using reference identifiers"
      dependsOn: [createWorkbench, searchFlights]
      selections:
        offering:
          from: searchFlights.catalogProductOfferings
          strategy: first
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        catalogProductOfferingsId: {from: searchFlights.catalogProductOfferingsId}
        offeringId: {fromSelection: offering.offeringId}
        productIds: {fromSelection: offering.productIds}

    - node: addTraveler
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        givenName: {pool: [James, Maria, Robert, Sarah, David, Emily, Michael, Ana, William, Sofia]}
        surname: {pool: [Smith, Johnson, Garcia, Williams, Martinez, Brown, Lee, Wilson, Anderson, Taylor]}
        birthDate: {pool: ["1985-03-15", "1990-07-22", "1978-11-08", "1995-01-30", "1982-06-17"]}
        gender: {pool: [Male, Female]}

    - node: addFormOfPaymentCash
      dependsOn: [createWorkbench]
      values:
        workbenchId: {from: createWorkbench.workbenchId}

    - node: addPayment
      dependsOn: [addOfferReference, addTraveler, addFormOfPaymentCash, createWorkbench, priceOfferReference]
      values:
        workbenchId: {from: createWorkbench.workbenchId}
        amount: {from: priceOfferReference.totalPrice}
        currencyCode: {from: priceOfferReference.currencyCode}
        fopIdentifierValue: {from: addFormOfPaymentCash.fopIdentifierValue}
        offerIdentifierValue: {from: addOfferReference.offerIdentifierValue}
        offerId: {from: priceOfferReference.offerId}
        offerAuthority: {from: addOfferReference.offerAuthority}

    - node: commitReservation
      dependsOn: [addPayment, createWorkbench]
      isGoal: true
      values:
        workbenchId: {from: createWorkbench.workbenchId}

  cleanup:
    - node: ignoreWorkbench
      runOn: always
