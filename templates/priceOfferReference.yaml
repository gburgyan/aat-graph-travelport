adapter: priceOfferReference
protocol: http

request:
  method: POST
  path: /11/air/price/offers/buildfromcatalogproductofferings
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromCatalogProductOfferings",
      "BuildFromCatalogProductOfferingsRequest": {
        "@type": "BuildFromCatalogProductOfferingsRequestAir",
        "CatalogProductOfferingsIdentifier": {
          "Identifier": {
            "value": "{{catalogProductOfferingsId}}"
          }
        },
        "CatalogProductOfferingSelection": [
          {
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{offeringId}}"
              }
            },
            "ProductIdentifier": [
              {{#productIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/productIds}}
            ]
          }
        ]
      }
    }

response:
  extract:
    offerId: "OfferListResponse.OfferID.0.id"
    totalPrice: "OfferListResponse.OfferID.0.Price.TotalPrice"
    currencyCode: "OfferListResponse.OfferID.0.Price.CurrencyCode.value"
