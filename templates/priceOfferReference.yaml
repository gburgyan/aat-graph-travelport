adapter: priceOfferReference
protocol: http

request:
  method: POST
  path: /11/air/price/offers/buildfromcatalogproductofferings
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromCatalogProductOfferings",
      "BuildFromCatalogProductOfferingsRequest": {
        "@type": "BuildFromCatalogProductOfferingsRequestAir",
        "CatalogProductOfferingsIdentifier": {
          "Identifier": {
            "value": "{{catalogProductOfferingsId}}"
          }
        },
        "CatalogProductOfferingSelection": [
          {
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{offeringId}}"
              }
            },
            "ProductIdentifier": [
              {"Identifier": {"value": "{{productId}}"}}
            ]
          }
          {{?returnOfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{returnOfferingId}}"
              }
            },
            "ProductIdentifier": [
              {"Identifier": {"value": "{{returnProductId}}"}}
            ]
          }{{/returnOfferingId}}
          {{?leg2OfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{leg2OfferingId}}"
              }
            },
            "ProductIdentifier": [
              {"Identifier": {"value": "{{leg2ProductId}}"}}
            ]
          }{{/leg2OfferingId}}
          {{?leg3OfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{leg3OfferingId}}"
              }
            },
            "ProductIdentifier": [
              {"Identifier": {"value": "{{leg3ProductId}}"}}
            ]
          }{{/leg3OfferingId}}
          {{?leg4OfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{leg4OfferingId}}"
              }
            },
            "ProductIdentifier": [
              {"Identifier": {"value": "{{leg4ProductId}}"}}
            ]
          }{{/leg4OfferingId}}
        ]
      }
    }

response:
  extract:
    offerIdentifierValue: "OfferListResponse.Identifier.value"
    offerId: "OfferListResponse.OfferID.0.id"
    productId: "OfferListResponse.OfferID.0.Product.0.id"
    totalPrice: "OfferListResponse.OfferID.0.Price.TotalPrice"
    currencyCode: "OfferListResponse.OfferID.0.Price.CurrencyCode.value"
