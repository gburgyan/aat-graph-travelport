adapter: priceOfferReference
protocol: http

request:
  method: POST
  path: /11/air/price/offers/buildfromcatalogproductofferings
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromCatalogProductOfferings",
      "BuildFromCatalogProductOfferingsRequest": {
        "@type": "BuildFromCatalogProductOfferingsRequestAir",
        "CatalogProductOfferingsIdentifier": {
          "Identifier": {
            "value": "{{catalogProductOfferingsId}}"
          }
        },
        "CatalogProductOfferingSelection": [
          {
            "CatalogProductOfferingIdentifier": {
              "id": "{{offeringId}}"
            },
            "ProductIdentifier": [
              {
                "Identifier": {
                  "value": "{{productIds}}"
                }
              }
            ]
          }
        ]
      }
    }

response:
  extract:
    offerIdentifierValue: "OfferResponse.Offer.Identifier.value"
    offerId: "OfferResponse.Offer.id"
    totalPrice: "OfferResponse.Offer.Price.TotalPrice.value"
    currencyCode: "OfferResponse.Offer.Price.TotalPrice.code"
    productIdentifiers: "OfferResponse.Offer.Product"
