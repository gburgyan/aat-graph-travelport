adapter: addPrimaryContact
protocol: http

request:
  method: POST
  path: /11/air/book/primarycontact/reservationworkbench/{{workbenchId}}/primarycontacts
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "PrimaryContact",
      "shareWithSupplier": ["YY"],
      "Email": {
        "value": "{{email}}"
      },
      "Telephone": {
        "@type": "Telephone",
        "role": "Mobile",
        "phoneNumber": "{{phoneNumber}}"
      },
      "TravelerIdentifier": {
        "Identifier": {
          "value": "{{travelerIdentifierValue}}"
        }
      }
    }

response:
  extract: {}
