# TODO: OAS validation fails because the Travelport spec defines the required
# property as "ReservationComment" but the API only accepts "ReservationCommentID"
# (the parent type name) in a wrapper format. The spec also doesn't account for
# the { "ReservationCommentListRequest": { ... } } envelope the API requires.
#
# Tested combinations:
#   Format              | Property name         | Result
#   Wrapper             | ReservationCommentID  | 200 (only working format)
#   Wrapper             | ReservationComment    | 400
#   Flat + @type        | ReservationComment    | 400
#   Flat (no @type)     | ReservationComment    | 400
#   Flat (no @type)     | ReservationCommentID  | 400
adapter: addReservationComment
protocol: http

request:
  method: POST
  path: /11/air/book/remarks/reservationworkbench/{{workbenchId}}/reservationcomments/list
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "ReservationCommentListRequest": {
        "@type": "ReservationCommentListRequest",
        "ReservationCommentID": [
          {
            "@type": "ReservationComment",
            "id": "reservationComment_1",
            "Comment": [
              {
                "name": "{{commentName}}",
                "value": "{{commentValue}}",
                "id": "comment_1",
                "language": "EN"
              }
            ]
          }
        ]
      }
    }

response: {}
