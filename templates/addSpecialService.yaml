adapter: addSpecialService
protocol: http

request:
  method: POST
  path: /11/air/book/specialservices/reservationworkbench/{{workbenchId}}/specialservices/list
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "SpecialServiceListRequest",
      "SpecialService": [
        {
          "@type": "SpecialServiceWheelchairAirlineSupplied",
          "FreeText": "{{text}}",
          "TravelerIdentifier": {
            "@type": "TravelerIdentifier",
            "Identifier": {
              "@type": "Identifier",
              "value": "{{travelerIdentifierValue}}"
            }
          }
        }
      ]
    }

response:
  extract:
    specialServiceId: "SpecialServiceListResponse.Identifier.value"
