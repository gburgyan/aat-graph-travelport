adapter: addSpecialService
protocol: http

request:
  method: POST
  path: /11/air/book/specialservices/reservationworkbench/{{workbenchId}}/specialservices/list
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "SpecialServiceListRequest",
      "SpecialService": [
        {
          "@type": "SpecialServiceRequirement",
          "SSRCode": "{{ssrCode}}",
          "FreeText": "{{text}}"
        }
      ]
    }

response:
  extract:
    specialServiceId: "SpecialServiceListResponse.SpecialServiceID.0.id"
