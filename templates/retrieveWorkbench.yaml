adapter: retrieveWorkbench
protocol: http

request:
  method: GET
  path: /11/air/book/session/reservationworkbench/{{workbenchId}}
  headers:
    Accept: application/json

response:
  extract:
    workbenchId: "ReservationResponse.Reservation.Identifier.value"
    wbOfferIdentifierValue: "ReservationResponse.Reservation.Offer.0.Identifier.value"
    wbProductIdentifierValue: "ReservationResponse.Reservation.Offer.0.Product.0.Identifier.value"
    offers:
      path: "ReservationResponse.Reservation.Offer"
      fields:
        offerId: "id"
        offerIdentifierValue: "Identifier.value"
        offerAuthority: "Identifier.authority"
