adapter: getTicketDetails
protocol: http

request:
  method: GET
  path: /11/air/ticket/tickets/{{ticketNumber}}
  headers:
    Accept: application/json

response:
  extract:
    ticketNumber: "TicketListResponse.TicketID.0.Identifier.value"
    ticketIdentifierValue: "TicketListResponse.TicketID.0.Identifier.value"
