adapter: addOfferReference
protocol: http

request:
  method: POST
  path: /11/air/book/airoffer/reservationworkbench/{{workbenchId}}/offers/buildfromcatalogproductofferings
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromCatalogProductOfferings",
      "BuildFromCatalogProductOfferingsRequest": {
        "@type": "BuildFromCatalogProductOfferingsRequestAir",
        "CatalogProductOfferingsIdentifier": {
          "Identifier": {
            "value": "{{catalogProductOfferingsId}}"
          }
        },
        "CatalogProductOfferingSelection": [
          {
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{offeringId}}"
              }
            },
            "ProductIdentifier": [
              {{#productIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/productIds}}
            ]
          }
          {{?returnOfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{returnOfferingId}}"
              }
            },
            "ProductIdentifier": [
              {{#returnProductIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/returnProductIds}}
            ]
          }{{/returnOfferingId}}
        ]
      }
    }

response:
  extract:
    offerIdentifierValue: "OfferListResponse.OfferID.0.Identifier.value"
    offerAuthority: "OfferListResponse.OfferID.0.Identifier.authority"
