adapter: addOfferReference
protocol: http

request:
  method: POST
  path: /11/air/book/airoffer/reservationworkbench/{{workbenchId}}/offers/buildfromcatalogproductofferings
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromCatalogProductOfferings",
      "BuildFromCatalogProductOfferingsRequest": {
        "@type": "BuildFromCatalogProductOfferingsRequestAir",
        "CatalogProductOfferingsIdentifier": {
          "Identifier": {
            "value": "{{catalogProductOfferingsId}}"
          }
        },
        "CatalogProductOfferingSelection": [
          {
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{offeringId}}"
              }
            },
            "ProductIdentifier": [
              {{#productIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/productIds}}
            ]
          }
          {{?returnOfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{returnOfferingId}}"
              }
            },
            "ProductIdentifier": [
              {{#returnProductIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/returnProductIds}}
            ]
          }{{/returnOfferingId}}
          {{?leg2OfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{leg2OfferingId}}"
              }
            },
            "ProductIdentifier": [
              {{#leg2ProductIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/leg2ProductIds}}
            ]
          }{{/leg2OfferingId}}
          {{?leg3OfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{leg3OfferingId}}"
              }
            },
            "ProductIdentifier": [
              {{#leg3ProductIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/leg3ProductIds}}
            ]
          }{{/leg3OfferingId}}
          {{?leg4OfferingId}},{
            "CatalogProductOfferingIdentifier": {
              "Identifier": {
                "value": "{{leg4OfferingId}}"
              }
            },
            "ProductIdentifier": [
              {{#leg4ProductIds}}
              {"Identifier": {"value": "{{.}}"}}
              {{/leg4ProductIds}}
            ]
          }{{/leg4OfferingId}}
        ]
      }
    }

response:
  extract:
    offerIdentifierValue: "OfferListResponse.OfferID.0.Identifier.value"
    offerAuthority: "OfferListResponse.OfferID.0.Identifier.authority"
