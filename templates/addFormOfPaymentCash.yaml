adapter: addFormOfPaymentCash
protocol: http

request:
  method: POST
  path: /11/air/payment/reservationworkbench/{{workbenchId}}/formofpayment
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "FormOfPaymentCash",
      "id": "formOfPayment_1",
      "FormOfPaymentRef": "formOfPayment_1"
    }

response:
  extract:
    fopIdentifierValue: "FormOfPaymentResponse.FormOfPayment.Identifier.value"
