adapter: addFormOfPaymentInvoice
protocol: http

request:
  method: POST
  path: /11/air/payment/reservationworkbench/{{workbenchId}}/formofpayment
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "FormOfPaymentInvoice": {
        "@type": "FormOfPaymentInvoice",
        "InvoiceNumber": "{{invoiceNumber}}"
      }
    }

response:
  extract:
    fopIdentifierValue: "FormOfPaymentResponse.FormOfPayment.Identifier.value"
    fopId: "FormOfPaymentResponse.FormOfPayment.id"
