adapter: addPayment
protocol: http

request:
  method: POST
  path: /11/air/paymentoffer/reservationworkbench/{{workbenchId}}/payments
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "Payment",
      "id": "{{paymentId}}",
      "Amount": {
        "code": "{{currencyCode}}",
        "minorUnit": 2,
        "currencySource": "Charged",
        "value": {{totalPrice}}
      },
      "FormOfPaymentIdentifier": {
        "id": "{{formOfPaymentId}}",
        "FormOfPaymentRef": "{{formOfPaymentId}}",
        "Identifier": {
          "authority": "Travelport",
          "value": "{{fopIdentifierValue}}"
        }
      },
      "OfferIdentifier": [
        {
          "id": "{{offerId}}",
          "offerRef": "{{offerId}}",
          "Identifier": {
            "authority": "{{offerAuthority}}",
            "value": "{{offerIdentifierValue}}"
          }
        }
      ]
    }

response:
  extract:
    paymentIdentifierValue: "PaymentResponse.Payment.Identifier.value"
