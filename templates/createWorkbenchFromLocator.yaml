adapter: createWorkbenchFromLocator
protocol: http

request:
  method: POST
  path: /11/air/book/session/reservationworkbench/buildfromlocator?Locator={{locator}}
  headers:
    Content-Type: application/json
    Accept: application/json

response:
  extract:
    workbenchId: "ReservationResponse.Reservation.Identifier.value"
    offerIdentifierValue: "ReservationResponse.Reservation.Offer.0.Identifier.value"
    offerId: "ReservationResponse.Reservation.Offer.0.id"
    offerAuthority: "ReservationResponse.Reservation.Offer.0.Identifier.authority"
    productId: "ReservationResponse.Reservation.Offer.0.Product.0.id"
    formOfPaymentId:
      path: "ReservationResponse.Reservation.FormOfPayment.0.id"
      optional: true
    fopIdentifierValue:
      path: "ReservationResponse.Reservation.FormOfPayment.0.Identifier.value"
      optional: true
