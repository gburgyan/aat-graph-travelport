adapter: addOfferFullPayload
protocol: http

request:
  method: POST
  path: /11/air/book/airoffer/reservationworkbench/{{workbenchId}}/offers/buildfromproducts
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromProducts",
      "BuildFromProductsRequest": {
        "@type": "BuildFromProductsRequestAir",
        "PricingModifiersAir": {
          "@type": "PricingModifiersAir"
        },
        "PassengerCriteria": [
          {
            "@type": "PassengerCriteria",
            "number": 1,
            "passengerTypeCode": "ADT"
          }
        ],
        "ProductCriteriaAir": [
          {
            "sequence": 1,
            "SpecificFlightCriteria": [
              {
                "carrier": "{{carrier}}",
                "flightNumber": "{{flightNumber}}",
                "departureDate": "{{departureDate}}",
                "departureTime": "{{departureTime}}",
                "arrivalDate": "{{arrivalDate}}",
                "arrivalTime": "{{arrivalTime}}",
                "from": "{{origin}}",
                "to": "{{destination}}",
                "segmentSequence": 1
              }
            ]
          }
          {{?returnCarrier}},{
            "sequence": 2,
            "SpecificFlightCriteria": [
              {
                "carrier": "{{returnCarrier}}",
                "flightNumber": "{{returnFlightNumber}}",
                "departureDate": "{{returnDepartureDate}}",
                "departureTime": "{{returnDepartureTime}}",
                "arrivalDate": "{{returnArrivalDate}}",
                "arrivalTime": "{{returnArrivalTime}}",
                "from": "{{returnOrigin}}",
                "to": "{{returnDestination}}",
                "segmentSequence": 2
              }
            ]
          }{{/returnCarrier}}
        ]
      }
    }

response:
  extract:
    offerIdentifierValue: "OfferListResponse.OfferID.0.Identifier.value"
    offerAuthority: "OfferListResponse.OfferID.0.Identifier.authority"
