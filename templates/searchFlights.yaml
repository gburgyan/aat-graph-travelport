adapter: searchFlights
protocol: http

request:
  method: POST
  path: /11/air/catalog/search/catalogproductofferings
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "CatalogProductOfferingsQueryRequest",
      "CatalogProductOfferingsRequest": {
        "@type": "CatalogProductOfferingsRequestAir",
        "offersPerPage": 15,
        "maxNumberOfUpsellsToReturn": 4,
        "contentSourceList": [
          "{{contentSource}}"
        ],
        {{?searchRepresentation}}"CustomResponseModifiersAir": {
          "@type": "CustomResponseModifiersAir",
          "SearchRepresentation": "{{searchRepresentation}}"
        },
        {{/searchRepresentation}}{{?cabinPreference|carrierPreference}}"SearchModifiersAir": {
          "@type": "SearchModifiersAir"{{?cabinPreference}},
          "CabinPreference": [
            {
              "@type": "CabinPreference",
              "preferenceType": "Permitted",
              "cabins": {{cabinPreference}}
            }
          ]{{/cabinPreference}}{{?carrierPreference}},
          "CarrierPreference": [
            {
              "@type": "CarrierPreference",
              "preferenceType": "Permitted",
              "carriers": ["{{carrierPreference}}"]
            }
          ]{{/carrierPreference}}
        },
        {{/cabinPreference|carrierPreference}}"PassengerCriteria": [
          {
            "@type": "PassengerCriteria",
            "number": {{passengers}},
            "passengerTypeCode": "{{passengerTypeCode}}"
          }
        ],
        "SearchCriteriaFlight": [
          {{?origin}}{
            "@type": "SearchCriteriaFlight",
            "departureDate": "{{departureDate}}",
            "From": {
              "value": "{{origin}}"
            },
            "To": {
              "value": "{{destination}}"
            }
          }{{/origin}}{{?leg1Origin}}{
            "@type": "SearchCriteriaFlight",
            "departureDate": "{{leg1DepartureDate}}",
            "From": {
              "value": "{{leg1Origin}}"
            },
            "To": {
              "value": "{{leg1Destination}}"
            }
          }{{/leg1Origin}}
          {{?returnDate}},{
            "@type": "SearchCriteriaFlight",
            "departureDate": "{{returnDate}}",
            "From": {
              "value": "{{destination}}"
            },
            "To": {
              "value": "{{origin}}"
            }
          }{{/returnDate}}
          {{?leg2Origin}},{
            "@type": "SearchCriteriaFlight",
            "departureDate": "{{leg2DepartureDate}}",
            "From": {
              "value": "{{leg2Origin}}"
            },
            "To": {
              "value": "{{leg2Destination}}"
            }
          }{{/leg2Origin}}
          {{?leg3Origin}},{
            "@type": "SearchCriteriaFlight",
            "departureDate": "{{leg3DepartureDate}}",
            "From": {
              "value": "{{leg3Origin}}"
            },
            "To": {
              "value": "{{leg3Destination}}"
            }
          }{{/leg3Origin}}
          {{?leg4Origin}},{
            "@type": "SearchCriteriaFlight",
            "departureDate": "{{leg4DepartureDate}}",
            "From": {
              "value": "{{leg4Origin}}"
            },
            "To": {
              "value": "{{leg4Destination}}"
            }
          }{{/leg4Origin}}
        ]
      }
    }

response:
  extract:
    catalogProductOfferings:
      path: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
      fields:
        offeringId: "id"
        departure: "Departure"
        arrival: "Arrival"
        offeringIdentifierValue: "Identifier.value"
    leg1Offerings:
      path: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
      fields:
        offeringId: "id"
    leg2Offerings:
      path: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
      fields:
        offeringId: "id"
    leg3Offerings:
      path: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
      fields:
        offeringId: "id"
    leg4Offerings:
      path: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
      fields:
        offeringId: "id"
    catalogProductOfferingsId: "CatalogProductOfferingsResponse.CatalogProductOfferings.Identifier.value"
    transactionId: "CatalogProductOfferingsResponse.transactionId"
  transform: |
    -- Flatten search offerings so each entry is one (offering, product) pair.
    -- Each CatalogProductOffering contains multiple ProductBrandOfferings
    -- (different fares/brands for the same itinerary). We expand them so each
    -- array entry has exactly one productId, brand, price, and flight details.
    -- This makes individual products selectable via strategy: first/index.

    -- Build lookup tables from ReferenceList (GDS mode).
    local refLists = json_path("CatalogProductOfferingsResponse.ReferenceList")
    local products = {}  -- product id -> ProductAir object
    local flights = {}   -- flight id -> FlightDetail object
    local brands = {}    -- brand id -> Brand object

    if refLists then
      for _, refList in ipairs(refLists) do
        local rlType = refList["@type"]
        if rlType == "ReferenceListProduct" and refList.Product then
          for _, prod in ipairs(refList.Product) do
            if prod.id then products[prod.id] = prod end
          end
        elseif rlType == "ReferenceListFlight" and refList.Flight then
          for _, fl in ipairs(refList.Flight) do
            if fl.id then flights[fl.id] = fl end
          end
        elseif rlType == "ReferenceListBrand" and refList.Brand then
          for _, br in ipairs(refList.Brand) do
            if br.id then brands[br.id] = br end
          end
        end
      end
    end

    -- Helper: resolve a Flight from a FlightSegment.
    local function resolveFlight(seg)
      if not seg or not seg.Flight then return nil end
      local fl = seg.Flight
      if type(fl) == "table" and fl.carrier then return fl end
      if type(fl) == "table" and fl.FlightRef and flights[fl.FlightRef] then
        return flights[fl.FlightRef]
      end
      return nil
    end

    -- Helper: resolve product details and enrich an entry.
    local function resolveProduct(entry, pid)
      local prod = products[pid]
      if not prod then
        -- In full-payload mode products are inline; nothing to resolve.
        return
      end

      if prod.FlightSegment and prod.FlightSegment[1] then
        local segCount = #prod.FlightSegment
        local allFlightNumbers = {}
        local firstFlight = nil
        local lastFlight = nil

        for idx = 1, segCount do
          local flight = resolveFlight(prod.FlightSegment[idx])
          if flight then
            if idx == 1 then firstFlight = flight end
            lastFlight = flight
            if flight.carrier and flight.number then
              table.insert(allFlightNumbers, flight.number)
            end
          end
        end

        if firstFlight then entry.carrier = firstFlight.carrier end
        if #allFlightNumbers > 0 then
          entry.flightNumber = table.concat(allFlightNumbers, ", ")
        end
        if firstFlight and firstFlight.Departure then
          entry.departureDate = firstFlight.Departure.date
          entry.departureTime = firstFlight.Departure.time
        end
        if lastFlight and lastFlight.Arrival then
          entry.arrivalDate = lastFlight.Arrival.date
          entry.arrivalTime = lastFlight.Arrival.time
        end
        entry.stops = segCount - 1
        if prod.totalDuration then entry.totalDuration = prod.totalDuration end
      end

      if prod.PassengerFlight and prod.PassengerFlight[1] then
        local pf = prod.PassengerFlight[1]
        if pf.FlightProduct and pf.FlightProduct[1] then
          local fp = pf.FlightProduct[1]
          entry.cabin = fp.cabin
          entry.classOfService = fp.classOfService
        end
      end
    end

    -- Access raw offerings to iterate ProductBrandOfferings.
    local rawOfferings = json_path("CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering")
    if not rawOfferings then return outputs end

    local expanded = {}
    for _, offering in ipairs(rawOfferings) do
      local common = {
        offeringId = offering.id,
        departure = offering.Departure,
        arrival = offering.Arrival,
        offeringIdentifierValue = offering.Identifier and offering.Identifier.value or nil,
        leg = offering.sequence or 1,
      }

      local brandOptions = offering.ProductBrandOptions
      if brandOptions then
        for _, option in ipairs(brandOptions) do
          local pboList = option.ProductBrandOffering
          if pboList then
            for _, pbo in ipairs(pboList) do
              local entry = {}
              for k, v in pairs(common) do entry[k] = v end

              -- Product: take first product ref
              if pbo.Product and pbo.Product[1] then
                entry.productId = pbo.Product[1].productRef or pbo.Product[1].id
                -- Inline full-payload flight details
                local inlineProd = pbo.Product[1]
                if inlineProd.FlightSegment and inlineProd.FlightSegment[1] then
                  local seg = inlineProd.FlightSegment[1]
                  if seg.Flight and seg.Flight.carrier then
                    entry.carrier = seg.Flight.carrier
                    entry.flightNumber = seg.Flight.number
                    if seg.Flight.Departure then
                      entry.departureDate = seg.Flight.Departure.date
                      entry.departureTime = seg.Flight.Departure.time
                    end
                    if seg.Flight.Arrival then
                      entry.arrivalDate = seg.Flight.Arrival.date
                      entry.arrivalTime = seg.Flight.Arrival.time
                    end
                  end
                end
                if inlineProd.PassengerFlight and inlineProd.PassengerFlight[1] then
                  local pf = inlineProd.PassengerFlight[1]
                  if pf.FlightProduct and pf.FlightProduct[1] then
                    entry.cabin = pf.FlightProduct[1].cabin
                    entry.classOfService = pf.FlightProduct[1].classOfService
                  end
                end
              end

              -- Brand: resolve via reference list if available
              if pbo.Brand then
                local brandRef = pbo.Brand.BrandRef
                if brandRef and brands[brandRef] then
                  entry.brand = brands[brandRef].name
                elseif pbo.Brand.name then
                  entry.brand = pbo.Brand.name
                else
                  entry.brand = brandRef
                end
              elseif pbo.BrandRef then
                if brands[pbo.BrandRef] then
                  entry.brand = brands[pbo.BrandRef].name
                else
                  entry.brand = pbo.BrandRef
                end
              end

              -- Price
              if pbo.BestCombinablePrice then
                entry.totalPrice = pbo.BestCombinablePrice.TotalPrice
                entry.currency = pbo.BestCombinablePrice.CurrencyCode and pbo.BestCombinablePrice.CurrencyCode.value or nil
              end

              -- Resolve flight details from ReferenceList (GDS mode)
              if entry.productId then
                resolveProduct(entry, entry.productId)
              end

              table.insert(expanded, entry)
            end
          end
        end
      end
    end

    outputs.catalogProductOfferings = expanded

    -- Split offerings by leg for multi-leg full-payload selections
    local perLeg = {}
    for _, entry in ipairs(expanded) do
      local legNum = entry.leg or 1
      if not perLeg[legNum] then perLeg[legNum] = {} end
      table.insert(perLeg[legNum], entry)
    end
    if perLeg[1] then outputs.leg1Offerings = perLeg[1] end
    if perLeg[2] then outputs.leg2Offerings = perLeg[2] end
    if perLeg[3] then outputs.leg3Offerings = perLeg[3] end
    if perLeg[4] then outputs.leg4Offerings = perLeg[4] end

    return outputs
