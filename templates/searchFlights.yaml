adapter: searchFlights
protocol: http

request:
  method: POST
  path: /11/air/catalog/search/catalogproductofferings
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "CatalogProductOfferingsQueryRequest",
      "CatalogProductOfferingsRequest": {
        "@type": "CatalogProductOfferingsRequestAir",
        "offersPerPage": 15,
        "maxNumberOfUpsellsToReturn": 4,
        "contentSourceList": [
          "{{contentSource}}"
        ],
        {{?carrierPreference}}"SearchModifiersAir": {
          "@type": "SearchModifiersAir",
          "CarrierPreference": [
            {
              "@type": "CarrierPreference",
              "preferenceType": "Permitted",
              "carriers": ["{{carrierPreference}}"]
            }
          ]
        },
        {{/carrierPreference}}"PassengerCriteria": [
          {
            "@type": "PassengerCriteria",
            "number": {{passengers}},
            "passengerTypeCode": "{{passengerTypeCode}}"
          }
        ],
        "SearchCriteriaFlight": [
          {
            "departureDate": "{{departureDate}}",
            "From": {
              "value": "{{origin}}"
            },
            "To": {
              "value": "{{destination}}"
            }
          }
        ]
      }
    }

response:
  extract:
    catalogProductOfferings:
      path: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
      fields:
        offeringId: "id"
        productId: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.productRef"
        productIds: "ProductBrandOptions.#.ProductBrandOffering.#.Product.#.productRef|@flatten|@flatten"
        departure: "Departure"
        arrival: "Arrival"
        offeringIdentifierValue: "Identifier.value"
        # Full-payload flight details (from inline ProductAir objects)
        carrier: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.FlightSegment.0.Flight.carrier"
        flightNumber: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.FlightSegment.0.Flight.number"
        departureDate: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.FlightSegment.0.Flight.Departure.date"
        departureTime: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.FlightSegment.0.Flight.Departure.time"
        arrivalTime: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.FlightSegment.0.Flight.Arrival.time"
        cabin: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.PassengerFlight.0.FlightProduct.0.cabin"
        classOfService: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.PassengerFlight.0.FlightProduct.0.classOfService"
        totalPrice: "ProductBrandOptions.0.ProductBrandOffering.0.BestCombinablePrice.TotalPrice"
        currency: "ProductBrandOptions.0.ProductBrandOffering.0.BestCombinablePrice.CurrencyCode.value"
    catalogProductOfferingsId: "CatalogProductOfferingsResponse.CatalogProductOfferings.Identifier.value"
    transactionId: "CatalogProductOfferingsResponse.transactionId"
