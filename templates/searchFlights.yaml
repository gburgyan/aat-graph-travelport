adapter: searchFlights
protocol: http

request:
  method: POST
  path: /11/air/catalog/search/catalogproductofferings
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "CatalogProductOfferingsQueryRequest",
      "CatalogProductOfferingsRequest": {
        "@type": "CatalogProductOfferingsRequestAir",
        "offersPerPage": 15,
        "maxNumberOfUpsellsToReturn": 4,
        "contentSourceList": [
          "{{contentSource}}"
        ],
        "PassengerCriteria": [
          {
            "@type": "PassengerCriteria",
            "number": {{passengers}},
            "passengerTypeCode": "{{passengerTypeCode}}"
          }
        ],
        "SearchCriteriaFlight": [
          {
            "departureDate": "{{departureDate}}",
            "From": {
              "value": "{{origin}}"
            },
            "To": {
              "value": "{{destination}}"
            }
          }
        ]
      }
    }

response:
  extract:
    catalogProductOfferings: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
    catalogProductOfferingsId: "CatalogProductOfferingsResponse.CatalogProductOfferings.Identifier.value"
    transactionId: "CatalogProductOfferingsResponse.transactionId"
