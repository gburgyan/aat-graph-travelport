adapter: getUpdatableTravelerItems
protocol: http

request:
  method: POST
  path: /11/air/book/updatableItem/reservationworkbench/{{workbenchId}}/travelerupdatableitems/buildfromtraveler
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "TravelerUpdatableItemsQueryBuildFromTraveler",
      "TravelerIdentifier": [
        "{{travelerIdentifierValue}}"
      ]
    }

response:
  extract:
    updatableItemsIdentifier: "TravelerUpdatableItemsListResponse.Identifier.value"
    updatableItems:
      path: "TravelerUpdatableItemsListResponse.TravelerUpdatableItemsID.0.TravelerUpdatableItem"
      fields:
        updatableItemId: "Identifier"
        fieldType: "\\@type"
