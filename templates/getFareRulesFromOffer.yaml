adapter: getFareRulesFromOffer
protocol: http

request:
  method: GET
  path: /11/air/farerule/farerules/fromoffer?offerIdentifier={{offerIdentifierValue}}&fareRuleType=ShortText
  headers:
    Accept: application/json

response:
  extract:
    fareRules:
      path: "FareRuleListResponse.FareRule"
      optional: true
