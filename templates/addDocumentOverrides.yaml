adapter: addDocumentOverrides
protocol: http

request:
  method: POST
  path: /11/air/book/documentoverride/Reservation/{{workbenchId}}/documentoverrides
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "DocumentOverrides",
      "Commissions": [
        {
          "Commission": {
            "@type": "CommissionAmount",
            "Amount": {
              "code": "{{commissionCurrencyCode}}",
              "value": {{commissionAmount}}
            }
          }
        }
      ]
      {{?restriction}},
      "Restrictions": [
        {
          "Restriction": [
            "{{restriction}}"
          ]
        }
      ]
      {{/restriction}}
      {{?tourCode}},
      "TourCodes": [
        {
          "TourCode": {
            "tourCodeType": "Inclusive Tour",
            "value": "{{tourCode}}"
          }
        }
      ]
      {{/tourCode}}
      {{?changeFeeCode}},
      "ChangeFeeCollectionMethod": {
        "code": "{{changeFeeCode}}",
        "value": "{{changeFeeMethod}}"
      }
      {{/changeFeeCode}}
    }

response:
  extract:
    documentOverridesId: "DocumentOverridesResponse.DocumentOverrides.Identifier.value"
