adapter: retrieveReservation
protocol: http

request:
  method: GET
  path: /11/air/book/reservation/reservations/{{identifier}}?detailViewInd=true
  headers:
    Accept: application/json

response:
  extract:
    reservationIdentifierValue: "ReservationResponse.Reservation.Identifier.value"
    locator: "ReservationResponse.Reservation.Locator.value"
    reservationStatus: "ReservationResponse.reservationStatus"
    offers: "ReservationResponse.Reservation.Offer"
