adapter: retrieveReservation
protocol: http

request:
  method: GET
  path: /11/air/book/reservation/reservations/{{identifier}}?detailViewInd=true
  headers:
    Accept: application/json

response:
  extract:
    reservationIdentifierValue: "ReservationResponse.Reservation.Identifier.value"
    locator: "ReservationResponse.Reservation.Receipt.0.Confirmation.Locator.value"
    reservationStatus: "ReservationResponse.Reservation.Receipt.0.Confirmation.OfferStatus.StatusAir.0.value"
    offers:
      path: "ReservationResponse.Reservation.Offer"
      fields:
        offerId: "id"
        offerIdentifierValue: "Identifier.value"
