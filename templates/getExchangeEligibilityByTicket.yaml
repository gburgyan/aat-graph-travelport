adapter: getExchangeEligibilityByTicket
protocol: http

request:
  method: GET
  path: /11/eligibility/ticketchangeeligibilities?Ticket={{ticketNumber}}
  headers:
    Accept: application/json

response:
  extract:
    eligibilities:
      path: "TicketChangeEligibilityListResponse.TicketChangeEligibility"
      fields:
        ticketNumber: "Ticket.TicketNumber"
        exchangeable: "exchangeable"
