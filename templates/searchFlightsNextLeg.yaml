adapter: searchFlightsNextLeg
protocol: http

request:
  method: POST
  path: /11/air/catalog/search/catalogproductofferings/buildnext
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "CatalogProductOfferingsQueryBuildNext",
      "BuildFromCatalogProductOfferingsRequest": {
        "@type": "BuildFromCatalogProductOfferingsRequestAir",
        "CatalogProductOfferingsIdentifier": {
          "Identifier": {
            "value": "{{catalogProductOfferingsId}}"
          }
        },
        "CatalogProductOfferingSelection": [
          {
            "CatalogProductOfferingIdentifier": {
              "id": "{{offeringId}}"
            },
            "ProductIdentifier": [
              {
                "Identifier": {
                  "value": "{{productId}}"
                }
              }
            ]
          }
        ]
      }
    }

response:
  extract:
    catalogProductOfferings:
      path: "CatalogProductOfferingsResponse.CatalogProductOfferings.CatalogProductOffering"
      fields:
        offeringId: "id"
        departure: "Departure"
        arrival: "Arrival"
        offeringIdentifierValue: "Identifier.value"
    catalogProductOfferingsId: "CatalogProductOfferingsResponse.CatalogProductOfferings.Identifier.value"
