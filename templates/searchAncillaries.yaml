adapter: searchAncillaries
protocol: http

request:
  method: POST
  path: /11/air/ancillaryshop/catalogofferingsancillaries
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "CatalogOfferingsQueryAncillaries",
      "AncillaryOfferings": {
        "@type": "AncillaryOfferingsBuildFromReservationWorkbench",
        "BuildFromReservationWorkbench": {
          "@type": "BuildFromReservationWorkbench",
          "ReservationIdentifier": {
            "Identifier": {
              "value": "{{workbenchId}}"
            }
          },
          "OfferIdentifier": {
            "Identifier": {
              "value": "{{offerIdentifierValue}}"
            }
          }
        }
      }
    }

response:
  extract:
    ancillaryOfferings:
      path: "CatalogOfferingsAncillaryListResponse.CatalogOfferingsID.0.CatalogOffering"
      fields:
        ancillaryId: "id"
        ancillaryProductId: "ProductOptions.0.Product.0.id"
        ancillaryName: "ProductOptions.0.Product.0.Ancillary.Description.0.value"
    catalogOfferingsIdentifierValue: "CatalogOfferingsAncillaryListResponse.Identifier.value"
    catalogOfferingsId: "CatalogOfferingsAncillaryListResponse.CatalogOfferingsID.0.id"
    travelerRefId:
      path: "CatalogOfferingsAncillaryListResponse.CatalogOfferingsID.0.TravelerIdentifierRef.0.id"
      optional: true
