adapter: addAncillaryOffer
protocol: http

request:
  method: POST
  path: /11/air/book/airoffer/reservationworkbench/{{workbenchId}}/offers/buildancillaryoffersfromcatalogofferings
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "OfferQueryBuildAncillaryOffersFromCatalogOfferings",
      "BuildAncillaryOffersFromCatalogOfferings": [
        {
          "@type": "BuildAncillaryOffersFromCatalogOfferings",
          "CatalogOfferingsIdentifier": {
            "id": "{{catalogOfferingsId}}",
            "Identifier": {
              "authority": "Travelport",
              "value": "{{catalogOfferingsIdentifierValue}}"
            }
          },
          "CatalogOfferingIdentifier": {
            "id": "{{ancillaryOfferingId}}"
          },
          "ProductIdentifier": {
            "id": "{{ancillaryProductId}}"
          },
          "Quantity": 1,
          "TravelerIdentifierRef": {
            "id": "{{travelerRefId}}"
          }
        }
      ]
    }

response:
  extract:
    ancillaryOfferId:
      path: "OfferListResponse.OfferID.0.id"
      optional: true
    ancillaryOfferIdentifierValue:
      path: "OfferListResponse.OfferID.0.Identifier.value"
      optional: true
    ancillaryOfferProductId:
      path: "OfferListResponse.OfferID.0.Product.0.id"
      optional: true
