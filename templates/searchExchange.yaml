adapter: searchExchange
protocol: http

request:
  method: POST
  path: /11/exchangesearch/catalogofferingsairchange
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "CatalogOfferingsQueryAirChange": {
        "CatalogOfferingsAirChangeRequest": {
          "@type": "CatalogOfferingsAirChangeRequestReservation",
          "returnBrandedFaresInd": true,
          "detailViewInd": true,
          "BuildFromReservationWorkbench": {
            "ReservationIdentifier": {
              "Identifier": {
                "authority": "Travelport",
                "value": "{{reservationIdentifier}}"
              }
            },
            "OfferIdentifier": {
              "id": "{{offerId}}"
            },
            "ProductIdentifier": [
              {
                "id": "{{productId}}"
              }
            ]
          },
          "SearchCriteriaFlight": [
            {
              "departureDate": "{{departureDate}}",
              "From": {
                "value": "{{origin}}"
              },
              "To": {
                "value": "{{destination}}"
              }
            }
          ],
          "PricingModifiersAirChange": {}
        }
      }
    }

response:
  extract:
    exchangeOfferings:
      path: "CatalogOfferingsAirChangeResponse.CatalogOfferings.CatalogOffering"
      fields:
        offeringId: "id"
        totalPrice: "Price.TotalPrice"
        currencyCode: "Price.CurrencyCode.value"
    catalogOfferingsIdentifierValue: "CatalogOfferingsAirChangeResponse.CatalogOfferings.Identifier.value"
    firstOfferTotalPrice: "CatalogOfferingsAirChangeResponse.CatalogOfferings.CatalogOffering.0.AdditionalCollectionPrice.TotalPrice"
    firstOfferCurrencyCode: "CatalogOfferingsAirChangeResponse.CatalogOfferings.CatalogOffering.0.Price.CurrencyCode.value"
