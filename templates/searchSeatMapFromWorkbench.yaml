adapter: searchSeatMapFromWorkbench
protocol: http

request:
  method: POST
  path: /11/air/search/seat/catalogofferingsancillaries/seatavailabilities
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "@type": "CatalogOfferingsQuerySeatAvailability",
      "SeatAvailabilityOfferings": {
        "@type": "SeatAvailabilityOfferingsBuildFromReservationWorkbench",
        "BuildFromReservationWorkbench": {
          "@type": "BuildFromReservationWorkbench",
          "ReservationIdentifier": {
            "Identifier": {
              "value": "{{workbenchId}}"
            }
          },
          "OfferIdentifier": {
            "Identifier": {
              "value": "{{offerIdentifierValue}}"
            }
          },
          "ProductIdentifier": {
            "Identifier": {
              "value": "{{productIdentifierValue}}"
            }
          }
        }
      }
    }

response:
  extract:
    seatOfferings:
      path: "CatalogOfferingsAncillaryListResponse.CatalogOfferingsID.0.CatalogOffering"
      fields:
        seatId: "id"
        seatIdentifierValue: "Identifier.value"
        seatAssignment: "ProductOptions.0.Product.0.SeatAvailability.0.value.0"
    catalogOfferingsIdentifierValue: "CatalogOfferingsAncillaryListResponse.CatalogOfferingsID.0.Identifier.value"
