adapter: priceOfferFullPayload
protocol: http

request:
  method: POST
  path: /11/air/price/offers/buildfromproducts
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromProducts",
      "BuildFromProductsRequest": {
        "@type": "BuildFromProductsRequestAir",
        "PricingModifiersAir": {
          "@type": "PricingModifiersAir"
        },
        "PassengerCriteria": [
          {
            "@type": "PassengerCriteria",
            "number": {{passengers}},
            "passengerTypeCode": "{{passengerTypeCode}}"
          }
        ],
        "ProductCriteriaAir": [
          {
            "sequence": 1,
            "SpecificFlightCriteria": [
              {
                "carrier": "{{carrier}}",
                "flightNumber": "{{flightNumber}}",
                "departureDate": "{{departureDate}}",
                "departureTime": "{{departureTime}}",
                "arrivalDate": "{{arrivalDate}}",
                "arrivalTime": "{{arrivalTime}}",
                "from": "{{origin}}",
                "to": "{{destination}}",
                "classOfService": "{{classOfService}}",
                "segmentSequence": 1
              }
            ]
          }
          {{?returnCarrier}},{
            "sequence": 2,
            "SpecificFlightCriteria": [
              {
                "carrier": "{{returnCarrier}}",
                "flightNumber": "{{returnFlightNumber}}",
                "departureDate": "{{returnDepartureDate}}",
                "departureTime": "{{returnDepartureTime}}",
                "arrivalDate": "{{returnArrivalDate}}",
                "arrivalTime": "{{returnArrivalTime}}",
                "from": "{{returnOrigin}}",
                "to": "{{returnDestination}}",
                "classOfService": "{{returnClassOfService}}",
                "segmentSequence": 2
              }
            ]
          }{{/returnCarrier}}
          {{?leg2Carrier}},{
            "sequence": 2,
            "SpecificFlightCriteria": [
              {
                "carrier": "{{leg2Carrier}}",
                "flightNumber": "{{leg2FlightNumber}}",
                "departureDate": "{{leg2DepartureDate}}",
                "departureTime": "{{leg2DepartureTime}}",
                "arrivalDate": "{{leg2ArrivalDate}}",
                "arrivalTime": "{{leg2ArrivalTime}}",
                "from": "{{leg2Origin}}",
                "to": "{{leg2Destination}}",
                "classOfService": "{{leg2ClassOfService}}",
                "segmentSequence": 2
              }
            ]
          }{{/leg2Carrier}}
          {{?leg3Carrier}},{
            "sequence": 3,
            "SpecificFlightCriteria": [
              {
                "carrier": "{{leg3Carrier}}",
                "flightNumber": "{{leg3FlightNumber}}",
                "departureDate": "{{leg3DepartureDate}}",
                "departureTime": "{{leg3DepartureTime}}",
                "arrivalDate": "{{leg3ArrivalDate}}",
                "arrivalTime": "{{leg3ArrivalTime}}",
                "from": "{{leg3Origin}}",
                "to": "{{leg3Destination}}",
                "classOfService": "{{leg3ClassOfService}}",
                "segmentSequence": 3
              }
            ]
          }{{/leg3Carrier}}
        ]
      }
    }

response:
  extract:
    offerIdentifierValue: "OfferListResponse.Identifier.value"
    offerId: "OfferListResponse.OfferID.0.id"
    productId: "OfferListResponse.OfferID.0.Product.0.id"
    totalPrice: "OfferListResponse.OfferID.0.Price.TotalPrice"
    currencyCode: "OfferListResponse.OfferID.0.Price.CurrencyCode.value"
