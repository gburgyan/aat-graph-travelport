adapter: priceOfferFullPayload
protocol: http

request:
  method: POST
  path: /11/air/price/offers/buildfromproducts
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "OfferQueryBuildFromProducts",
      "BuildFromProductsRequest": {
        "@type": "BuildFromProductsRequestAir",
        "PricingModifiersAir": {
          "@type": "PricingModifiersAir"
        },
        "PassengerCriteria": [
          {
            "@type": "PassengerCriteria",
            "number": {{passengers}},
            "passengerTypeCode": "{{passengerTypeCode}}"
          }
        ],
        "ProductCriteriaAir": [
          {
            "sequence": 1,
            "SpecificFlightCriteria": [
              {
                "carrier": "{{carrier}}",
                "flightNumber": "{{flightNumber}}",
                "departureDate": "{{departureDate}}",
                "departureTime": "{{departureTime}}",
                "arrivalDate": "{{arrivalDate}}",
                "arrivalTime": "{{arrivalTime}}",
                "from": "{{origin}}",
                "to": "{{destination}}",
                "classOfService": "{{classOfService}}",
                "segmentSequence": 1
              }
            ]
          }
        ]
      }
    }

response:
  extract:
    offerIdentifierValue: "OfferListResponse.Identifier.value"
    offerId: "OfferListResponse.OfferID.0.id"
    totalPrice: "OfferListResponse.OfferID.0.Price.TotalPrice"
    currencyCode: "OfferListResponse.OfferID.0.Price.CurrencyCode.value"
