adapter: addFormOfPaymentCard
protocol: http

request:
  method: POST
  path: /11/air/payment/reservationworkbench/{{workbenchId}}/formofpayment
  headers:
    Content-Type: application/json
  body: |
    {
      "@type": "FormOfPaymentPaymentCard",
      "id": "formOfPayment_1",
      "FormOfPaymentRef": "formOfPayment_1",
      "PaymentCard": {
        "@type": "PaymentCardDetail",
        "id": "paymentCard_4",
        "expireDate": "{{cardExpiry}}",
        "CardType": "Credit",
        "CardCode": "{{cardCode}}",
        "CardHolderName": "{{cardHolderName}}",
        "CardNumber": {
          "@type": "CardNumber",
          "PlainText": "{{cardNumber}}"
        },
        "SeriesCode": {
          "PlainText": "{{cvv}}"
        }
      }
    }

response:
  extract:
    fopIdentifierValue: "FormOfPaymentResponse.FormOfPayment.Identifier.value"
