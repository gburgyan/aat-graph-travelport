adapter: addAccountingRemark
protocol: http

request:
  method: POST
  path: /11/air/book/accounting/reservationworkbench/{{workbenchId}}/accountings
  headers:
    Content-Type: application/json
    Accept: application/json
  body: |
    {
      "Accounting": {
        "NameValuePair": [
          {
            "name": "{{accountingName}}",
            "value": "{{accountingValue}}"
          }
        ]
      }
    }

response:
  extract:
    accountingId: "AccountingResponse.Accounting.id"
    nameValuePairId: "AccountingResponse.Accounting.NameValuePair.0.id"
