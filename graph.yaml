  - from: createWorkbenchFromIdentifier.workbenchId
    to: addFormOfPaymentForfeit.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: addFormOfPaymentWaiver.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: addFormOfPaymentInvoice.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: commitTicket.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: searchExchange.reservationIdentifier
  - from: createWorkbenchFromIdentifier.offerIdentifierValue
    to: searchExchange.offerIdentifierValue
  - from: createWorkbenchFromIdentifier.workbenchId
    to: addExchangeOffer.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: addDocumentOverrides.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: commitExchangeTicket.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: addReservationComment.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: addAccountingRemark.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: deleteReservationComment.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: deleteAccountingRemark.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: ignoreWorkbench.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
