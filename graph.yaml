  # ============================================================
  # PRICING
  # ============================================================
  priceOfferReference:
    description: "Price a flight offer using reference payload (references search results by identifier)."
    adapter: priceOfferReference
    oas:
      operationId: OfferBuildFromCatalogProductOfferings
    tags: [pricing]
    requires: [flightsSearched]
    satisfies: [offerPriced]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productId
        type: string
        description: "Selected Product identifier for the price request"
      # Return leg inputs (for round-trip reference pricing)
      - name: returnOfferingId
        type: string
        description: "Return leg CatalogProductOffering Identifier.value"
        optional: true
      - name: returnProductId
        type: string
        description: "Return leg Product identifier"
        optional: true
      # Multi-city leg 2 inputs (for reference pricing)
      - name: leg2OfferingId
        type: string
        description: "Leg 2 CatalogProductOffering Identifier.value"
        optional: true
      - name: leg2ProductId
        type: string
        description: "Leg 2 Product identifier"
        optional: true
      # Multi-city leg 3 inputs (for reference pricing)
      - name: leg3OfferingId
        type: string
        description: "Leg 3 CatalogProductOffering Identifier.value"
        optional: true
      - name: leg3ProductId
        type: string
        description: "Leg 3 Product identifier"
        optional: true
      # Multi-city leg 4 inputs (for reference pricing)
      - name: leg4OfferingId
        type: string
        description: "Leg 4 CatalogProductOffering Identifier.value"
        optional: true
      - name: leg4ProductId
        type: string
        description: "Leg 4 Product identifier"
        optional: true
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "OfferListResponse Identifier.value from price response"
      - name: offerId
        type: string
        description: "Offer id from the price response"
      - name: productId
        type: string
        description: "First product id from the price response"
      - name: totalPrice
        type: float
        description: "Total price amount"
      - name: currencyCode
        type: string
        description: "Currency code of the price"

