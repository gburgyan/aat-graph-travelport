version: "1.0.0"
title: "Travelport+ Air v11 API"
description: |
  Comprehensive AAT graph for the Travelport+ JSON Air v11 API surface.
  Models the full air booking lifecycle including search, pricing, reservation
  management, ticketing, exchanges, ancillary/seat services, and traveler
  modification workflows.

workflows:
  # === Slot-based Booking workflow ===
  - name: Booking
    description: "Book a flight. Choose trip type, traveler count, and payment method."
    template: workflows/booking-base.yaml
    slots:
      - name: trip-search
        description: "How to search for and price flights"
        options: [One-Way, Round-Trip, Multi-City 2-Leg, Multi-City 3-Leg, Multi-City 4-Leg, One-Way Full-Payload, Round-Trip Full-Payload, Multi-City 3-Leg Full-Payload, Multi-City 4-Leg Full-Payload]
        default: One-Way
      - name: traveler
        description: "Number of travelers"
        options: [Single Traveler, Two Travelers]
        default: Single Traveler
      - name: payment
        description: "Form of payment"
        options: [Cash, Card]
        default: Cash

  # === Slot-based Held Booking workflow (no payment/ticketing) ===
  - name: Held Booking
    description: "Book a held flight (no payment). Creates a PNR without ticketing. Use Post-Commit Ticketing to ticket later."
    template: workflows/held-booking-base.yaml
    slots:
      - name: trip-search
        description: "How to search for and price flights"
        options: [One-Way, Round-Trip, Multi-City 2-Leg, Multi-City 3-Leg, Multi-City 4-Leg, One-Way Full-Payload, Round-Trip Full-Payload, Multi-City 3-Leg Full-Payload, Multi-City 4-Leg Full-Payload]
        default: One-Way
      - name: traveler
        description: "Number of travelers"
        options: [Single Traveler, Two Travelers]
        default: Single Traveler

  # --- Trip-search slot options ---
  - name: One-Way
    kind: slot
    description: "One-way flight: single search + reference pricing"
    template: workflows/slots/trip-search/oneway.yaml
  - name: Round-Trip
    kind: slot
    description: "Round-trip flight: leg-based search with BuildNext + reference pricing. Return leg goes back to origin."
    template: workflows/slots/trip-search/roundtrip.yaml
  - name: Multi-City 2-Leg
    kind: slot
    description: "2-leg multi-city itinerary: leg-based search with BuildNext + reference pricing"
    template: workflows/slots/trip-search/multicity-2leg.yaml
  - name: Multi-City 3-Leg
    kind: slot
    description: "3-leg multi-city itinerary: leg-based search with 2x BuildNext + reference pricing"
    template: workflows/slots/trip-search/multicity-3leg.yaml
  - name: Multi-City 4-Leg
    kind: slot
    description: "4-leg multi-city itinerary: leg-based search with 3x BuildNext + reference pricing"
    template: workflows/slots/trip-search/multicity-4leg.yaml

  # --- Trip-search full-payload slot options (deprecated) ---
  - name: One-Way Full-Payload
    kind: slot
    description: "One-way flight: single search + full-payload pricing (sends flight details)"
    template: workflows/slots/trip-search/oneway-fullpayload.yaml
    deprecated: true
  - name: Round-Trip Full-Payload
    kind: slot
    description: "Round-trip: journey-based search + full-payload pricing (sends flight details)"
    template: workflows/slots/trip-search/roundtrip-fullpayload.yaml
    deprecated: true
  - name: Multi-City 3-Leg Full-Payload
    kind: slot
    description: "3-leg multi-city: journey-based search + full-payload pricing (sends flight details)"
    template: workflows/slots/trip-search/multicity-3leg-fullpayload.yaml
    deprecated: true
  - name: Multi-City 4-Leg Full-Payload
    kind: slot
    description: "4-leg multi-city: journey-based search + full-payload pricing (sends flight details)"
    template: workflows/slots/trip-search/multicity-4leg-fullpayload.yaml
    deprecated: true

  # --- Traveler slot options ---
  - name: Single Traveler
    kind: slot
    description: "One adult traveler"
    template: workflows/slots/traveler/single.yaml
  - name: Two Travelers
    kind: slot
    description: "Two adult travelers"
    template: workflows/slots/traveler/two.yaml
    inject:
      passengers: 2

  # --- Payment slot options ---
  - name: Cash
    kind: slot
    description: "Cash form of payment"
    template: workflows/slots/payment/cash.yaml
  - name: Card
    kind: slot
    description: "Credit card form of payment"
    template: workflows/slots/payment/card.yaml

  # --- Exchange-search slot options ---
  - name: Broad Search
    kind: slot
    description: "Broad exchange search by origin/destination/date"
    template: workflows/slots/exchange-search/broad.yaml
  - name: EPQ
    kind: slot
    description: "Exchange Price Quote with specific flight criteria"
    template: workflows/slots/exchange-search/epq.yaml

  # === Standalone (non-booking) workflows ===
  - name: Post-Commit Ticketing
    description: "Separate ticketing after a held booking"
    template: workflows/post-commit-ticketing.yaml
  - name: Exchange
    description: "Full exchange workflow: eligibility, search/EPQ, offer, FOP, doc overrides, reissue"
    template: workflows/exchange-base.yaml
    slots:
      - name: exchange-search
        description: "How to search for exchange flights"
        options: [Broad Search, EPQ]
        default: Broad Search
  - name: Ancillary Booking
    kind: addon
    after: addTraveler
    description: "Search and add ancillary services (bags, meals, etc.)"
    template: workflows/addons/ancillary-booking.yaml
  - name: Seat Selection
    kind: addon
    after: [priceOfferFullPayload, priceOfferReference]
    description: "Search seat map and add seat offer"
    template: workflows/addons/seat-selection.yaml
    wire:
      offerListIdentifier: $after.offerIdentifierValue
      offerId: $after.offerId
      productId: $after.productId
  - name: Traveler Modification
    kind: addon
    after: addTraveler
    description: "Two-step traveler update: discover updatable fields, then apply changes"
    template: workflows/addons/traveler-modification.yaml
    wire:
      travelerId: $after.travelerIdentifierValue
  - name: Post-Commit Seat Selection
    description: "Select and assign seats on an existing booking using the post-commit seat map"
    template: workflows/post-commit-seat-selection.yaml
  - name: Post-Commit Ancillary
    description: "Add ancillary services (bags, meals, etc.) to an existing booking"
    template: workflows/post-commit-ancillary.yaml
  - name: Involuntary Schedule Change
    description: "Accept an involuntary schedule change on an impacted PNR"
    template: workflows/involuntary-schedule-change.yaml
  - name: Ticket Void
    description: "Void a ticket on an existing booking"
    template: workflows/ticket-void.yaml
  - name: Cancel Reservation
    description: "Cancel an entire PNR reservation"
    template: workflows/cancel-reservation.yaml
  - name: Order Divide
    description: "Split a traveler out of a multi-traveler PNR into a separate reservation"
    template: workflows/order-divide.yaml
  - name: Special Service Wheelchair
    kind: addon
    after: addTraveler
    description: "Add an airline-supplied wheelchair special service request"
    template: workflows/addons/special-service-wheelchair.yaml
  - name: Reservation Comments
    kind: addon
    after: addTraveler
    description: "Add reservation comments/remarks"
    template: workflows/addons/reservation-comments.yaml
  - name: Accounting Remarks
    kind: addon
    after: addTraveler
    description: "Add accounting remarks to the reservation"
    template: workflows/addons/accounting-remarks.yaml
  - name: Delete Accounting Remarks
    kind: addon
    after: commitReservation
    description: "Delete an accounting remark from a committed reservation"
    template: workflows/addons/delete-accounting-remarks.yaml
    wire:
      locator: commitReservation.locator
  - name: Delete Reservation Comments
    kind: addon
    after: commitReservation
    description: "Delete a reservation comment from a committed reservation"
    template: workflows/addons/delete-reservation-comments.yaml
    wire:
      locator: commitReservation.locator
  - name: Document Overrides
    kind: addon
    after: addTraveler
    description: "Add document overrides (commissions, restrictions, tour codes)"
    template: workflows/addons/document-overrides.yaml
  - name: Primary Contact
    kind: addon
    after: addTraveler
    description: "Add a primary contact (email/phone) to the reservation"
    template: workflows/addons/primary-contact.yaml
  - name: Travel Agency
    kind: addon
    after: addTraveler
    description: "Add travel agency details to the reservation"
    template: workflows/addons/travel-agency.yaml

  # Post-commit addons — attach after commitReservation
  - name: Post-Commit Seat Selection Addon
    kind: addon
    after: commitReservation
    priority: 20
    description: "Add seat selection to an existing booking (post-commit)"
    template: workflows/addons/post-commit-seat-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Post-Commit Ancillary Addon
    kind: addon
    after: commitReservation
    priority: 20
    description: "Add ancillary services to an existing booking (post-commit)"
    template: workflows/addons/post-commit-ancillary-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Cancel Booking
    kind: addon
    after: commitReservation
    priority: 90
    description: "Cancel the reservation after booking (lifecycle test)"
    template: workflows/addons/cancel-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Void Ticket
    kind: addon
    after: commitReservation
    priority: 80
    description: "Void tickets after booking (requires ticketed booking)"
    template: workflows/addons/ticket-void-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Post-Commit Ticketing Addon
    kind: addon
    after: commitReservation
    priority: 30
    description: "Issue tickets for a held booking (post-commit)"
    template: workflows/addons/post-commit-ticketing-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Ticket Details
    kind: addon
    after: commitReservation
    priority: 35
    description: "Retrieve ticket details after booking (requires ticketed booking)"
    template: workflows/addons/ticket-details-addon.yaml
  - name: Exchange Addon
    kind: addon
    after: commitReservation
    priority: 50
    description: "Exchange tickets on an existing booking (post-commit, requires ticketing)"
    template: workflows/addons/exchange-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Retrieve Booking
    kind: addon
    after: commitReservation
    priority: 10
    description: "Retrieve and verify the reservation after booking"
    template: workflows/addons/retrieve-reservation-addon.yaml
    wire:
      identifier: commitReservation.locator
  - name: Fare Rules Check
    kind: addon
    after: commitReservation
    priority: 10
    description: "Check fare rules on the committed reservation"
    template: workflows/addons/fare-rules-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Place On Queue
    kind: addon
    after: commitReservation
    priority: 80
    description: "Place the reservation on a queue after booking"
    template: workflows/addons/place-on-queue-addon.yaml
    wire:
      identifier: commitReservation.locator
      reservationIdentifier: commitReservation.locator

examples:
  - input: "book a one way flight from nyc to lax"
    output: '{"workflow": "Booking", "description": "Book a one-way domestic flight for one traveler.", "choices": {"trip-search": "One-Way"}}'
  - input: "round trip from chicago to paris for two travelers, pay with amex, add seats"
    output: '{"workflow": "Booking", "description": "Round-trip international flight for two with seat selection and Amex payment.", "choices": {"trip-search": "Round-Trip", "traveler": "Two Travelers", "payment": "Card"}, "addons": ["Seat Selection"], "layers": ["international", "amex"]}'
  - input: "exchange a booking to a different flight"
    output: '{"workflow": "Exchange", "description": "Exchange an existing booking for a different flight."}'

oas: travelport-api-oas-11.31.0.json

errorDetection:
  - path: "ErrorResponse.Result.Error"
    rule: non-empty
    details:
      message: "ErrorResponse.Result.Error.0.Message"
      code: "ErrorResponse.Result.Error.0.SourceCode"
      category: "ErrorResponse.Result.Error.0.category"

notes: |
  Key identifier patterns:
  - `id`: Local, intra-message scope (e.g., CatalogProductOffering.id)
  - `*Ref` fields: Cross-reference within a message (e.g., productRef)
  - `Identifier.value`: Globally unique GUID that persists across API calls
  Design notes:
  - Reference vs full-payload flows differ only in how pricing/offer data is sent
  - ignoreWorkbench can discard an uncommitted workbench if needed
  - Exchange flow is GDS-only; no NDC exchange operations exist
  - Form of Payment has many subtypes; graph covers Cash, Card, Forfeit, Waiver, Invoice
  - Templates default to GDS content; NDC may require different request structures

nodes:
  # ============================================================
  # SEARCH
  # ============================================================
  searchFlights:
    description: "Search for air catalog product offerings (flights). This is step 1 in all booking flows."
    adapter: searchFlights
    oas:
      operationId: CreateAirSearch
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: origin
        type: string
        description: "Departure airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "Arrival airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "Departure date (YYYY-MM-DD)"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 7 days}}", "{{today + 10 days}}", "{{today + 14 days}}", "{{today + 21 days}}", "{{today + 30 days}}"]
      - name: passengers
        type: integer
        description: "Number of adult passengers (1-9)"
        optional: true
        configurable: true
        default: 1
        constraints:
          min: 1
          max: 9
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference. Values: Economy, PremiumEconomy, Business, First"
        optional: true
        configurable: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code. Examples: AA=American, UA=United, DL=Delta, WN=Southwest, B6=JetBlue"
        optional: true
        configurable: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
        description: "Maximum number of connections. Use 0 for nonstop-only results"
        optional: true
        configurable: true
        constraints:
          min: 0
          max: 3
      - name: returnDate
        type: date
        description: "Return date for round-trip searches"
        optional: true
        configurable: true
      - name: contentSource
        type: string
        description: "Content source for search results. Use 'NDC' for New Distribution Capability (direct airline content), 'GDS' for traditional GDS content. For NDC you MUST specify an airline in carrierPreference, as NDC searches are airline-specific."
        optional: true
        configurable: true
        default: GDS
      - name: searchRepresentation
        type: string
        description: "Search representation mode (e.g., 'Leg' for leg-based search)"
        optional: true
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "List of flight offerings grouped by O&D"
        elementFields:
          - name: offeringId
            type: string
          - name: productId
            type: string
          - name: brand
            type: string
          - name: departure
            type: string
          - name: arrival
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: carrier
            type: string
          - name: flightNumber
            type: string
          - name: departureDate
            type: date
          - name: departureTime
            type: string
          - name: arrivalDate
            type: date
          - name: arrivalTime
            type: string
          - name: cabin
            type: string
          - name: classOfService
            type: string
          - name: totalPrice
            type: float
          - name: currency
            type: string
          - name: stops
            type: integer
          - name: totalDuration
            type: string
          - name: leg
            type: integer
      - name: catalogProductOfferingsId
        type: string
        description: "Identifier.value for the entire CatalogProductOfferings container"
      - name: transactionId
        type: string
        description: "Transaction tracking ID from the response"

  searchFlights2Leg:
    description: "Search for multi-city flights with two legs. Journey-based search sending both legs in a single call."
    adapter: searchFlights
    oas:
      operationId: CreateAirSearch
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: leg1Origin
        type: string
        description: "Leg 1 departure airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg1Destination
        type: string
        description: "Leg 1 arrival airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg1Origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg1DepartureDate
        type: date
        description: "Leg 1 departure date (YYYY-MM-DD)"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 7 days}}", "{{today + 8 days}}", "{{today + 9 days}}", "{{today + 10 days}}", "{{today + 14 days}}"]
      - name: passengers
        type: integer
        description: "Number of adult passengers (1-9)"
        optional: true
        configurable: true
        default: 1
        constraints:
          min: 1
          max: 9
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference. Values: Economy, PremiumEconomy, Business, First"
        optional: true
        configurable: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code. Examples: AA=American, UA=United, DL=Delta, WN=Southwest, B6=JetBlue"
        optional: true
        configurable: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
        description: "Maximum number of connections. Use 0 for nonstop-only results"
        optional: true
        configurable: true
        constraints:
          min: 0
          max: 3
      - name: contentSource
        type: string
        description: "Content source for search results. Use 'NDC' for New Distribution Capability (direct airline content), 'GDS' for traditional GDS content. For NDC you MUST specify an airline in carrierPreference, as NDC searches are airline-specific."
        optional: true
        configurable: true
        default: GDS
      - name: searchRepresentation
        type: string
        description: "Search representation mode (e.g., 'Leg' for leg-based search)"
        optional: true
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          fromResolved: leg1Destination
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2Destination
        type: string
        description: "Leg 2 arrival airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg2Origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2DepartureDate
        type: date
        description: "Leg 2 departure date (YYYY-MM-DD)"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 20 days}}", "{{today + 21 days}}", "{{today + 22 days}}", "{{today + 23 days}}", "{{today + 28 days}}"]
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "List of flight offerings grouped by O&D"
        elementFields:
          - name: offeringId
            type: string
          - name: productId
            type: string
          - name: brand
            type: string
          - name: departure
            type: string
          - name: arrival
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: carrier
            type: string
          - name: flightNumber
            type: string
          - name: departureDate
            type: date
          - name: departureTime
            type: string
          - name: arrivalDate
            type: date
          - name: arrivalTime
            type: string
          - name: cabin
            type: string
          - name: classOfService
            type: string
          - name: totalPrice
            type: float
          - name: currency
            type: string
          - name: stops
            type: integer
          - name: totalDuration
            type: string
          - name: leg
            type: integer
      - name: catalogProductOfferingsId
        type: string
        description: "Identifier.value for the entire CatalogProductOfferings container"
      - name: transactionId
        type: string
        description: "Transaction tracking ID from the response"

  searchFlights3Leg:
    description: "Search for multi-city flights with three legs. Journey-based search sending all three legs in a single call."
    adapter: searchFlights
    oas:
      operationId: CreateAirSearch
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: leg1Origin
        type: string
        description: "Leg 1 departure airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]
        constraints:
          minLength: 3
