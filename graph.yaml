          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg1Destination
        type: string
        description: "Leg 1 arrival airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg1Origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg1DepartureDate
        type: date
        description: "Leg 1 departure date (YYYY-MM-DD)"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 7 days}}", "{{today + 8 days}}", "{{today + 9 days}}", "{{today + 10 days}}", "{{today + 14 days}}"]
      - name: passengers
        type: integer
        description: "Number of adult passengers (1-9)"
