  - from: createWorkbenchFromLocator.workbenchId
    to: addFormOfPaymentForfeit.workbenchId
  - from: createWorkbenchFromLocator.workbenchId
    to: addFormOfPaymentWaiver.workbenchId
  - from: createWorkbenchFromLocator.workbenchId
    to: addFormOfPaymentInvoice.workbenchId

  # Ticket → Exchange Eligibility (by ticket number)
  - from: getTicketByLocator.tickets
