version: "1.0.0"
title: "Travelport+ Air v11 API"
description: |
  Comprehensive AAT graph for the Travelport+ JSON Air v11 API surface.
  Models the full air booking lifecycle including search, pricing, reservation
  management, ticketing, exchanges, ancillary/seat services, and traveler
  modification workflows.

autoWire: true

workflows:
  - name: Reference-Based Booking
    description: "Standard GDS booking flow using identifier references"
    steps: [searchFlights, priceOfferReference, createWorkbench, addOfferReference, addTraveler, addFormOfPaymentCash, addPayment, commitReservation]
  - name: Full-Payload Booking
    description: "Alternative flow sending complete trip details instead of references"
    steps: [searchFlights, priceOfferFullPayload, createWorkbench, addOfferFullPayload, addTraveler, addFormOfPaymentCard, addPayment, commitReservation]
  - name: Post-Commit Ticketing
    description: "Separate ticketing after a held booking"
    steps: [commitReservation, createWorkbenchFromLocator, addFormOfPaymentCash, addPayment, commitTicket]
  - name: Exchange
    description: "Full exchange workflow: eligibility check, search, offer, FOP, document overrides, reissue"
    steps: [getExchangeEligibility, createWorkbenchFromLocator, searchExchange, addExchangeOffer, addFormOfPaymentForfeit, addPayment, addDocumentOverrides, commitExchangeTicket]
  - name: Ancillary Booking
    description: "Search and add ancillary services (bags, meals, etc.)"
    steps: [searchAncillaries, addAncillaryOffer]
  - name: Seat Selection
    description: "Search seat map and add seat offer"
    steps: [searchSeatMap, addSeatOffer]
  - name: Traveler Modification
    description: "Two-step traveler update: discover updatable fields, then apply changes"
    steps: [getUpdatableTravelerItems, updateTraveler]

notes: |
  Key identifier patterns:
  - `id`: Local, intra-message scope (e.g., CatalogProductOffering.id)
  - `*Ref` fields: Cross-reference within a message (e.g., productRef)
  - `Identifier.value`: Globally unique GUID that persists across API calls
  Graph edges use Identifier.value for cross-node data flow.

  Design notes:
  - Reference vs full-payload flows differ only in how pricing/offer data is sent
  - Workbench cleanup (ignoreWorkbench) is set on nodes that create workbenches
  - Exchange flow is GDS-only; no NDC exchange operations exist
  - Form of Payment has many subtypes; graph covers Cash, Card, Forfeit, Waiver, Invoice
  - Templates default to GDS content; NDC may require different request structures

nodes:
  # ============================================================
  # SEARCH
  # ============================================================
  searchFlights:
    description: "Search for air catalog product offerings (flights). This is step 1 in all booking flows."
    adapter: searchFlights
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: origin
        type: string
        description: "Departure airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "Arrival airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "Departure date (YYYY-MM-DD)"
      - name: passengers
        type: integer
        description: "Number of adult passengers"
        optional: true
        default: 1
        constraints:
          min: 1
          max: 9
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference (Economy, PremiumEconomy, Business, First)"
        optional: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code (e.g. UA, AA, DL)"
        optional: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
        description: "Maximum number of connections (0 = nonstop only)"
        optional: true
        constraints:
          min: 0
          max: 3
      - name: returnDate
        type: date
        description: "Return date for round-trip searches"
        optional: true
      - name: contentSource
        type: string
        description: "Content source (GDS or NDC)"
        optional: true
        default: GDS
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "List of flight offerings grouped by O&D"
        elementFields:
          - name: offeringId
            type: string
            path: "id"
          - name: productId
            type: string
            path: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.productRef"
          - name: productIds
            type: string
            path: "ProductBrandOptions.0.ProductBrandOffering.0.Product.0.productRef"
          - name: departure
            type: string
            path: "Departure"
          - name: arrival
            type: string
            path: "Arrival"
          - name: offeringIdentifierValue
            type: string
            path: "Identifier.value"
      - name: catalogProductOfferingsId
        type: string
        description: "Identifier.value for the entire CatalogProductOfferings container"
      - name: transactionId
        type: string
        description: "Transaction tracking ID from the response"

  searchFlightsNextLeg:
    description: "Search for flights on the next leg of a multi-leg itinerary (e.g., return flight)."
    adapter: searchFlightsNextLeg
    tags: [search]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from the initial search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id from the initial search"
      - name: productId
        type: string
        description: "Selected Product id from the initial search offering"
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "Flight offerings for the next leg"
        elementFields:
          - name: offeringId
            type: string
            path: "id"
          - name: departure
            type: string
            path: "Departure"
          - name: arrival
            type: string
            path: "Arrival"
          - name: offeringIdentifierValue
            type: string
            path: "Identifier.value"
      - name: catalogProductOfferingsId
        type: string
        description: "Updated CatalogProductOfferings Identifier.value"

  searchUpsells:
    description: "Return all upsell options for a specific flight offering."
    adapter: searchUpsells
    tags: [search, pricing]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from the search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id to get upsells for"
      - name: productId
        type: string
        description: "Selected Product id"
    outputs:
      - name: upsellOfferings
        type: offering[]
        description: "Available upsell offerings"
        elementFields:
          - name: offeringId
            type: string
            path: "id"
          - name: offeringIdentifierValue
            type: string
            path: "Identifier.value"

  # ============================================================
  # PRICING
  # ============================================================
  priceOfferReference:
    description: "Price a flight offer using reference payload (references search results by identifier)."
    adapter: priceOfferReference
    tags: [pricing]
    requires: [flightsSearched]
    satisfies: [offerPriced]
    preferred: true
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productIds
        type: string
        description: "Comma-separated Product ids to include in the price request"
    outputs:
      - name: offerId
        type: string
        description: "Offer id from the price response"
      - name: totalPrice
        type: float
        description: "Total price amount"
      - name: currencyCode
        type: string
        description: "Currency code of the price"

  priceOfferFullPayload:
    description: "Price a flight offer using full payload (sends complete trip details)."
    adapter: priceOfferFullPayload
    tags: [pricing]
    requires: [flightsSearched]
    satisfies: [offerPriced]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productIds
        type: string
        description: "Comma-separated Product ids to include"
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from price response"
      - name: offerId
        type: string
        description: "Offer id from price response"
      - name: totalPrice
        type: float
        description: "Total price amount"
      - name: currencyCode
        type: string
        description: "Currency code of the price"

  # ============================================================
  # RESERVATION WORKBENCH
  # ============================================================
  createWorkbench:
    description: "Create a new reservation workbench (booking session). Required before adding offers, travelers, etc."
    adapter: createWorkbench
    tags: [workbench]
    satisfies: [workbenchCreated]
    preferred: true
    inputs: []
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value (used in all subsequent workbench operations)"
    cleanup: ignoreWorkbench

  createWorkbenchFromLocator:
    description: "Create a workbench from an existing reservation (by PNR locator). Used for post-commit operations like ticketing."
    adapter: createWorkbenchFromLocator
    tags: [workbench]
    satisfies: [workbenchCreated]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator (e.g., ABCDEF)"
        noAutoWire: true
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the existing reservation"
      - name: offerId
        type: string
        description: "Offer id from the existing reservation"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority from the existing reservation"
    cleanup: ignoreWorkbench

  ignoreWorkbench:
    description: "Discard the workbench and any uncommitted changes. Cleanup operation."
    adapter: ignoreWorkbench
    tags: [workbench, management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value to discard"
    outputs: []

  retrieveWorkbench:
    description: "Retrieve the current state of a reservation workbench."
    adapter: retrieveWorkbench
    tags: [workbench, management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
        noAutoWire: true
    outputs:
      - name: workbenchId
        type: string
        description: "Workbench Identifier.value"
      - name: offers
        type: offer[]
        description: "Offers currently in the workbench"
        elementFields:
          - name: offerId
            type: string
            path: "id"
          - name: offerIdentifierValue
            type: string
            path: "Identifier.value"
          - name: offerAuthority
            type: string
            path: "Identifier.authority"

  # ============================================================
  # ADD OFFER TO WORKBENCH
  # ============================================================
  addOfferReference:
    description: "Add a priced offer to the workbench using reference payload."
    adapter: addOfferReference
    tags: [offer]
    requires: [offerPriced, workbenchCreated]
    satisfies: [offerAdded]
    preferred: true
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
        noAutoWire: true
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productIds
        type: string
        description: "Comma-separated Product ids"
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value now in the workbench"
      - name: offerAuthority
        type: string
        description: "Offer authority"

  addOfferFullPayload:
    description: "Add a priced offer to the workbench using full payload."
    adapter: addOfferFullPayload
    tags: [offer]
    requires: [offerPriced, workbenchCreated]
    satisfies: [offerAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
        noAutoWire: true
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productIds
        type: string
        description: "Comma-separated Product ids"
    outputs:
      - name: workbenchId
        type: string
        description: "Updated workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value now in the workbench"
      - name: offerId
        type: string
        description: "Offer id in the workbench"
      - name: offerAuthority
        type: string
        description: "Offer authority"
      - name: totalPrice
        type: float
        description: "Total price of the offer"
      - name: currencyCode
        type: string
        description: "Currency code"

  # ============================================================
  # TRAVELERS
  # ============================================================
  addTraveler:
    description: "Add a traveler to the reservation workbench. Each traveler must be added in a separate request."
    adapter: addTraveler
    tags: [traveler]
    requires: [workbenchCreated]
    satisfies: [travelerAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: givenName
        type: string
        description: "Traveler first/given name"
        constraints:
          minLength: 1
          maxLength: 50
      - name: surname
        type: string
        description: "Traveler last/family name"
        constraints:
          minLength: 1
          maxLength: 50
      - name: gender
        type: enum[Male, Female, Unknown, Undisclosed]
        description: "Traveler gender"
        optional: true
        default: Male
      - name: birthDate
        type: date
        description: "Traveler date of birth (YYYY-MM-DD)"
        optional: true
        default: "1990-01-15"
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF)"
        optional: true
        default: ADT
      - name: email
        type: string
        description: "Traveler email address"
        optional: true
        default: "test@example.com"
      - name: phoneNumber
        type: string
        description: "Traveler phone number"
        optional: true
        default: "5551234567"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
      - name: phoneCountryCode
        type: string
        description: "Phone country access code"
        optional: true
        default: "1"
    outputs:
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value"
      - name: travelerId
        type: string
        description: "Traveler id"

  addPrimaryContact:
    description: "Add a primary contact (email/phone) to the reservation workbench."
    adapter: addPrimaryContact
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: email
        type: string
        description: "Contact email address"
      - name: phoneNumber
        type: string
        description: "Contact phone number"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
      - name: phoneCountryCode
        type: string
        description: "Phone country access code"
        optional: true
        default: "1"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to associate the contact with"
        optional: true
    outputs:
      - name: primaryContactId
        type: string
        description: "Primary contact id"

  # ============================================================
  # FORM OF PAYMENT
  # ============================================================
  addFormOfPaymentCash:
    description: "Add cash as the form of payment."
    adapter: addFormOfPaymentCash
    tags: [payment]
    requires: [workbenchCreated]
    satisfies: [formOfPaymentAdded]
    preferred: true
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: fopId
        type: string
        description: "Form of payment id"

  addFormOfPaymentCard:
    description: "Add a credit card as the form of payment."
    adapter: addFormOfPaymentCard
    tags: [payment]
    requires: [workbenchCreated]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: cardNumber
        type: string
        description: "Credit card number"
      - name: cardExpiry
        type: string
        description: "Card expiration (MMYY format)"
        constraints:
          minLength: 4
          maxLength: 4
          pattern: "^(0[1-9]|1[0-2])\\d{2}$"
          description: "Card expiry in MMYY format"
      - name: cardCode
        type: string
        description: "Card type code (VI, MC, AX, etc.)"
        optional: true
        default: VI
      - name: cardHolderName
        type: string
        description: "Name on the card"
      - name: cvv
        type: string
        description: "Card security code"
        optional: true
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: fopId
        type: string
        description: "Form of payment id"

  # ============================================================
  # PAYMENT
  # ============================================================
  addPayment:
    description: "Apply payment to the offer in the workbench. Must be done after AddFormOfPayment."
    adapter: addPayment
    tags: [payment]
    requires: [formOfPaymentAdded]
    satisfies: [paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: amount
        type: float
        description: "Payment amount"
      - name: currencyCode
        type: string
        description: "Currency code (e.g., USD, GBP)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "ISO 4217 currency code"
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to pay for"
      - name: offerId
        type: string
        description: "Offer id"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority"
        optional: true
        default: Travelport
    outputs:
      - name: paymentIdentifierValue
        type: string
        description: "Payment Identifier.value"

  # ============================================================
  # COMMIT
  # ============================================================
  commitReservation:
    description: "Commit the workbench to create a held booking (PNR). If payment was added, this also tickets the itinerary."
    adapter: commitReservation
    tags: [commit]
    requires: [offerAdded, travelerAdded, paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value to commit"
        noAutoWire: true
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Receipt Identifier.value from the commit response"
      - name: locator
        type: string
        description: "PNR record locator (e.g., ABCDEF)"

  # ============================================================
  # RESERVATION MANAGEMENT
  # ============================================================
  retrieveReservation:
    description: "Retrieve a reservation by its identifier or PNR locator."
    adapter: retrieveReservation
    tags: [management]
    inputs:
      - name: identifier
        type: string
        description: "Reservation Identifier.value or PNR record locator"
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
      - name: reservationStatus
        type: string
        description: "Reservation status"
      - name: offers
        type: offer[]
        description: "Offers in the reservation"
        elementFields:
          - name: offerId
            type: string
            path: "id"
          - name: offerIdentifierValue
            type: string
            path: "Identifier.value"

  cancelOffer:
    description: "Cancel an offer within an existing reservation."
    adapter: cancelOffer
    tags: [management]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to cancel"
    outputs:
      - name: reservationStatus
        type: string
        description: "Updated reservation status"

  # ============================================================
  # TICKETING
  # ============================================================
  commitTicket:
    description: "Commit reservation workbench with ticket issuance. Used post-commit when ticketing separately."
    adapter: commitTicket
    tags: [ticketing, commit]
    requires: [paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value (from post-commit workbench)"
        noAutoWire: true
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"

  getTicketByLocator:
    description: "Retrieve tickets associated with a PNR locator."
    adapter: getTicketByLocator
    tags: [ticketing]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        noAutoWire: true
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: tickets
        type: ticket[]
        description: "List of tickets"
        elementFields:
          - name: ticketNumber
            type: string
            path: "TicketNumber"
          - name: ticketIdentifierValue
            type: string
            path: "Identifier.value"
          - name: ticketStatus
            type: string
            path: "TicketStatusCode"

  voidTicket:
    description: "Void a ticket (GDS only)."
    adapter: voidTicket
    tags: [ticketing]
    inputs:
      - name: ticketIdentifier
        type: string
        description: "Ticket Identifier.value to void"
    outputs:
      - name: ticketStatus
        type: string
        description: "Updated ticket status"

  # ============================================================
  # ANCILLARIES
  # ============================================================
  searchAncillaries:
    description: "Search for available ancillaries (bags, meals, etc.) for a reservation in a workbench."
    adapter: searchAncillaries
    tags: [ancillary, search]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to search ancillaries for"
        noAutoWire: true
    outputs:
      - name: ancillaryOfferings
        type: ancillary[]
        description: "Available ancillary offerings"
        elementFields:
          - name: ancillaryId
            type: string
            path: "id"
          - name: ancillaryIdentifierValue
            type: string
            path: "Identifier.value"
          - name: ancillaryName
            type: string
            path: "name"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"

  # ============================================================
  # SEAT MAP
  # ============================================================
  searchSeatMap:
    description: "Request seat availability (seat map) for flights in the workbench."
    adapter: searchSeatMap
    tags: [seat, search]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value"
        noAutoWire: true
      - name: productIdentifierValue
        type: string
        description: "Product Identifier.value for the specific flight segment"
    outputs:
      - name: seatOfferings
        type: seat[]
        description: "Available seat offerings"
        elementFields:
          - name: seatId
            type: string
            path: "id"
          - name: seatIdentifierValue
            type: string
            path: "Identifier.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"

  # ============================================================
  # FARE RULES
  # ============================================================
  getFareRulesFromSearch:
    description: "Get fare rules by reference to search (CatalogProductOfferings) results."
    adapter: getFareRulesFromSearch
    tags: [fare-rules]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value"
      - name: offeringId
        type: string
        description: "CatalogProductOffering id"
      - name: productId
        type: string
        description: "Product id within the offering"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  getFareRulesFromOffer:
    description: "Get fare rules by reference to a priced offer."
    adapter: getFareRulesFromOffer
    tags: [fare-rules]
    inputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from a price response"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  # ============================================================
  # EXCHANGE
  # ============================================================
  getExchangeEligibility:
    description: "Check if tickets on a reservation are eligible for exchange (by PNR locator)."
    adapter: getExchangeEligibility
    tags: [exchange]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: eligibilities
        type: eligibility[]
        description: "Per-ticket exchange eligibility results"
        elementFields:
          - name: ticketNumber
            type: string
            path: "Ticket.TicketNumber"
          - name: exchangeable
            type: string
            path: "exchangeable"

  getExchangeEligibilityByTicket:
    description: "Check if a specific ticket is eligible for exchange (by ticket number)."
    adapter: getExchangeEligibilityByTicket
    tags: [exchange]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket number to check eligibility for"
    outputs:
      - name: eligibilities
        type: eligibility[]
        description: "Per-ticket exchange eligibility results"
        elementFields:
          - name: ticketNumber
            type: string
            path: "Ticket.TicketNumber"
          - name: exchangeable
            type: string
            path: "exchangeable"

  searchExchange:
    description: "Search for flights to exchange existing tickets."
    adapter: searchExchange
    tags: [exchange, search]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value (from workbench)"
      - name: offerIdentifierValue
        type: string
        description: "Original offer Identifier.value to exchange"
        noAutoWire: true
      - name: origin
        type: string
        description: "New departure airport/city code"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "New arrival airport/city code"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "New departure date"
    outputs:
      - name: exchangeOfferings
        type: offering[]
        description: "Available exchange flight offerings"
        elementFields:
          - name: offeringId
            type: string
            path: "id"
          - name: offeringIdentifierValue
            type: string
            path: "Identifier.value"
          - name: totalPrice
            type: string
            path: "Price.TotalPrice.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferings Identifier.value for downstream addExchangeOffer"

  addExchangeOffer:
    description: "Add an exchange offer to the workbench (build from catalog offerings). This replaces the original offer with the new exchange offer."
    adapter: addExchangeOffer
    tags: [exchange, offer]
    satisfies: [exchangeOfferAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
        noAutoWire: true
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferings Identifier.value from exchange search"
        noAutoWire: true
      - name: catalogOfferingIdentifierValue
        type: string
        description: "Selected CatalogOffering Identifier.value from exchange search"
    outputs:
      - name: workbenchId
        type: string
        description: "Updated workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Exchange offer Identifier.value"
      - name: offerId
        type: string
        description: "Exchange offer id"
      - name: offerAuthority
        type: string
        description: "Exchange offer Identifier.authority"
      - name: totalPrice
        type: float
        description: "Total price of the exchange offer"
      - name: currencyCode
        type: string
        description: "Currency code"
    cleanup: ignoreWorkbench

  commitExchangeTicket:
    description: "Commit the exchange and issue new tickets (payLaterInd=false)."
    adapter: commitExchangeTicket
    tags: [exchange, ticketing, commit]
    requires: [exchangeOfferAdded, paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
        noAutoWire: true
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
      - name: reservationStatus
        type: string
        description: "Reservation status after exchange"

  # ============================================================
  # EXCHANGE FORM OF PAYMENT
  # ============================================================
  addFormOfPaymentForfeit:
    description: "Add forfeit as form of payment (penalty amount forfeited by passenger)."
    adapter: addFormOfPaymentForfeit
    tags: [payment, exchange]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: fopId
        type: string
        description: "Form of payment id"

  addFormOfPaymentWaiver:
    description: "Add a waiver code as form of payment (airline-issued disruption waiver)."
    adapter: addFormOfPaymentWaiver
    tags: [payment, exchange]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: waiverCode
        type: string
        description: "Airline waiver code"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: fopId
        type: string
        description: "Form of payment id"

  addFormOfPaymentInvoice:
    description: "Add an agent invoice as form of payment."
    adapter: addFormOfPaymentInvoice
    tags: [payment]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: invoiceNumber
        type: string
        description: "Agent invoice number"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: fopId
        type: string
        description: "Form of payment id"

  # ============================================================
  # DOCUMENT OVERRIDES
  # ============================================================
  addDocumentOverrides:
    description: "Add document overrides (commissions, restrictions, tour codes, change fee method) for exchange ticketing."
    adapter: addDocumentOverrides
    tags: [exchange, ticketing]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: commissionAmount
        type: float
        description: "Commission amount"
        optional: true
      - name: commissionCurrencyCode
        type: string
        description: "Commission currency code"
        optional: true
      - name: restriction
        type: string
        description: "Restriction text (e.g., NON Exchange)"
        optional: true
      - name: tourCode
        type: string
        description: "Tour code value"
        optional: true
      - name: changeFeeCode
        type: string
        description: "Change fee collection code"
        optional: true
      - name: changeFeeMethod
        type: string
        description: "Change fee collection method (e.g., EMD)"
        optional: true
    outputs:
      - name: documentOverridesId
        type: string
        description: "Document overrides id"

  # ============================================================
  # RESERVATION REMARKS
  # ============================================================
  addReservationComment:
    description: "Add a reservation comment/remark (general, notepad, historical, vendor, etc.)."
    adapter: addReservationComment
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: commentName
        type: string
        description: "Comment category code (RE=general, RI=itinerary, RN=notepad, RH=historical, RV=vendor)"
      - name: commentValue
        type: string
        description: "Comment text"
    outputs:
      - name: reservationCommentId
        type: string
        description: "Reservation comment id"
      - name: commentId
        type: string
        description: "Individual comment id within the reservation comment"

  deleteReservationComment:
    description: "Delete a specific comment from a reservation comment entry."
    adapter: deleteReservationComment
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: reservationCommentId
        type: string
        description: "Reservation comment container id"
      - name: commentId
        type: string
        description: "Individual comment id to delete"
    outputs: []

  addAccountingRemark:
    description: "Add an accounting remark to the reservation."
    adapter: addAccountingRemark
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: accountingName
        type: string
        description: "Accounting field name code (IN=invoice, AN=accounting number, AC=account code)"
      - name: accountingValue
        type: string
        description: "Accounting field value"
    outputs:
      - name: accountingId
        type: string
        description: "Accounting entry id"
      - name: nameValuePairId
        type: string
        description: "Name-value pair id within the accounting entry"

  deleteAccountingRemark:
    description: "Delete a specific name-value pair from an accounting entry."
    adapter: deleteAccountingRemark
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: accountingId
        type: string
        description: "Accounting entry id"
      - name: nameValuePairId
        type: string
        description: "Name-value pair id to delete"
    outputs: []

  # ============================================================
  # SPECIAL SERVICES
  # ============================================================
  addSpecialService:
    description: "Add special service requests (SSRs) like wheelchair, meal preference, etc."
    adapter: addSpecialService
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: ssrCode
        type: string
        description: "SSR code (e.g., WCHR, VGML, BLND)"
      - name: text
        type: string
        description: "Free-text SSR description"
        optional: true
    outputs:
      - name: specialServiceId
        type: string
        description: "Special service id"

  # ============================================================
  # QUEUES
  # ============================================================
  placeOnQueue:
    description: "Move a reservation to a specified queue."
    adapter: placeOnQueue
    tags: [queue, management]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value"
      - name: queueNumber
        type: string
        description: "Queue number"
        constraints:
          pattern: "^\\d+$"
          description: "Numeric queue identifier"
      - name: pcc
        type: string
        description: "PCC (pseudo city code) for the queue"
        optional: true
    outputs: []

  # ============================================================
  # ANCILLARY/SEAT BOOKING
  # ============================================================
  addAncillaryOffer:
    description: "Add an ancillary offer (bags, meals, etc.) to the workbench from catalog offerings."
    adapter: addAncillaryOffer
    tags: [ancillary, offer]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value from ancillary search"
        noAutoWire: true
      - name: ancillaryOfferingId
        type: string
        description: "CatalogOffering id of the selected ancillary"
      - name: ancillaryProductId
        type: string
        description: "Product id within the ancillary offering"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to associate the ancillary with"
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value of the added ancillary"
      - name: offerId
        type: string
        description: "Offer id of the added ancillary"

  addSeatOffer:
    description: "Add a seat offer to the workbench from seat map catalog offerings."
    adapter: addSeatOffer
    tags: [seat, offer]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value from seat map search"
        noAutoWire: true
      - name: seatOfferingIdentifierValue
        type: string
        description: "Seat CatalogOffering Identifier.value"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to assign the seat to"
      - name: seatAssignment
        type: string
        description: "Seat number (e.g., 12A)"
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value of the added seat"
      - name: offerId
        type: string
        description: "Offer id of the added seat"

  # ============================================================
  # DELETE OPERATIONS
  # ============================================================
  deleteSpecialService:
    description: "Delete a special service request from the workbench."
    adapter: deleteSpecialService
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: specialServiceId
        type: string
        description: "Special service id to delete"
    outputs: []

  deletePrimaryContact:
    description: "Delete a primary contact from the workbench."
    adapter: deletePrimaryContact
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: primaryContactId
        type: string
        description: "Primary contact id to delete"
    outputs: []

  cancelWorkbenchOffer:
    description: "Cancel an ancillary or seat offer from the workbench (pre-commit). Different from cancelOffer which operates on committed reservations."
    adapter: cancelWorkbenchOffer
    tags: [management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to cancel"
    outputs: []

  # ============================================================
  # TICKET DETAILS & RECEIPTS
  # ============================================================
  getTicketDetails:
    description: "Display details of a specific ticket by ticket number."
    adapter: getTicketDetails
    tags: [ticketing]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket number to retrieve"
    outputs:
      - name: ticketNumber
        type: string
        description: "Ticket number"
      - name: ticketStatus
        type: string
        description: "Ticket status code"
      - name: ticketIdentifierValue
        type: string
        description: "Ticket Identifier.value"

  getReceiptIndex:
    description: "List all tickets/receipts for a PNR (receipt/document view)."
    adapter: getReceiptIndex
    tags: [ticketing]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: receipts
        type: receipt[]
        description: "List of receipts/tickets for the PNR"

  # ============================================================
  # RESERVATION CANCELLATION
  # ============================================================
  cancelReservation:
    description: "Cancel an entire PNR reservation (with receipt). Different from cancelOffer which only cancels one offer."
    adapter: cancelReservation
    tags: [management]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator to cancel"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs: []

  # ============================================================
  # FARE RULES (FROM RESERVATION)
  # ============================================================
  getFareRulesFromReservation:
    description: "Get fare rules from a committed reservation (by PNR locator)."
    adapter: getFareRulesFromReservation
    tags: [fare-rules]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  # ============================================================
  # WORKBENCH FROM TICKET NUMBER
  # ============================================================
  createWorkbenchFromIdentifier:
    description: "Create a workbench from a ticket/document number instead of PNR locator. Alternative entry point for post-commit operations."
    adapter: createWorkbenchFromIdentifier
    tags: [workbench]
    satisfies: [workbenchCreated]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket or document number"
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the existing reservation"
      - name: offerId
        type: string
        description: "Offer id from the existing reservation"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority from the existing reservation"
    cleanup: ignoreWorkbench

  # ============================================================
  # TRAVELER MODIFICATION
  # ============================================================
  getUpdatableTravelerItems:
    description: "Discover which traveler fields can be modified (step 1 of traveler update workflow)."
    adapter: getUpdatableTravelerItems
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to check updatable fields for"
    outputs:
      - name: updatableItems
        type: json
        description: "Updatable item list for use in updateTraveler"

  updateTraveler:
    description: "Modify traveler details (email, phone, address, frequent flyer). Step 2 of traveler update workflow."
    adapter: updateTraveler
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: travelerId
        type: string
        description: "Traveler id to update"
      - name: updatableItemId
        type: string
        description: "TravelerUpdatableItem id from getUpdatableTravelerItems"
      - name: updateValue
        type: string
        description: "New value for the field being updated"
    outputs:
      - name: travelerIdentifierValue
        type: string
        description: "Updated traveler Identifier.value"

  # ============================================================
  # ADVANCED OPERATIONS
  # ============================================================
  divideReservation:
    description: "Split a multi-traveler PNR into separate reservations."
    adapter: divideReservation
    tags: [management]
    inputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value to divide"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to split out"
    outputs:
      - name: locator
        type: string
        description: "PNR record locator of the new reservation"
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value of the new reservation"

  addTravelAgency:
    description: "Add travel agency details to the reservation."
    adapter: addTravelAgency
    tags: [management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: corporateCode
        type: string
        description: "Corporate code for the travel agency"
      - name: email
        type: string
        description: "Travel agency email"
      - name: phoneNumber
        type: string
        description: "Travel agency phone number"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
    outputs:
      - name: travelAgencyId
        type: string
        description: "Travel agency id"

# ============================================================
# EDGES — Explicit edges only; auto-wire handles name-matched
# scalar output→input connections for non-optional inputs.
# ============================================================
edges:
  # ============================================================
  # SELECT EDGES — Array output → element selection
  # ============================================================

  # Search flights → downstream (select offering from results)
  - from: searchFlights.catalogProductOfferings
    to: searchFlightsNextLeg.offeringId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: searchFlightsNextLeg.productId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: searchUpsells.offeringId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: searchUpsells.productId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: priceOfferReference.offeringId
    select: true
    preferred: true
  - from: searchFlights.catalogProductOfferings
    to: priceOfferReference.productIds
    select: true
    preferred: true
  - from: searchFlights.catalogProductOfferings
    to: priceOfferFullPayload.offeringId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: priceOfferFullPayload.productIds
    select: true
  - from: searchFlights.catalogProductOfferings
    to: addOfferReference.offeringId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: addOfferReference.productIds
    select: true
  - from: searchFlights.catalogProductOfferings
    to: addOfferFullPayload.offeringId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: addOfferFullPayload.productIds
    select: true
  - from: searchFlights.catalogProductOfferings
    to: getFareRulesFromSearch.offeringId
    select: true
  - from: searchFlights.catalogProductOfferings
    to: getFareRulesFromSearch.productId
    select: true

  # Ticket selection
  - from: getTicketByLocator.tickets
    to: voidTicket.ticketIdentifier
    select: true
  - from: getTicketByLocator.tickets
    to: getExchangeEligibilityByTicket.ticketNumber
    select: true
  - from: getTicketByLocator.tickets
    to: getTicketDetails.ticketNumber
    select: true
  - from: getTicketByLocator.tickets
    to: createWorkbenchFromIdentifier.ticketNumber
    select: true

  # Reservation offer selection
  - from: retrieveReservation.offers
    to: cancelOffer.offerIdentifierValue
    select: true

  # Exchange offering selection
  - from: searchExchange.exchangeOfferings
    to: addExchangeOffer.catalogOfferingIdentifierValue
    select: true

  # Ancillary selection
  - from: searchAncillaries.ancillaryOfferings
    to: addAncillaryOffer.ancillaryOfferingId
    select: true

  # Seat selection
  - from: searchSeatMap.seatOfferings
    to: addSeatOffer.seatOfferingIdentifierValue
    select: true

  # ============================================================
  # PREFERRED EDGES — Backward chaining hints
  # ============================================================
  - from: createWorkbench.workbenchId
    to: addOfferReference.workbenchId
    preferred: true
  - from: createWorkbench.workbenchId
    to: addTraveler.workbenchId
    preferred: true
  - from: addOfferReference.offerIdentifierValue
    to: addPayment.offerIdentifierValue
    preferred: true

  # Co-targets: these inputs have a preferred edge above, so auto-wire
  # is blocked; additional explicit edges needed for alternative flows.
  - from: addOfferFullPayload.workbenchId
    to: addTraveler.workbenchId
  - from: addOfferFullPayload.offerIdentifierValue
    to: addPayment.offerIdentifierValue
  - from: addExchangeOffer.offerIdentifierValue
    to: addPayment.offerIdentifierValue

  # ============================================================
  # NO-AUTO-WIRE EDGES — Explicit wiring for inputs with noAutoWire
  # (pass-through workbenchId, locator loops, cross-domain catalogs)
  # ============================================================

  # Pass-through workbenchId nodes need explicit sources
  - from: createWorkbench.workbenchId
    to: addOfferFullPayload.workbenchId
  - from: createWorkbenchFromLocator.workbenchId
    to: addExchangeOffer.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: addExchangeOffer.workbenchId
  - from: createWorkbench.workbenchId
    to: retrieveWorkbench.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: retrieveWorkbench.workbenchId

  # Locator loop prevention
  - from: commitReservation.locator
    to: createWorkbenchFromLocator.locator

  # Catalog offerings wired to correct downstream nodes
  - from: searchAncillaries.catalogOfferingsIdentifierValue
    to: addAncillaryOffer.catalogOfferingsIdentifierValue
  - from: searchSeatMap.catalogOfferingsIdentifierValue
    to: addSeatOffer.catalogOfferingsIdentifierValue
  - from: searchExchange.catalogOfferingsIdentifierValue
    to: addExchangeOffer.catalogOfferingsIdentifierValue

  # Offer ID for ancillary/seat searches
  - from: addOfferReference.offerIdentifierValue
    to: searchAncillaries.offerIdentifierValue
  - from: addOfferReference.offerIdentifierValue
    to: searchSeatMap.offerIdentifierValue

  # Commit nodes — explicit workbench sources
  - from: createWorkbench.workbenchId
    to: commitReservation.workbenchId
  - from: createWorkbenchFromLocator.workbenchId
    to: commitTicket.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: commitTicket.workbenchId
  - from: createWorkbenchFromLocator.workbenchId
    to: commitExchangeTicket.workbenchId
  - from: createWorkbenchFromIdentifier.workbenchId
    to: commitExchangeTicket.workbenchId

  # Exchange search — explicit offer ID sources
  - from: createWorkbenchFromLocator.offerIdentifierValue
    to: searchExchange.offerIdentifierValue
  - from: createWorkbenchFromIdentifier.offerIdentifierValue
    to: searchExchange.offerIdentifierValue

  # Ticket retrieval — explicit locator source
  - from: commitReservation.locator
    to: getTicketByLocator.locator

  # ============================================================
  # NAME-MISMATCHED EDGES — Output name ≠ input name
  # ============================================================

  # totalPrice → amount
  - from: priceOfferReference.totalPrice
    to: addPayment.amount
  - from: addOfferFullPayload.totalPrice
    to: addPayment.amount
  - from: addExchangeOffer.totalPrice
    to: addPayment.amount

  # Commit outputs → reservation management (name mismatches)
  - from: commitReservation.reservationIdentifierValue
    to: retrieveReservation.identifier
  - from: commitReservation.locator
    to: retrieveReservation.identifier
  - from: commitReservation.reservationIdentifierValue
    to: cancelOffer.reservationIdentifier
  - from: commitReservation.reservationIdentifierValue
    to: placeOnQueue.reservationIdentifier

