      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference. Values: Economy, PremiumEconomy, Business, First"
        optional: true
        configurable: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code. Examples: AA=American, UA=United, DL=Delta, WN=Southwest, B6=JetBlue"
        optional: true
        configurable: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
        description: "Maximum number of connections. Use 0 for nonstop-only results"
        optional: true
        configurable: true
        constraints:
          min: 0
          max: 3
      - name: contentSource
        type: string
        description: "Content source for search results. Use 'NDC' for New Distribution Capability (direct airline content), 'GDS' for traditional GDS content. For NDC you MUST specify an airline in carrierPreference, as NDC searches are airline-specific."
        optional: true
        configurable: true
        default: GDS
      - name: searchRepresentation
        type: string
        description: "Search representation mode (e.g., 'Leg' for leg-based search)"
        optional: true
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport/city code (3-letter IATA)"
        configurable: true
