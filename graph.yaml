  searchFlights4Leg:
    description: "Search for multi-city flights with four legs. Journey-based search sending all four legs in a single call."
    adapter: searchFlights
    oas:
      operationId: CreateAirSearch
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: leg1Origin
        type: string
        description: "Leg 1 departure airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg1Destination
        type: string
        description: "Leg 1 arrival airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg1Origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg1DepartureDate
        type: date
        description: "Leg 1 departure date (YYYY-MM-DD)"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 7 days}}", "{{today + 8 days}}", "{{today + 9 days}}", "{{today + 10 days}}", "{{today + 14 days}}"]
      - name: passengers
        type: integer
        description: "Number of adult passengers (1-9)"
        optional: true
        configurable: true
        default: 1
        constraints:
          min: 1
          max: 9
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference. Values: Economy, PremiumEconomy, Business, First"
        optional: true
        configurable: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code. Examples: AA=American, UA=United, DL=Delta, WN=Southwest, B6=JetBlue"
        optional: true
        configurable: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
