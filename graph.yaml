  - from: createWorkbench.workbenchId
    to: deletePrimaryContact.workbenchId
  - from: createWorkbenchFromLocator.workbenchId
    to: deletePrimaryContact.workbenchId

  # Cancel Workbench Offer (seat/ancillary/flight offer pre-commit)
  - from: addSeatOffer.offerIdentifierValue
