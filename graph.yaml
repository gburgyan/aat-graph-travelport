  # ============================================================
  # RESERVATION WORKBENCH
  # ============================================================
  createWorkbench:
    description: "Create a new reservation workbench (booking session). Required before adding offers, travelers, etc."
    adapter: createWorkbench
    oas:
      operationId: CreateReservationWorkbench
    tags: [workbench]
    satisfies: [workbenchCreated]
    preferred: true
    inputs: []
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value (used in all subsequent workbench operations)"

  createWorkbenchFromLocator:
    description: "Create a workbench from an existing reservation (by PNR locator). Used for post-commit operations like ticketing."
    adapter: createWorkbenchFromLocator
    oas:
      operationId: CreateReservationWorkbenchFromLocator
    tags: [workbench]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator (e.g., ABCDEF)"
        default: ABCDEF
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the existing reservation"
      - name: offerId
        type: string
        description: "Offer id from the existing reservation"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority from the existing reservation"
      - name: productId
        type: string
        description: "Product id from the existing reservation offer"
      - name: formOfPaymentId
        type: string
        description: "FormOfPayment id from the existing reservation (e.g. formOfPayment_1)"
        optional: true
      - name: fopIdentifierValue
        type: string
        description: "FormOfPayment Identifier.value from the existing reservation"
        optional: true
      - name: travelerRefId
        type: string
        description: "First traveler id from the reservation (e.g. travelerRefId_1)"
      - name: passengerTypeCode
        type: string
        description: "Passenger type code of the first traveler (e.g. ADT)"

  ignoreWorkbench:
    description: "Discard the workbench and any uncommitted changes. Cleanup operation."
    adapter: ignoreWorkbench
    oas:
      operationId: IgnoreReservationWorkbench
    tags: [workbench, management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value to discard"
    outputs: []

  retrieveWorkbench:
    description: "Retrieve the current state of a reservation workbench."
    adapter: retrieveWorkbench
    oas:
      operationId: RetrieveReservationWorkbench
    tags: [workbench, management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

    outputs:
      - name: workbenchId
        type: string
        description: "Workbench Identifier.value"
      - name: wbOfferIdentifierValue
        type: string
        description: "First offer's Identifier.value in workbench context"
      - name: wbProductIdentifierValue
        type: string
        description: "First product's Identifier.value in workbench context"
      - name: offers
        type: offer[]
        description: "Offers currently in the workbench"
        elementFields:
          - name: offerId
            type: string
          - name: offerIdentifierValue
            type: string
          - name: offerAuthority
            type: string

  # ============================================================
  # ADD OFFER TO WORKBENCH
  # ============================================================
  addOfferReference:
    description: "Add a priced offer to the workbench using reference payload."
    adapter: addOfferReference
    oas:
      operationId: WorkbenchBuildFromCatalogProductOfferings
    tags: [offer]
    requires: [offerPriced, workbenchCreated]
    satisfies: [offerAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productId
        type: string
        description: "Selected Product identifier"
      # Return leg inputs (for round-trip reference booking)
      - name: returnOfferingId
        type: string
        description: "Return leg CatalogProductOffering Identifier.value"
        optional: true
      - name: returnProductId
        type: string
        description: "Return leg Product identifier"
        optional: true
      # Multi-city leg 2 inputs (for reference booking)
      - name: leg2OfferingId
        type: string
        description: "Leg 2 CatalogProductOffering Identifier.value"
        optional: true
      - name: leg2ProductId
        type: string
        description: "Leg 2 Product identifier"
        optional: true
      # Multi-city leg 3 inputs (for reference booking)
      - name: leg3OfferingId
        type: string
        description: "Leg 3 CatalogProductOffering Identifier.value"
        optional: true
      - name: leg3ProductId
        type: string
        description: "Leg 3 Product identifier"
        optional: true
      # Multi-city leg 4 inputs (for reference booking)
      - name: leg4OfferingId
        type: string
        description: "Leg 4 CatalogProductOffering Identifier.value"
        optional: true
      - name: leg4ProductId
        type: string
        description: "Leg 4 Product identifier"
        optional: true
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value now in the workbench"
      - name: offerAuthority
        type: string
        description: "Offer authority"

  addOfferFullPayload:
    description: "Add a priced offer to the workbench using full payload."
    adapter: addOfferFullPayload
    oas:
      operationId: BuildFromOffers
    tags: [offer]
    requires: [offerPriced, workbenchCreated]
    satisfies: [offerAdded]
    preferred: true
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

      - name: carrier
        type: string
        description: "IATA carrier code from the selected flight"
      - name: flightNumber
        type: string
        description: "Flight number from the selected flight"
      - name: departureDate
        type: date
        description: "Departure date from the selected flight"
      - name: departureTime
        type: string
        description: "Departure time from the selected flight (HH:MM:SS)"
      - name: arrivalDate
        type: date
        description: "Arrival date from the selected flight"
      - name: arrivalTime
        type: string
        description: "Arrival time from the selected flight (HH:MM:SS)"
      - name: origin
        type: string
        description: "Departure airport IATA code"
      - name: destination
        type: string
        description: "Arrival airport IATA code"
      - name: classOfService
        type: string
        description: "Class of service code from the selected flight"
      # Return leg inputs (for round-trip booking)
      - name: returnCarrier
        type: string
        description: "Return leg carrier IATA code"
        optional: true
      - name: returnFlightNumber
        type: string
        description: "Return leg flight number"
        optional: true
      - name: returnDepartureDate
        type: date
        description: "Return leg departure date"
        optional: true
      - name: returnDepartureTime
        type: string
        description: "Return leg departure time (HH:MM:SS)"
        optional: true
      - name: returnArrivalDate
        type: date
        description: "Return leg arrival date"
        optional: true
      - name: returnArrivalTime
        type: string
        description: "Return leg arrival time (HH:MM:SS)"
        optional: true
      - name: returnOrigin
        type: string
        description: "Return leg departure airport IATA code"
        optional: true
      - name: returnDestination
        type: string
        description: "Return leg arrival airport IATA code"
        optional: true
      - name: returnClassOfService
        type: string
        description: "Return leg class of service code"
        optional: true
      # Multi-city leg 2 inputs
      - name: leg2Carrier
        type: string
        description: "Leg 2 carrier IATA code for multi-city"
        optional: true
      - name: leg2FlightNumber
        type: string
        description: "Leg 2 flight number for multi-city"
        optional: true
      - name: leg2DepartureDate
        type: date
        description: "Leg 2 departure date for multi-city"
        optional: true
      - name: leg2DepartureTime
        type: string
        description: "Leg 2 departure time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg2ArrivalDate
        type: date
        description: "Leg 2 arrival date for multi-city"
        optional: true
      - name: leg2ArrivalTime
        type: string
        description: "Leg 2 arrival time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport IATA code for multi-city"
        optional: true
      - name: leg2Destination
        type: string
        description: "Leg 2 arrival airport IATA code for multi-city"
        optional: true
      - name: leg2ClassOfService
        type: string
        description: "Leg 2 class of service code for multi-city"
        optional: true
      # Multi-city leg 3 inputs
      - name: leg3Carrier
        type: string
        description: "Leg 3 carrier IATA code for multi-city"
        optional: true
      - name: leg3FlightNumber
        type: string
        description: "Leg 3 flight number for multi-city"
        optional: true
      - name: leg3DepartureDate
        type: date
        description: "Leg 3 departure date for multi-city"
        optional: true
      - name: leg3DepartureTime
        type: string
        description: "Leg 3 departure time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg3ArrivalDate
        type: date
        description: "Leg 3 arrival date for multi-city"
        optional: true
      - name: leg3ArrivalTime
        type: string
        description: "Leg 3 arrival time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg3Origin
        type: string
        description: "Leg 3 departure airport IATA code for multi-city"
        optional: true
      - name: leg3Destination
        type: string
        description: "Leg 3 arrival airport IATA code for multi-city"
        optional: true
      - name: leg3ClassOfService
        type: string
        description: "Leg 3 class of service code for multi-city"
        optional: true
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value now in the workbench"
      - name: offerAuthority
        type: string
        description: "Offer authority"

  # ============================================================
  # TRAVELERS
  # ============================================================
  addTraveler:
    description: "Add a traveler to the reservation workbench. Each traveler must be added in a separate request."
    adapter: addTraveler
    oas:
      operationId: AddTraveler
    tags: [traveler]
    requires: [workbenchCreated]
    satisfies: [travelerAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: givenName
        type: string
        description: "Traveler first/given name"
        default:
          pool: [James, Maria, Robert, Sarah, David, Emily, Michael, Ana, William, Sofia]
        constraints:
          minLength: 1
          maxLength: 50
      - name: surname
        type: string
        description: "Traveler last/family name"
        default:
          pool: [Smith, Johnson, Garcia, Williams, Martinez, Brown, Lee, Wilson, Anderson, Taylor]
        constraints:
          minLength: 1
          maxLength: 50
      - name: gender
        type: enum[Male, Female, Unknown, Undisclosed]
        description: "Traveler gender"
        optional: true
        default:
          pool: [Male, Female]
      - name: birthDate
        type: date
        description: "Traveler date of birth (YYYY-MM-DD)"
        optional: true
        default:
          pool: ["1985-03-15", "1990-07-22", "1978-11-08", "1995-01-30", "1982-06-17"]
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF)"
        optional: true
        default: ADT
      - name: email
        type: string
        description: "Traveler email address"
        optional: true
        default: "test@example.com"
      - name: phoneNumber
        type: string
        description: "Traveler phone number"
        optional: true
        default: "5551234567"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
      - name: phoneCountryCode
        type: string
        description: "Phone country access code"
        optional: true
        default: "1"
      - name: passportNumber
        type: string
        description: "Passport document number"
        optional: true
      - name: passportExpiry
        type: date
        description: "Passport expiration date"
        optional: true
      - name: passportIssueCountry
        type: string
        description: "Passport issuing country code"
        optional: true
      - name: passportNationality
        type: string
        description: "Passport holder nationality code"
        optional: true
      - name: loyaltyNumber
        type: string
        description: "Frequent flyer loyalty number"
        optional: true
      - name: loyaltySupplier
        type: string
        description: "Frequent flyer airline IATA code"
        optional: true
    outputs:
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value"

  addPrimaryContact:
    description: "Add a primary contact (email/phone) to the reservation workbench."
    adapter: addPrimaryContact
    oas:
      operationId: AddPrimaryContact
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: email
        type: string
        description: "Contact email address"
        default: "test@example.com"
      - name: phoneNumber
        type: string
        description: "Contact phone number"
        default: "5551234567"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
      - name: phoneCountryCode
        type: string
        description: "Phone country access code"
        optional: true
        default: "1"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to associate the contact with"

  # ============================================================
  # FORM OF PAYMENT
  # ============================================================
  addFormOfPaymentCash:
    description: "Add cash as the form of payment (use this as default unless otherwise specified)."
    adapter: addFormOfPaymentCash
    oas:
      operationId: AddFormOfPayment
    tags: [payment]
    requires: [workbenchCreated]
    satisfies: [formOfPaymentAdded]
    preferred: true
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: formOfPaymentId
        type: string
        description: "FormOfPayment id (e.g. formOfPayment_1). Must be unique on the workbench."
        default: "formOfPayment_1"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  addFormOfPaymentCard:
    description: "Add a credit card as the form of payment."
    adapter: addFormOfPaymentCard
    oas:
      operationId: AddFormOfPayment
    tags: [payment]
    requires: [workbenchCreated]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: cardNumber
        type: string
        description: "Credit card number"
        default:
          pool: ["4111111111111111", "4222222222222222", "5500005555555559"]
      - name: cardExpiry
        type: string
        description: "Card expiration (MMYY format)"
        default:
          pool: ["1228", "0629", "1230"]
        constraints:
          minLength: 4
          maxLength: 4
          pattern: "^(0[1-9]|1[0-2])\\d{2}$"
          description: "Card expiry in MMYY format"
      - name: cardCode
        type: string
        description: "Card type code (VI, MC, AX, etc.)"
        optional: true
        default: VI
      - name: cardHolderName
        type: string
        description: "Name on the card"
        default:
          pool: [James Smith, Maria Garcia, Robert Johnson]
      - name: cvv
        type: string
        description: "Card security code"
        optional: true
        default:
          pool: ["123", "456", "789"]
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  # ============================================================
  # PAYMENT
  # ============================================================
  addPayment:
    description: "Apply payment to the offer in the workbench. Must be done after AddFormOfPayment."
    adapter: addPayment
    oas:
      operationId: AddPayment
    tags: [payment]
    requires: [formOfPaymentAdded]
    satisfies: [paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: totalPrice
        type: float
        description: "Total price amount"
      - name: currencyCode
        type: string
        description: "Currency code (e.g., USD, GBP)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "ISO 4217 currency code"
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to pay for"
      - name: offerId
        type: string
        description: "Offer id"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority"
        optional: true
        default: Travelport
      - name: paymentId
        type: string
        description: "Payment id (e.g. payment_1). Must be unique on the workbench."
        default: "payment_1"
      - name: formOfPaymentId
        type: string
        description: "FormOfPayment id to reference (e.g. formOfPayment_1). Must match the FOP added earlier."
        default: "formOfPayment_1"
    outputs:
      - name: paymentIdentifierValue
        type: string
        description: "Payment Identifier.value"

  # ============================================================
  # COMMIT
  # ============================================================
  commitReservation:
    description: "Commit the workbench to create a held booking (PNR). If payment was added, this also tickets the itinerary."
    adapter: commitReservation
    oas:
      operationId: CommitReservation
    tags: [commit]
    requires: [offerAdded, travelerAdded, paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value to commit"

      - name: scheduleChangeAcceptedInd
        type: boolean
        description: "Accept involuntary schedule change on commit"
        optional: true
      - name: queueNumber
        type: string
        description: "Queue number for placement on commit"
        optional: true
      - name: queuePcc
        type: string
        description: "PCC for queue placement on commit"
        optional: true
      - name: ticketingTimeLimit
        type: date
        description: "Ticketing time limit date"
        optional: true
      - name: autoDeleteDate
        type: date
        description: "Auto-delete date for the reservation"
        optional: true
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Receipt Identifier.value from the commit response"
        display: "Reservation ID"
      - name: locator
        type: string
        description: "PNR record locator (e.g., ABCDEF)"
        display: "PNR"

  # ============================================================
  # RESERVATION MANAGEMENT
  # ============================================================
  retrieveReservation:
    description: "Retrieve a reservation by its identifier or PNR locator."
    adapter: retrieveReservation
    oas:
      operationId: RetrieveReservation
    tags: [management]
    inputs:
      - name: identifier
        type: string
        description: "Reservation Identifier.value or PNR record locator"
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
        display: "PNR"
      - name: reservationStatus
        type: string
        description: "Reservation status"
        display: "Status"
      - name: offers
        type: offer[]
        description: "Offers in the reservation"
        elementFields:
          - name: offerId
            type: string
          - name: offerIdentifierValue
            type: string

  cancelOffer:
    description: "Cancel an offer within an existing reservation."
    adapter: cancelOffer
    oas:
      operationId: CancelReservationOffer
    tags: [management]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to cancel"
    outputs:
      - name: reservationStatus
        type: string
        description: "Updated reservation status"
        display: "Status"

  # ============================================================
  # TICKETING
  # ============================================================
  commitTicket:
    description: "Commit reservation workbench with ticket issuance. Used post-commit when ticketing separately."
    adapter: commitTicket
    oas:
      operationId: CommitReservation
    tags: [ticketing, commit]
    requires: [paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value (from post-commit workbench)"

    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
        display: "PNR"
      - name: ticketNumber
        type: string
        description: "Ticket document number from issuance receipt"

  getTicketByLocator:
    description: "Retrieve tickets associated with a PNR locator."
    adapter: getTicketByLocator
    oas:
      operationId: TicketGetByLocator
    tags: [ticketing]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        default: ABCDEF
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: tickets
        type: ticket[]
        description: "List of tickets"
        elementFields:
          - name: ticketNumber
            type: string
          - name: ticketIdentifierValue
            type: string
          - name: ticketStatus
            type: string

  voidTicket:
    description: "Void a ticket (GDS only)."
    adapter: voidTicket
    oas:
      operationId: UpdateTicket
    tags: [ticketing]
    inputs:
      - name: ticketIdentifier
        type: string
        description: "Ticket Identifier.value to void"
    outputs:
      - name: ticketStatus
        type: string
        description: "Updated ticket status"

  # ============================================================
  # ANCILLARIES
  # ============================================================
  searchAncillaries:
    description: "Search for available ancillaries (bags, meals, etc.) for a reservation in a workbench."
    adapter: searchAncillaries
    oas:
      operationId: CreateAncillarySearch
    tags: [ancillary, search]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to search ancillaries for"

    outputs:
      - name: ancillaryOfferings
        type: ancillary[]
        description: "Available ancillary offerings"
        elementFields:
          - name: ancillaryId
            type: string
          - name: ancillaryProductId
            type: string
          - name: ancillaryName
            type: string
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"
      - name: catalogOfferingsId
        type: string
        description: "CatalogOfferingsID id (e.g. CT1) for downstream add"

  # ============================================================
  # SEAT MAP
  # ============================================================
  searchSeatMap:
    description: "Request seat availability (seat map) using pricing response identifiers."
    adapter: searchSeatMap
    oas:
      operationId: CreateSeatAvailability
    tags: [seat, search]
    inputs:
      - name: offerListIdentifier
        type: string
        description: "OfferListResponse Identifier.value from the pricing response"

      - name: offerId
        type: string
        description: "Offer id (e.g. 'o0') from the pricing response"

      - name: productId
        type: string
        description: "Product id (e.g. 'p0') from the pricing response"

    outputs:
      - name: seatOfferings
        type: seat[]
        description: "Available seat offerings"
        elementFields:
          - name: seatId
            type: string
          - name: seatIdentifierValue
            type: string
          - name: seatAssignment
            type: string
            description: "Seat designation (e.g. 12A)"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"

  searchSeatMapFromWorkbench:
    description: "Request seat availability (seat map) from a reservation workbench. Used for post-commit seat selection."
    adapter: searchSeatMapFromWorkbench
    oas:
      operationId: CreateSeatAvailability
    tags: [seat, search]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the workbench"

      - name: productIdentifierValue
        type: string
        description: "Product Identifier.value from the workbench"

    outputs:
      - name: seatOfferings
        type: seat[]
        description: "Available seat offerings"
        elementFields:
          - name: seatId
            type: string
          - name: seatIdentifierValue
            type: string
          - name: seatAssignment
            type: string
            description: "Seat designation (e.g. 12A)"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"

  # ============================================================
  # FARE RULES
  # ============================================================
  getFareRulesFromSearch:
    description: "Get fare rules by reference to search (CatalogProductOfferings) results."
    adapter: getFareRulesFromSearch
    oas:
      operationId: GetRulesFromCatalogProductOfferings
    tags: [fare-rules]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value"
      - name: offeringId
        type: string
        description: "CatalogProductOffering id"
      - name: productId
        type: string
        description: "Product id within the offering"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  getFareRulesFromOffer:
    description: "Get fare rules by reference to a priced offer."
    adapter: getFareRulesFromOffer
    oas:
      operationId: GetRulesFromOffer
    tags: [fare-rules]
    inputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from a price response"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  # ============================================================
  # EXCHANGE
  # ============================================================
  getExchangeEligibility:
    description: "Check if tickets on a reservation are eligible for exchange (by PNR locator)."
    adapter: getExchangeEligibility
    oas:
      operationId: GetEligibility
    tags: [exchange]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        default: ABCDEF
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: eligibilities
        type: eligibility[]
        description: "Per-ticket exchange eligibility results"
        elementFields:
          - name: ticketNumber
            type: string
          - name: exchangeable
            type: string

  getExchangeEligibilityByTicket:
    description: "Check if a specific ticket is eligible for exchange (by ticket number)."
    adapter: getExchangeEligibilityByTicket
    oas:
      operationId: GetEligibility
    tags: [exchange]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket number to check eligibility for"
    outputs:
      - name: eligibilities
        type: eligibility[]
        description: "Per-ticket exchange eligibility results"
        elementFields:
          - name: ticketNumber
            type: string
          - name: exchangeable
            type: string

  searchExchange:
    description: "Search for flights to exchange existing tickets."
    adapter: searchExchange
    oas:
      operationId: CreateExchangeSearch
    tags: [exchange, search]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value (from workbench)"
      - name: offerId
        type: string
        description: "Offer id from workbench"
      - name: productId
        type: string
        description: "Product id from workbench offer"
      - name: travelerRefId
        type: string
        description: "Traveler id from workbench (e.g. travelerRefId_1)"
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        default: ADT

      - name: origin
        type: string
        description: "New departure airport/city code"
        configurable: true
        optional: true
        default:
          pool: [DEN, ORD, ATL, DFW, IAH, PHX, MSP]
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "New arrival airport/city code"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "New departure date"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 7 days}}", "{{today + 10 days}}", "{{today + 14 days}}", "{{today + 21 days}}", "{{today + 30 days}}"]
    outputs:
      - name: exchangeOfferings
        type: offering[]
        description: "Available exchange flight offerings"
        elementFields:
          - name: offeringId
            type: string
          - name: totalPrice
            type: float
          - name: currencyCode
            type: string
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferings Identifier.value for downstream addExchangeOffer"
      - name: firstOfferTotalPrice
        type: float
        description: "Total price of the first exchange offering"
      - name: firstOfferCurrencyCode
        type: string
        description: "Currency code of the first exchange offering"

  exchangePriceQuote:
    description: "Exchange Price Quote - search for exchange pricing using specific flight criteria."
    adapter: exchangePriceQuote
    oas:
      operationId: ProductSpecificSearch
    tags: [exchange, search]
    inputs:
      - name: carrier
        type: string
        description: "Marketing carrier code"
        configurable: true
        optional: true
        default:
          pool: [AA, UA, DL, BA, QF, LH]
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: flightNumber
        type: string
        description: "Flight number"
        configurable: true
        optional: true
        default:
          pool: ["100", "200", "409", "1234"]
      - name: departureDate
        type: date
        description: "Departure date"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 7 days}}", "{{today + 14 days}}", "{{today + 21 days}}"]
      - name: departureTime
        type: string
        description: "Departure time (HH:mm:ss)"
        configurable: true
        optional: true
        default: "07:00:00"
      - name: arrivalDate
        type: date
        description: "Arrival date"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 7 days}}", "{{today + 14 days}}", "{{today + 21 days}}"]
      - name: arrivalTime
        type: string
        description: "Arrival time (HH:mm:ss)"
        configurable: true
        optional: true
        default: "10:00:00"
      - name: from
        type: string
        description: "Departure airport/city code"
        configurable: true
        optional: true
        default:
          pool: [DEN, ORD, ATL, DFW, SYD, LHR]
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: to
        type: string
        description: "Arrival airport/city code"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, MEL, FRA, CDG]
          constraint: "value != from"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: cabin
        type: string
        description: "Cabin preference"
        configurable: true
        optional: true
        default: Economy
        constraints:
          enum: [Economy, PremiumEconomy, Business, First]
      - name: classOfService
        type: string
        description: "Booking class of service"
        configurable: true
        optional: true
        default:
          pool: [Y, M, B, H, K, Q]
        constraints:
          minLength: 1
          maxLength: 2
      - name: ticketNumber
        type: string
        description: "Document/ticket number for payment criteria"
      - name: passengerTypeCode
        type: string
        description: "Passenger type code"
        configurable: true
        optional: true
        default: ADT
        constraints:
          enum: [ADT, CHD, INF, C10]
    outputs:
      - name: exchangeOfferings
        type: offering[]
        description: "Available exchange flight offerings"
        elementFields:
          - name: offeringId
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: totalPrice
            type: float
          - name: currencyCode
            type: string
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferings Identifier.value for downstream addExchangeOffer"
      - name: firstOfferTotalPrice
        type: float
        description: "Total price of the first exchange offering"
      - name: firstOfferCurrencyCode
        type: string
        description: "Currency code of the first exchange offering"

  addExchangeOffer:
    description: "Add an exchange offer to the workbench (build from catalog offerings). This replaces the original offer with the new exchange offer."
    adapter: addExchangeOffer
    oas:
      operationId: TripChangeBuildFromCatalogOfferings
    tags: [exchange, offer]
    satisfies: [exchangeOfferAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferings Identifier.value from exchange search"

      - name: catalogOfferingIdentifierValue
        type: string
        description: "Selected CatalogOffering Identifier.value from exchange search"
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Exchange offer Identifier.value"
      - name: offerId
        type: string
        description: "Exchange offer id"
      - name: offerAuthority
        type: string
        description: "Exchange offer Identifier.authority"

  commitExchangeTicket:
    description: "Commit the exchange and issue new tickets (payLaterInd=false)."
    adapter: commitExchangeTicket
    oas:
      operationId: Create
    tags: [exchange, ticketing, commit]
    requires: [exchangeOfferAdded, paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
        display: "PNR"

  # ============================================================
  # EXCHANGE FORM OF PAYMENT
  # ============================================================
  addFormOfPaymentForfeit:
    description: "Add forfeit as form of payment (penalty amount forfeited by passenger)."
    adapter: addFormOfPaymentForfeit
    oas:
      operationId: AddFormOfPayment
    tags: [payment, exchange]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: formOfPaymentId
        type: string
        description: "FormOfPayment id to forfeit (e.g. formOfPayment_1)"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  addFormOfPaymentWaiver:
    description: "Add a waiver code as form of payment (airline-issued disruption waiver)."
    adapter: addFormOfPaymentWaiver
    oas:
      operationId: AddFormOfPayment
    tags: [payment, exchange]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: waiverCode
        type: string
        description: "Airline waiver code"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  addFormOfPaymentInvoice:
    description: "Add an agent invoice as form of payment."
    adapter: addFormOfPaymentInvoice
    oas:
      operationId: AddFormOfPayment
    tags: [payment]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: invoiceNumber
        type: string
        description: "Agent invoice number"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  # ============================================================
  # DOCUMENT OVERRIDES
  # ============================================================
  addDocumentOverrides:
    description: "Add document overrides (commissions, restrictions, tour codes, change fee method) for exchange ticketing."
    adapter: addDocumentOverrides
    oas:
      operationId: CreateDocumentOverrides
    tags: [exchange, ticketing]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: commissionAmount
        type: float
        description: "Commission amount"
        optional: true
        default:
          pool: [0, 5, 10, 15, 25]
      - name: commissionCurrencyCode
        type: string
        description: "Commission currency code"
        optional: true
        default:
          pool: [USD, EUR, GBP, CAD, AUD]
      - name: restriction
        type: string
        description: "Restriction text (e.g., NON Exchange)"
        optional: true
      - name: tourCode
        type: string
        description: "Tour code value"
        optional: true
      - name: changeFeeCode
        type: string
        description: "Change fee collection code"
        optional: true
      - name: changeFeeMethod
        type: string
        description: "Change fee collection method (e.g., EMD)"
        optional: true
    outputs:
      - name: documentOverridesId
        type: string
        description: "Document overrides id"

  # ============================================================
  # RESERVATION REMARKS
  # ============================================================
  addReservationComment:
    description: "Add a reservation comment/remark (general, notepad, historical, vendor, etc.)."
    adapter: addReservationComment
    oas:
      operationId: AddReservationComments
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: commentName
        type: string
        description: "Comment category code (RE=general, RI=itinerary, RN=notepad, RH=historical, RV=vendor)"
        default:
          pool: [RE, RI, RN, RH, RV]
      - name: commentValue
        type: string
        description: "Comment text"
        default:
          pool: ["Test remark", "API test comment", "Automated test note"]
    outputs: []

  deleteReservationComment:
    description: "Delete a specific comment from a reservation comment entry."
    adapter: deleteReservationComment
    oas:
      operationId: DeleteReservationComments
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: reservationCommentId
        type: string
        description: "Reservation comment container id"
      - name: commentId
        type: string
        description: "Individual comment id to delete"
    outputs: []

  addAccountingRemark:
    description: "Add an accounting remark to the reservation."
    adapter: addAccountingRemark
    oas:
      operationId: CreateAccounting
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: accountingName
        type: string
        description: "Accounting field name code (IN=invoice, AN=accounting number, AC=account code)"
        default:
          pool: [IN, AN, AC]
      - name: accountingValue
        type: string
        description: "Accounting field value"
        default:
          pool: ["INV-001", "ACC-12345", "CODE-789"]
    outputs:
      - name: accountingId
        type: string
        description: "Accounting entry id"

  deleteAccountingRemark:
    description: "Delete an accounting remark entry from the reservation."
    adapter: deleteAccountingRemark
    oas:
      operationId: DeleteAccounting
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: accountingId
        type: string
        description: "Accounting entry symbolic id (e.g. Accounting_1)"
      - name: nameValuePairId
        type: string
        description: "Name-value pair symbolic id to delete (e.g. ActComment_1)"
    outputs: []

  # ============================================================
  # SPECIAL SERVICES
  # ============================================================
  addSpecialService:
    description: "Add special service requests (SSRs) like wheelchair, meal preference, etc."
    adapter: addSpecialService
    oas:
      operationId: AddSpecialServices
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value for the traveler this SSR applies to"
      - name: text
        type: string
        description: "Free-text SSR description"
        optional: true
        default:
          pool: ["Wheelchair assistance needed", "Steps assistance required", "Wheelchair to cabin seat"]
    outputs:
      - name: specialServiceId
        type: string
        description: "Special service id"

  # ============================================================
  # QUEUES
  # ============================================================
  placeOnQueue:
    description: "Move a reservation to a specified queue."
    adapter: placeOnQueue
    oas:
      operationId: CreateQueueList
    tags: [queue, management]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value"
      - name: queueNumber
        type: string
        description: "Queue number"
        constraints:
          pattern: "^\\d+$"
          description: "Numeric queue identifier"
      - name: pcc
        type: string
        description: "PCC (pseudo city code) for the queue"
        optional: true
    outputs: []

  commitAncillary:
    description: "Commit workbench after ancillary addition (post-commit context). Uses the same commit API as commitReservation."
    adapter: commitReservation
    oas:
      operationId: CommitReservation
    tags: [ancillary, commit]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
        display: "PNR"

  # ============================================================
  # ANCILLARY/SEAT BOOKING
  # ============================================================
  addAncillaryOffer:
    description: "Add an ancillary offer (bags, meals, etc.) to the workbench from catalog offerings."
    adapter: addAncillaryOffer
    oas:
      operationId: BuildAncillaryOffersFromCatalogOfferings
    tags: [ancillary, offer]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value from ancillary search"
      - name: catalogOfferingsId
        type: string
        description: "CatalogOfferingsID id from ancillary search (e.g. CT1)"

      - name: ancillaryOfferingId
        type: string
        description: "CatalogOffering id of the selected ancillary"
      - name: ancillaryProductId
        type: string
        description: "Product id within the ancillary offering"
      - name: travelerRefId
        type: string
        description: "Traveler id to associate the ancillary with (e.g. travelerRefId_1)"
    outputs:
      - name: ancillaryOfferId
        type: string
        description: "Ancillary offer id (e.g. an_o1)"
        optional: true
      - name: ancillaryOfferIdentifierValue
        type: string
        description: "Ancillary offer Identifier.value"
        optional: true
      - name: ancillaryOfferProductId
        type: string
        description: "Ancillary offer product id (e.g. product_nonbag_01_1)"
        optional: true

  addSeatOffer:
    description: "Add a seat offer to the workbench from seat map catalog offerings."
    adapter: addSeatOffer
    oas:
      operationId: WorkbenchBuildFromCatalogOfferings
    tags: [seat, offer]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value from seat map search"

      - name: seatOfferingIdentifierValue
        type: string
        description: "Seat CatalogOffering Identifier.value"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to assign the seat to"
      - name: seatAssignment
        type: string
        description: "Seat number (e.g., 12A)"
    outputs: []

  # ============================================================
  # DELETE OPERATIONS
  # ============================================================
  deleteSpecialService:
    description: "Delete a special service request from the workbench."
    adapter: deleteSpecialService
    oas:
      operationId: DeleteSpecialServices
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: specialServiceId
        type: string
        description: "Special service id to delete"
    outputs: []

  deletePrimaryContact:
    description: "Delete a primary contact from the workbench."
    adapter: deletePrimaryContact
    oas:
      operationId: DeletePrimaryContact
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: primaryContactId
        type: string
        description: "Primary contact id to delete"
    outputs: []

  cancelWorkbenchOffer:
    description: "Cancel an ancillary or seat offer from the workbench (pre-commit). Different from cancelOffer which operates on committed reservations."
    adapter: cancelWorkbenchOffer
    oas:
      operationId: CancelWorkbenchOffer
    tags: [management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to cancel"
    outputs: []

  # ============================================================
  # TICKET DETAILS & RECEIPTS
  # ============================================================
  getTicketDetails:
    description: "Display details of a specific ticket by ticket number."
    adapter: getTicketDetails
    oas:
      operationId: GetTicket
    tags: [ticketing]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket number to retrieve"
    outputs:
      - name: ticketNumber
        type: string
        description: "Ticket number"
      - name: ticketIdentifierValue
        type: string
        description: "Ticket Identifier.value"

  getReceiptIndex:
    description: "List all tickets/receipts for a PNR (receipt/document view)."
    adapter: getReceiptIndex
    oas:
      operationId: BuildReceiptsFromLocator
    tags: [ticketing]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        default: ABCDEF
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: receipts
        type: receipt[]
        description: "List of receipts/tickets for the PNR"

  # ============================================================
  # RESERVATION CANCELLATION
  # ============================================================
  cancelReservation:
    description: "Cancel an entire PNR reservation (with receipt). Different from cancelOffer which only cancels one offer."
    adapter: cancelReservation
    oas:
      operationId: CancelReservation
    tags: [management]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator to cancel"
        default: ABCDEF
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs: []

  # ============================================================
  # FARE RULES (FROM RESERVATION)
  # ============================================================
  getFareRulesFromReservation:
    description: "Get fare rules from a committed reservation (by PNR locator)."
    adapter: getFareRulesFromReservation
    oas:
      operationId: GetRulesFromReservation
    tags: [fare-rules]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        default: ABCDEF
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  # ============================================================
  # WORKBENCH FROM TICKET NUMBER
  # ============================================================
  createWorkbenchFromIdentifier:
    description: "Create a workbench from a ticket/document number instead of PNR locator. Alternative entry point for post-commit operations."
    adapter: createWorkbenchFromIdentifier
    oas:
      operationId: CreateReservationWorkbenchFromIdentifier
    tags: [workbench]
    satisfies: [workbenchCreated]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket or document number"
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the existing reservation"
      - name: offerId
        type: string
        description: "Offer id from the existing reservation"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority from the existing reservation"

  # ============================================================
  # TRAVELER MODIFICATION
  # ============================================================
  getUpdatableTravelerItems:
    description: "Discover which traveler fields can be modified (step 1 of traveler update workflow)."
    adapter: getUpdatableTravelerItems
    oas:
      operationId: GetTraveler
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to check updatable fields for"
    outputs:
      - name: updatableItems
        type: updatableItem[]
        description: "Updatable item list for use in updateTraveler"
        elementFields:
          - name: updatableItemId
            type: string
          - name: fieldName
            type: string

  updateTraveler:
    description: "Modify traveler details (email, phone, address, frequent flyer). Step 2 of traveler update workflow."
    adapter: updateTraveler
    oas:
      operationId: UpdateTraveler
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: travelerId
        type: string
        description: "Traveler id to update"
      - name: updatableItemId
        type: string
        description: "TravelerUpdatableItem id from getUpdatableTravelerItems"
      - name: updateValue
        type: string
        description: "New value for the field being updated"
    outputs:
      - name: travelerIdentifierValue
        type: string
        description: "Updated traveler Identifier.value"

  # ============================================================
  # ADVANCED OPERATIONS
  # ============================================================
  divideReservation:
    description: "Split a multi-traveler PNR into separate reservations."
    adapter: divideReservation
    oas:
      operationId: Divide
    tags: [management]
    inputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value to divide"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to split out"
    outputs:
      - name: locator
        type: string
        description: "PNR record locator of the new reservation"
        display: "New PNR"
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value of the new reservation"

  addTravelAgency:
    description: "Add travel agency details to the reservation."
    adapter: addTravelAgency
    oas:
      operationId: AddAgencyDetails
    tags: [management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: corporateCode
        type: string
        description: "Corporate code for the travel agency"
        default:
          pool: [CORP001, TESTCO, AGENCY1]
      - name: email
        type: string
        description: "Travel agency email"
        default: "agency@example.com"
      - name: phoneNumber
        type: string
        description: "Travel agency phone number"
        default: "5559876543"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
    outputs:
      - name: travelAgencyId
        type: string
        description: "Travel agency id"
