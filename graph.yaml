        optional: true
        configurable: true
        constraints:
          min: 0
          max: 3
      - name: contentSource
        type: string
        description: "Content source for search results. Use 'NDC' for New Distribution Capability (direct airline content), 'GDS' for traditional GDS content. For NDC you MUST specify an airline in carrierPreference, as NDC searches are airline-specific."
        optional: true
        configurable: true
        default: GDS
      - name: searchRepresentation
        type: string
        description: "Search representation mode (e.g., 'Leg' for leg-based search)"
        optional: true
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          fromResolved: leg1Destination
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2Destination
        type: string
        description: "Leg 2 arrival airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg2Origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2DepartureDate
        type: date
        description: "Leg 2 departure date (YYYY-MM-DD)"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 20 days}}", "{{today + 21 days}}", "{{today + 22 days}}", "{{today + 23 days}}", "{{today + 28 days}}"]
      - name: leg3Origin
        type: string
        description: "Leg 3 departure airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          fromResolved: leg2Destination
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg3Destination
        type: string
        description: "Leg 3 arrival airport/city code (3-letter IATA)"
        configurable: true
        optional: true
        default:
          pool: [SFO, LAX, SEA, BOS, MIA, EWR, IAD]
          constraint: "value != leg3Origin"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg3DepartureDate
        type: date
        description: "Leg 3 departure date (YYYY-MM-DD)"
        configurable: true
        optional: true
        default:
          pool: ["{{today + 34 days}}", "{{today + 35 days}}", "{{today + 36 days}}", "{{today + 37 days}}", "{{today + 42 days}}"]
      - name: leg4Origin
        type: string
