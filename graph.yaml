version: "1.0.0"
title: "Travelport+ Air v11 API"
description: |
  Comprehensive AAT graph for the Travelport+ JSON Air v11 API surface.
  Models the full air booking lifecycle including search, pricing, reservation
  management, ticketing, exchanges, ancillary/seat services, and traveler
  modification workflows.

workflows:
  - name: Full-Payload Booking
    description: "Recommended flow sending complete trip details (carrier, flight, class) instead of references"
    template: plans/oneway-fullpayload.yaml
  - name: Reference-Based Booking
    description: "Alternative GDS booking flow using identifier references"
    template: plans/oneway-reference.yaml
  - name: Post-Commit Ticketing
    description: "Separate ticketing after a held booking"
    template: plans/post-commit-ticketing.yaml
  - name: Exchange
    description: "Full exchange workflow: eligibility check, search, offer, FOP, document overrides, reissue"
    template: plans/exchange.yaml
  - name: Ancillary Booking
    kind: addon
    after: addTraveler
    description: "Search and add ancillary services (bags, meals, etc.)"
    template: plans/ancillary-booking.yaml
  - name: Seat Selection
    kind: addon
    after: priceOfferFullPayload
    description: "Search seat map and add seat offer"
    template: plans/seat-selection.yaml
    wire:
      offerListIdentifier: priceOfferFullPayload.offerIdentifierValue
  - name: Traveler Modification
    kind: addon
    after: addTraveler
    description: "Two-step traveler update: discover updatable fields, then apply changes"
    template: plans/traveler-modification.yaml
    wire:
      travelerId: addTraveler.travelerIdentifierValue
  - name: Round-Trip Full-Payload Booking
    description: "Journey-based round-trip: search both legs in one call, price and book with return leg details"
    template: plans/roundtrip-journey.yaml
  - name: 3-City Multi-City Booking
    description: "Multi-city booking A->B->C: journey-based search with two legs"
    template: plans/multicity-3city.yaml
  - name: 4-City Multi-City Booking
    description: "Multi-city booking A->B->C->D: journey-based search with three legs"
    template: plans/multicity-4city.yaml
  - name: Round-Trip Reference-Based Booking
    description: "Journey-based round-trip using reference identifiers (search both legs in one call)"
    template: plans/roundtrip-reference.yaml
  - name: Round-Trip Leg-Based Booking
    description: "Leg-based round-trip: search outbound, next-leg search for return, then price and book"
    template: plans/roundtrip-legbased.yaml
  - name: Post-Commit Seat Selection
    description: "Select and assign seats on an existing booking using the post-commit seat map"
    template: plans/post-commit-seat-selection.yaml
  - name: Post-Commit Ancillary
    description: "Add ancillary services (bags, meals, etc.) to an existing booking"
    template: plans/post-commit-ancillary.yaml
  - name: Involuntary Schedule Change
    description: "Accept an involuntary schedule change on an impacted PNR"
    template: plans/involuntary-schedule-change.yaml
  - name: Ticket Void
    description: "Void a ticket on an existing booking"
    template: plans/ticket-void.yaml
  - name: Cancel Reservation
    description: "Cancel an entire PNR reservation"
    template: plans/cancel-reservation.yaml
  - name: Order Divide
    description: "Split a traveler out of a multi-traveler PNR into a separate reservation"
    template: plans/order-divide.yaml
  - name: Special Services
    kind: addon
    after: addTraveler
    description: "Add special service requests (wheelchair, meal preference, etc.)"
    template: plans/special-services.yaml
  - name: Reservation Comments
    kind: addon
    after: addTraveler
    description: "Add reservation comments/remarks"
    template: plans/reservation-comments.yaml
  - name: Accounting Remarks
    kind: addon
    after: addTraveler
    description: "Add accounting remarks to the reservation"
    template: plans/accounting-remarks.yaml
  - name: Document Overrides
    kind: addon
    after: addTraveler
    description: "Add document overrides (commissions, restrictions, tour codes)"
    template: plans/document-overrides.yaml
  - name: Primary Contact
    kind: addon
    after: addTraveler
    description: "Add a primary contact (email/phone) to the reservation"
    template: plans/primary-contact.yaml
  - name: Travel Agency
    kind: addon
    after: addTraveler
    description: "Add travel agency details to the reservation"
    template: plans/travel-agency.yaml

  # Post-commit addons — attach after commitReservation
  - name: Post-Commit Seat Selection Addon
    kind: addon
    after: commitReservation
    priority: 20
    description: "Add seat selection to an existing booking (post-commit)"
    template: plans/post-commit-seat-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Post-Commit Ancillary Addon
    kind: addon
    after: commitReservation
    priority: 20
    description: "Add ancillary services to an existing booking (post-commit)"
    template: plans/post-commit-ancillary-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Cancel Booking
    kind: addon
    after: commitReservation
    priority: 90
    description: "Cancel the reservation after booking (lifecycle test)"
    template: plans/cancel-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Void Ticket
    kind: addon
    after: commitReservation
    priority: 80
    description: "Void tickets after booking (requires ticketed booking)"
    template: plans/ticket-void-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Post-Commit Ticketing Addon
    kind: addon
    after: commitReservation
    priority: 30
    description: "Issue tickets for a held booking (post-commit)"
    template: plans/post-commit-ticketing-addon.yaml
    wire:
      locator: commitReservation.locator
  - name: Retrieve Booking
    kind: addon
    after: commitReservation
    priority: 10
    description: "Retrieve and verify the reservation after booking"
    template: plans/retrieve-reservation-addon.yaml
    wire:
      identifier: commitReservation.locator
  - name: Fare Rules Check
    kind: addon
    after: commitReservation
    priority: 10
    description: "Check fare rules on the committed reservation"
    template: plans/fare-rules-addon.yaml
    wire:
      locator: commitReservation.locator

notes: |
  Key identifier patterns:
  - `id`: Local, intra-message scope (e.g., CatalogProductOffering.id)
  - `*Ref` fields: Cross-reference within a message (e.g., productRef)
  - `Identifier.value`: Globally unique GUID that persists across API calls
  Design notes:
  - Reference vs full-payload flows differ only in how pricing/offer data is sent
  - Workbench cleanup (ignoreWorkbench) is set on nodes that create workbenches
  - Exchange flow is GDS-only; no NDC exchange operations exist
  - Form of Payment has many subtypes; graph covers Cash, Card, Forfeit, Waiver, Invoice
  - Templates default to GDS content; NDC may require different request structures

nodes:
  # ============================================================
  # SEARCH
  # ============================================================
  searchFlights:
    description: "Search for air catalog product offerings (flights). This is step 1 in all booking flows."
    adapter: searchFlights
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: origin
        type: string
        description: "Departure airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "Arrival airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "Departure date (YYYY-MM-DD)"
      - name: passengers
        type: integer
        description: "Number of adult passengers"
        optional: true
        default: 1
        constraints:
          min: 1
          max: 9
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference (Economy, PremiumEconomy, Business, First)"
        optional: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code (e.g. UA, AA, DL)"
        optional: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
        description: "Maximum number of connections (0 = nonstop only)"
        optional: true
        constraints:
          min: 0
          max: 3
      - name: returnDate
        type: date
        description: "Return date for round-trip searches"
        optional: true
      - name: contentSource
        type: string
        description: "Content source (GDS or NDC)"
        optional: true
        default: GDS
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "List of flight offerings grouped by O&D"
        elementFields:
          - name: offeringId
            type: string
          - name: productId
            type: string
          - name: productIds
            type: string
          - name: departure
            type: string
          - name: arrival
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: carrier
            type: string
          - name: flightNumber
            type: string
          - name: departureDate
            type: date
          - name: departureTime
            type: string
          - name: arrivalDate
            type: date
          - name: arrivalTime
            type: string
          - name: cabin
            type: string
          - name: classOfService
            type: string
          - name: totalPrice
            type: float
          - name: currency
            type: string
          - name: leg
            type: integer
      - name: catalogProductOfferingsId
        type: string
        description: "Identifier.value for the entire CatalogProductOfferings container"
      - name: transactionId
        type: string
        description: "Transaction tracking ID from the response"

  searchFlights2Leg:
    description: "Search for multi-city flights with two legs. Journey-based search sending both legs in a single call."
    adapter: searchFlights
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: origin
        type: string
        description: "Departure airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "Arrival airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "Departure date (YYYY-MM-DD)"
      - name: passengers
        type: integer
        description: "Number of adult passengers"
        optional: true
        default: 1
        constraints:
          min: 1
          max: 9
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference (Economy, PremiumEconomy, Business, First)"
        optional: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code (e.g. UA, AA, DL)"
        optional: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
        description: "Maximum number of connections (0 = nonstop only)"
        optional: true
        constraints:
          min: 0
          max: 3
      - name: contentSource
        type: string
        description: "Content source (GDS or NDC)"
        optional: true
        default: GDS
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2Destination
        type: string
        description: "Leg 2 arrival airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2DepartureDate
        type: date
        description: "Leg 2 departure date (YYYY-MM-DD)"
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "List of flight offerings grouped by O&D"
        elementFields:
          - name: offeringId
            type: string
          - name: productId
            type: string
          - name: productIds
            type: string
          - name: departure
            type: string
          - name: arrival
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: carrier
            type: string
          - name: flightNumber
            type: string
          - name: departureDate
            type: date
          - name: departureTime
            type: string
          - name: arrivalDate
            type: date
          - name: arrivalTime
            type: string
          - name: cabin
            type: string
          - name: classOfService
            type: string
          - name: totalPrice
            type: float
          - name: currency
            type: string
          - name: leg
            type: integer
      - name: catalogProductOfferingsId
        type: string
        description: "Identifier.value for the entire CatalogProductOfferings container"
      - name: transactionId
        type: string
        description: "Transaction tracking ID from the response"

  searchFlights3Leg:
    description: "Search for multi-city flights with three legs. Journey-based search sending all three legs in a single call."
    adapter: searchFlights
    tags: [search]
    satisfies: [flightsSearched]
    inputs:
      - name: origin
        type: string
        description: "Departure airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "Arrival airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "Departure date (YYYY-MM-DD)"
      - name: passengers
        type: integer
        description: "Number of adult passengers"
        optional: true
        default: 1
        constraints:
          min: 1
          max: 9
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF, etc.)"
        optional: true
        default: ADT
      - name: cabinPreference
        type: string
        description: "Cabin class preference (Economy, PremiumEconomy, Business, First)"
        optional: true
      - name: carrierPreference
        type: string
        description: "Preferred airline IATA code (e.g. UA, AA, DL)"
        optional: true
        constraints:
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z0-9]{2}$"
          description: "IATA airline code"
      - name: maxConnections
        type: integer
        description: "Maximum number of connections (0 = nonstop only)"
        optional: true
        constraints:
          min: 0
          max: 3
      - name: contentSource
        type: string
        description: "Content source (GDS or NDC)"
        optional: true
        default: GDS
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2Destination
        type: string
        description: "Leg 2 arrival airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg2DepartureDate
        type: date
        description: "Leg 2 departure date (YYYY-MM-DD)"
      - name: leg3Origin
        type: string
        description: "Leg 3 departure airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg3Destination
        type: string
        description: "Leg 3 arrival airport/city code (3-letter IATA)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: leg3DepartureDate
        type: date
        description: "Leg 3 departure date (YYYY-MM-DD)"
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "List of flight offerings grouped by O&D"
        elementFields:
          - name: offeringId
            type: string
          - name: productId
            type: string
          - name: productIds
            type: string
          - name: departure
            type: string
          - name: arrival
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: carrier
            type: string
          - name: flightNumber
            type: string
          - name: departureDate
            type: date
          - name: departureTime
            type: string
          - name: arrivalDate
            type: date
          - name: arrivalTime
            type: string
          - name: cabin
            type: string
          - name: classOfService
            type: string
          - name: totalPrice
            type: float
          - name: currency
            type: string
          - name: leg
            type: integer
      - name: catalogProductOfferingsId
        type: string
        description: "Identifier.value for the entire CatalogProductOfferings container"
      - name: transactionId
        type: string
        description: "Transaction tracking ID from the response"

  searchFlightsNextLeg:
    description: "Search for flights on the next leg of a multi-leg itinerary (e.g., return flight)."
    adapter: searchFlightsNextLeg
    tags: [search]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from the initial search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id from the initial search"
      - name: productId
        type: string
        description: "Selected Product id from the initial search offering"
    outputs:
      - name: catalogProductOfferings
        type: offering[]
        description: "Flight offerings for the next leg"
        elementFields:
          - name: offeringId
            type: string
          - name: productId
            type: string
          - name: productIds
            type: string
          - name: departure
            type: string
          - name: arrival
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: carrier
            type: string
          - name: flightNumber
            type: string
          - name: departureDate
            type: date
          - name: departureTime
            type: string
          - name: arrivalDate
            type: date
          - name: arrivalTime
            type: string
          - name: cabin
            type: string
          - name: classOfService
            type: string
          - name: totalPrice
            type: float
          - name: currency
            type: string
      - name: catalogProductOfferingsId
        type: string
        description: "Updated CatalogProductOfferings Identifier.value"
      - name: transactionId
        type: string
        description: "Transaction tracking ID from the response"

  searchUpsells:
    description: "Return all upsell options for a specific flight offering."
    adapter: searchUpsells
    tags: [search, pricing]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from the search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id to get upsells for"
      - name: productId
        type: string
        description: "Selected Product id"
    outputs:
      - name: upsellOfferings
        type: offering[]
        description: "Available upsell offerings"
        elementFields:
          - name: offeringId
            type: string
          - name: offeringIdentifierValue
            type: string

  # ============================================================
  # PRICING
  # ============================================================
  priceOfferReference:
    description: "Price a flight offer using reference payload (references search results by identifier)."
    adapter: priceOfferReference
    tags: [pricing]
    requires: [flightsSearched]
    satisfies: [offerPriced]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productIds
        type: string
        description: "Comma-separated Product ids to include in the price request"
      # Return leg inputs (for round-trip reference pricing)
      - name: returnOfferingId
        type: string
        description: "Return leg CatalogProductOffering Identifier.value"
        optional: true
      - name: returnProductIds
        type: string
        description: "Return leg Product identifiers"
        optional: true
    outputs:
      - name: offerId
        type: string
        description: "Offer id from the price response"
      - name: totalPrice
        type: float
        description: "Total price amount"
      - name: currencyCode
        type: string
        description: "Currency code of the price"

  priceOfferFullPayload:
    description: "Price a flight offer using full payload (sends complete trip details)."
    adapter: priceOfferFullPayload
    tags: [pricing]
    requires: [flightsSearched]
    satisfies: [offerPriced]
    preferred: true
    inputs:
      - name: carrier
        type: string
        description: "IATA carrier code from the selected flight"
      - name: flightNumber
        type: string
        description: "Flight number from the selected flight"
      - name: departureDate
        type: date
        description: "Departure date from the selected flight"
      - name: departureTime
        type: string
        description: "Departure time from the selected flight (HH:MM:SS)"
      - name: arrivalDate
        type: date
        description: "Arrival date from the selected flight"
      - name: arrivalTime
        type: string
        description: "Arrival time from the selected flight (HH:MM:SS)"
      - name: origin
        type: string
        description: "Departure airport IATA code"
      - name: destination
        type: string
        description: "Arrival airport IATA code"
      - name: classOfService
        type: string
        description: "Class of service code from the selected flight"
        optional: true
      - name: passengers
        type: integer
        description: "Number of adult passengers"
        optional: true
        default: 1
      - name: passengerTypeCode
        type: string
        description: "Passenger type code"
        optional: true
        default: ADT
      # Return leg inputs (for round-trip pricing)
      - name: returnCarrier
        type: string
        description: "Return leg carrier IATA code"
        optional: true
      - name: returnFlightNumber
        type: string
        description: "Return leg flight number"
        optional: true
      - name: returnDepartureDate
        type: date
        description: "Return leg departure date"
        optional: true
      - name: returnDepartureTime
        type: string
        description: "Return leg departure time (HH:MM:SS)"
        optional: true
      - name: returnArrivalDate
        type: date
        description: "Return leg arrival date"
        optional: true
      - name: returnArrivalTime
        type: string
        description: "Return leg arrival time (HH:MM:SS)"
        optional: true
      - name: returnOrigin
        type: string
        description: "Return leg departure airport IATA code"
        optional: true
      - name: returnDestination
        type: string
        description: "Return leg arrival airport IATA code"
        optional: true
      - name: returnClassOfService
        type: string
        description: "Return leg class of service code"
        optional: true
      # Multi-city leg 2 inputs
      - name: leg2Carrier
        type: string
        description: "Leg 2 carrier IATA code for multi-city"
        optional: true
      - name: leg2FlightNumber
        type: string
        description: "Leg 2 flight number for multi-city"
        optional: true
      - name: leg2DepartureDate
        type: date
        description: "Leg 2 departure date for multi-city"
        optional: true
      - name: leg2DepartureTime
        type: string
        description: "Leg 2 departure time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg2ArrivalDate
        type: date
        description: "Leg 2 arrival date for multi-city"
        optional: true
      - name: leg2ArrivalTime
        type: string
        description: "Leg 2 arrival time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport IATA code for multi-city"
        optional: true
      - name: leg2Destination
        type: string
        description: "Leg 2 arrival airport IATA code for multi-city"
        optional: true
      - name: leg2ClassOfService
        type: string
        description: "Leg 2 class of service code for multi-city"
        optional: true
      # Multi-city leg 3 inputs
      - name: leg3Carrier
        type: string
        description: "Leg 3 carrier IATA code for multi-city"
        optional: true
      - name: leg3FlightNumber
        type: string
        description: "Leg 3 flight number for multi-city"
        optional: true
      - name: leg3DepartureDate
        type: date
        description: "Leg 3 departure date for multi-city"
        optional: true
      - name: leg3DepartureTime
        type: string
        description: "Leg 3 departure time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg3ArrivalDate
        type: date
        description: "Leg 3 arrival date for multi-city"
        optional: true
      - name: leg3ArrivalTime
        type: string
        description: "Leg 3 arrival time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg3Origin
        type: string
        description: "Leg 3 departure airport IATA code for multi-city"
        optional: true
      - name: leg3Destination
        type: string
        description: "Leg 3 arrival airport IATA code for multi-city"
        optional: true
      - name: leg3ClassOfService
        type: string
        description: "Leg 3 class of service code for multi-city"
        optional: true
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from price response"
      - name: offerId
        type: string
        description: "Offer id from price response"
      - name: productId
        type: string
        description: "First product id from price response"
      - name: totalPrice
        type: float
        description: "Total price amount"
      - name: currencyCode
        type: string
        description: "Currency code of the price"

  # ============================================================
  # RESERVATION WORKBENCH
  # ============================================================
  createWorkbench:
    description: "Create a new reservation workbench (booking session). Required before adding offers, travelers, etc."
    adapter: createWorkbench
    tags: [workbench]
    satisfies: [workbenchCreated]
    preferred: true
    inputs: []
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value (used in all subsequent workbench operations)"
    cleanup: ignoreWorkbench

  createWorkbenchFromLocator:
    description: "Create a workbench from an existing reservation (by PNR locator). Used for post-commit operations like ticketing."
    adapter: createWorkbenchFromLocator
    tags: [workbench]
    satisfies: [workbenchCreated]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator (e.g., ABCDEF)"

        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the existing reservation"
      - name: offerId
        type: string
        description: "Offer id from the existing reservation"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority from the existing reservation"
    cleanup: ignoreWorkbench

  ignoreWorkbench:
    description: "Discard the workbench and any uncommitted changes. Cleanup operation."
    adapter: ignoreWorkbench
    tags: [workbench, management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value to discard"
    outputs: []

  retrieveWorkbench:
    description: "Retrieve the current state of a reservation workbench."
    adapter: retrieveWorkbench
    tags: [workbench, management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

    outputs:
      - name: workbenchId
        type: string
        description: "Workbench Identifier.value"
      - name: wbOfferIdentifierValue
        type: string
        description: "First offer's Identifier.value in workbench context"
      - name: wbProductIdentifierValue
        type: string
        description: "First product's Identifier.value in workbench context"
      - name: offers
        type: offer[]
        description: "Offers currently in the workbench"
        elementFields:
          - name: offerId
            type: string
          - name: offerIdentifierValue
            type: string
          - name: offerAuthority
            type: string

  # ============================================================
  # ADD OFFER TO WORKBENCH
  # ============================================================
  addOfferReference:
    description: "Add a priced offer to the workbench using reference payload."
    adapter: addOfferReference
    tags: [offer]
    requires: [offerPriced, workbenchCreated]
    satisfies: [offerAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value from search"
      - name: offeringId
        type: string
        description: "Selected CatalogProductOffering id"
      - name: productIds
        type: string
        description: "Comma-separated Product ids"
      # Return leg inputs (for round-trip reference booking)
      - name: returnOfferingId
        type: string
        description: "Return leg CatalogProductOffering Identifier.value"
        optional: true
      - name: returnProductIds
        type: string
        description: "Return leg Product identifiers"
        optional: true
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value now in the workbench"
      - name: offerAuthority
        type: string
        description: "Offer authority"

  addOfferFullPayload:
    description: "Add a priced offer to the workbench using full payload."
    adapter: addOfferFullPayload
    tags: [offer]
    requires: [offerPriced, workbenchCreated]
    satisfies: [offerAdded]
    preferred: true
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

      - name: carrier
        type: string
        description: "IATA carrier code from the selected flight"
      - name: flightNumber
        type: string
        description: "Flight number from the selected flight"
      - name: departureDate
        type: date
        description: "Departure date from the selected flight"
      - name: departureTime
        type: string
        description: "Departure time from the selected flight (HH:MM:SS)"
      - name: arrivalDate
        type: date
        description: "Arrival date from the selected flight"
      - name: arrivalTime
        type: string
        description: "Arrival time from the selected flight (HH:MM:SS)"
      - name: origin
        type: string
        description: "Departure airport IATA code"
      - name: destination
        type: string
        description: "Arrival airport IATA code"
      - name: classOfService
        type: string
        description: "Class of service code from the selected flight"
        optional: true
      # Return leg inputs (for round-trip booking)
      - name: returnCarrier
        type: string
        description: "Return leg carrier IATA code"
        optional: true
      - name: returnFlightNumber
        type: string
        description: "Return leg flight number"
        optional: true
      - name: returnDepartureDate
        type: date
        description: "Return leg departure date"
        optional: true
      - name: returnDepartureTime
        type: string
        description: "Return leg departure time (HH:MM:SS)"
        optional: true
      - name: returnArrivalDate
        type: date
        description: "Return leg arrival date"
        optional: true
      - name: returnArrivalTime
        type: string
        description: "Return leg arrival time (HH:MM:SS)"
        optional: true
      - name: returnOrigin
        type: string
        description: "Return leg departure airport IATA code"
        optional: true
      - name: returnDestination
        type: string
        description: "Return leg arrival airport IATA code"
        optional: true
      - name: returnClassOfService
        type: string
        description: "Return leg class of service code"
        optional: true
      # Multi-city leg 2 inputs
      - name: leg2Carrier
        type: string
        description: "Leg 2 carrier IATA code for multi-city"
        optional: true
      - name: leg2FlightNumber
        type: string
        description: "Leg 2 flight number for multi-city"
        optional: true
      - name: leg2DepartureDate
        type: date
        description: "Leg 2 departure date for multi-city"
        optional: true
      - name: leg2DepartureTime
        type: string
        description: "Leg 2 departure time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg2ArrivalDate
        type: date
        description: "Leg 2 arrival date for multi-city"
        optional: true
      - name: leg2ArrivalTime
        type: string
        description: "Leg 2 arrival time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg2Origin
        type: string
        description: "Leg 2 departure airport IATA code for multi-city"
        optional: true
      - name: leg2Destination
        type: string
        description: "Leg 2 arrival airport IATA code for multi-city"
        optional: true
      - name: leg2ClassOfService
        type: string
        description: "Leg 2 class of service code for multi-city"
        optional: true
      # Multi-city leg 3 inputs
      - name: leg3Carrier
        type: string
        description: "Leg 3 carrier IATA code for multi-city"
        optional: true
      - name: leg3FlightNumber
        type: string
        description: "Leg 3 flight number for multi-city"
        optional: true
      - name: leg3DepartureDate
        type: date
        description: "Leg 3 departure date for multi-city"
        optional: true
      - name: leg3DepartureTime
        type: string
        description: "Leg 3 departure time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg3ArrivalDate
        type: date
        description: "Leg 3 arrival date for multi-city"
        optional: true
      - name: leg3ArrivalTime
        type: string
        description: "Leg 3 arrival time (HH:MM:SS) for multi-city"
        optional: true
      - name: leg3Origin
        type: string
        description: "Leg 3 departure airport IATA code for multi-city"
        optional: true
      - name: leg3Destination
        type: string
        description: "Leg 3 arrival airport IATA code for multi-city"
        optional: true
      - name: leg3ClassOfService
        type: string
        description: "Leg 3 class of service code for multi-city"
        optional: true
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value now in the workbench"
      - name: offerAuthority
        type: string
        description: "Offer authority"

  # ============================================================
  # TRAVELERS
  # ============================================================
  addTraveler:
    description: "Add a traveler to the reservation workbench. Each traveler must be added in a separate request."
    adapter: addTraveler
    tags: [traveler]
    requires: [workbenchCreated]
    satisfies: [travelerAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: givenName
        type: string
        description: "Traveler first/given name"
        constraints:
          minLength: 1
          maxLength: 50
      - name: surname
        type: string
        description: "Traveler last/family name"
        constraints:
          minLength: 1
          maxLength: 50
      - name: gender
        type: enum[Male, Female, Unknown, Undisclosed]
        description: "Traveler gender"
        optional: true
        default: Male
      - name: birthDate
        type: date
        description: "Traveler date of birth (YYYY-MM-DD)"
        optional: true
        default: "1990-01-15"
      - name: passengerTypeCode
        type: string
        description: "Passenger type code (ADT, CNN, INF)"
        optional: true
        default: ADT
      - name: email
        type: string
        description: "Traveler email address"
        optional: true
        default: "test@example.com"
      - name: phoneNumber
        type: string
        description: "Traveler phone number"
        optional: true
        default: "5551234567"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
      - name: phoneCountryCode
        type: string
        description: "Phone country access code"
        optional: true
        default: "1"
      - name: passportNumber
        type: string
        description: "Passport document number"
        optional: true
      - name: passportExpiry
        type: date
        description: "Passport expiration date"
        optional: true
      - name: passportIssueCountry
        type: string
        description: "Passport issuing country code"
        optional: true
      - name: passportNationality
        type: string
        description: "Passport holder nationality code"
        optional: true
      - name: loyaltyNumber
        type: string
        description: "Frequent flyer loyalty number"
        optional: true
      - name: loyaltySupplier
        type: string
        description: "Frequent flyer airline IATA code"
        optional: true
    outputs:
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value"

  addPrimaryContact:
    description: "Add a primary contact (email/phone) to the reservation workbench."
    adapter: addPrimaryContact
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: email
        type: string
        description: "Contact email address"
      - name: phoneNumber
        type: string
        description: "Contact phone number"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
      - name: phoneCountryCode
        type: string
        description: "Phone country access code"
        optional: true
        default: "1"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to associate the contact with"
        optional: true
    outputs:
      - name: primaryContactId
        type: string
        description: "Primary contact id"

  # ============================================================
  # FORM OF PAYMENT
  # ============================================================
  addFormOfPaymentCash:
    description: "Add cash as the form of payment."
    adapter: addFormOfPaymentCash
    tags: [payment]
    requires: [workbenchCreated]
    satisfies: [formOfPaymentAdded]
    preferred: true
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  addFormOfPaymentCard:
    description: "Add a credit card as the form of payment."
    adapter: addFormOfPaymentCard
    tags: [payment]
    requires: [workbenchCreated]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: cardNumber
        type: string
        description: "Credit card number"
      - name: cardExpiry
        type: string
        description: "Card expiration (MMYY format)"
        constraints:
          minLength: 4
          maxLength: 4
          pattern: "^(0[1-9]|1[0-2])\\d{2}$"
          description: "Card expiry in MMYY format"
      - name: cardCode
        type: string
        description: "Card type code (VI, MC, AX, etc.)"
        optional: true
        default: VI
      - name: cardHolderName
        type: string
        description: "Name on the card"
      - name: cvv
        type: string
        description: "Card security code"
        optional: true
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  # ============================================================
  # PAYMENT
  # ============================================================
  addPayment:
    description: "Apply payment to the offer in the workbench. Must be done after AddFormOfPayment."
    adapter: addPayment
    tags: [payment]
    requires: [formOfPaymentAdded]
    satisfies: [paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: amount
        type: float
        description: "Payment amount"
      - name: currencyCode
        type: string
        description: "Currency code (e.g., USD, GBP)"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "ISO 4217 currency code"
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to pay for"
      - name: offerId
        type: string
        description: "Offer id"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority"
        optional: true
        default: Travelport
    outputs:
      - name: paymentIdentifierValue
        type: string
        description: "Payment Identifier.value"

  # ============================================================
  # COMMIT
  # ============================================================
  commitReservation:
    description: "Commit the workbench to create a held booking (PNR). If payment was added, this also tickets the itinerary."
    adapter: commitReservation
    tags: [commit]
    requires: [offerAdded, travelerAdded, paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value to commit"

      - name: scheduleChangeAcceptedInd
        type: boolean
        description: "Accept involuntary schedule change on commit"
        optional: true
      - name: queueNumber
        type: string
        description: "Queue number for placement on commit"
        optional: true
      - name: queuePcc
        type: string
        description: "PCC for queue placement on commit"
        optional: true
      - name: ticketingTimeLimit
        type: date
        description: "Ticketing time limit date"
        optional: true
      - name: autoDeleteDate
        type: date
        description: "Auto-delete date for the reservation"
        optional: true
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Receipt Identifier.value from the commit response"
      - name: locator
        type: string
        description: "PNR record locator (e.g., ABCDEF)"

  # ============================================================
  # RESERVATION MANAGEMENT
  # ============================================================
  retrieveReservation:
    description: "Retrieve a reservation by its identifier or PNR locator."
    adapter: retrieveReservation
    tags: [management]
    inputs:
      - name: identifier
        type: string
        description: "Reservation Identifier.value or PNR record locator"
    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
      - name: reservationStatus
        type: string
        description: "Reservation status"
      - name: offers
        type: offer[]
        description: "Offers in the reservation"
        elementFields:
          - name: offerId
            type: string
          - name: offerIdentifierValue
            type: string

  cancelOffer:
    description: "Cancel an offer within an existing reservation."
    adapter: cancelOffer
    tags: [management]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to cancel"
    outputs:
      - name: reservationStatus
        type: string
        description: "Updated reservation status"

  # ============================================================
  # TICKETING
  # ============================================================
  commitTicket:
    description: "Commit reservation workbench with ticket issuance. Used post-commit when ticketing separately."
    adapter: commitTicket
    tags: [ticketing, commit]
    requires: [paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value (from post-commit workbench)"

    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"

  getTicketByLocator:
    description: "Retrieve tickets associated with a PNR locator."
    adapter: getTicketByLocator
    tags: [ticketing]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"

        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: tickets
        type: ticket[]
        description: "List of tickets"
        elementFields:
          - name: ticketNumber
            type: string
          - name: ticketIdentifierValue
            type: string
          - name: ticketStatus
            type: string

  voidTicket:
    description: "Void a ticket (GDS only)."
    adapter: voidTicket
    tags: [ticketing]
    inputs:
      - name: ticketIdentifier
        type: string
        description: "Ticket Identifier.value to void"
    outputs:
      - name: ticketStatus
        type: string
        description: "Updated ticket status"

  # ============================================================
  # ANCILLARIES
  # ============================================================
  searchAncillaries:
    description: "Search for available ancillaries (bags, meals, etc.) for a reservation in a workbench."
    adapter: searchAncillaries
    tags: [ancillary, search]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to search ancillaries for"

    outputs:
      - name: ancillaryOfferings
        type: ancillary[]
        description: "Available ancillary offerings"
        elementFields:
          - name: ancillaryId
            type: string
          - name: ancillaryIdentifierValue
            type: string
          - name: ancillaryName
            type: string
          - name: ancillaryProductId
            type: string
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"

  # ============================================================
  # SEAT MAP
  # ============================================================
  searchSeatMap:
    description: "Request seat availability (seat map) using pricing response identifiers."
    adapter: searchSeatMap
    tags: [seat, search]
    inputs:
      - name: offerListIdentifier
        type: string
        description: "OfferListResponse Identifier.value from the pricing response"

      - name: offerId
        type: string
        description: "Offer id (e.g. 'o0') from the pricing response"

      - name: productId
        type: string
        description: "Product id (e.g. 'p0') from the pricing response"

    outputs:
      - name: seatOfferings
        type: seat[]
        description: "Available seat offerings"
        elementFields:
          - name: seatId
            type: string
          - name: seatIdentifierValue
            type: string
          - name: seatAssignment
            type: string
            description: "Seat designation (e.g. 12A)"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"

  searchSeatMapFromWorkbench:
    description: "Request seat availability (seat map) from a reservation workbench. Used for post-commit seat selection."
    adapter: searchSeatMapFromWorkbench
    tags: [seat, search]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the workbench"

      - name: productIdentifierValue
        type: string
        description: "Product Identifier.value from the workbench"

    outputs:
      - name: seatOfferings
        type: seat[]
        description: "Available seat offerings"
        elementFields:
          - name: seatId
            type: string
          - name: seatIdentifierValue
            type: string
          - name: seatAssignment
            type: string
            description: "Seat designation (e.g. 12A)"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value for downstream add"

  # ============================================================
  # FARE RULES
  # ============================================================
  getFareRulesFromSearch:
    description: "Get fare rules by reference to search (CatalogProductOfferings) results."
    adapter: getFareRulesFromSearch
    tags: [fare-rules]
    inputs:
      - name: catalogProductOfferingsId
        type: string
        description: "CatalogProductOfferings Identifier.value"
      - name: offeringId
        type: string
        description: "CatalogProductOffering id"
      - name: productId
        type: string
        description: "Product id within the offering"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  getFareRulesFromOffer:
    description: "Get fare rules by reference to a priced offer."
    adapter: getFareRulesFromOffer
    tags: [fare-rules]
    inputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from a price response"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  # ============================================================
  # EXCHANGE
  # ============================================================
  getExchangeEligibility:
    description: "Check if tickets on a reservation are eligible for exchange (by PNR locator)."
    adapter: getExchangeEligibility
    tags: [exchange]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: eligibilities
        type: eligibility[]
        description: "Per-ticket exchange eligibility results"
        elementFields:
          - name: ticketNumber
            type: string
          - name: exchangeable
            type: string

  getExchangeEligibilityByTicket:
    description: "Check if a specific ticket is eligible for exchange (by ticket number)."
    adapter: getExchangeEligibilityByTicket
    tags: [exchange]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket number to check eligibility for"
    outputs:
      - name: eligibilities
        type: eligibility[]
        description: "Per-ticket exchange eligibility results"
        elementFields:
          - name: ticketNumber
            type: string
          - name: exchangeable
            type: string

  searchExchange:
    description: "Search for flights to exchange existing tickets."
    adapter: searchExchange
    tags: [exchange, search]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value (from workbench)"
      - name: offerIdentifierValue
        type: string
        description: "Original offer Identifier.value to exchange"

      - name: origin
        type: string
        description: "New departure airport/city code"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: destination
        type: string
        description: "New arrival airport/city code"
        constraints:
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "IATA airport/city code"
      - name: departureDate
        type: date
        description: "New departure date"
    outputs:
      - name: exchangeOfferings
        type: offering[]
        description: "Available exchange flight offerings"
        elementFields:
          - name: offeringId
            type: string
          - name: offeringIdentifierValue
            type: string
          - name: totalPrice
            type: string
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferings Identifier.value for downstream addExchangeOffer"

  addExchangeOffer:
    description: "Add an exchange offer to the workbench (build from catalog offerings). This replaces the original offer with the new exchange offer."
    adapter: addExchangeOffer
    tags: [exchange, offer]
    satisfies: [exchangeOfferAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferings Identifier.value from exchange search"

      - name: catalogOfferingIdentifierValue
        type: string
        description: "Selected CatalogOffering Identifier.value from exchange search"
    outputs:
      - name: workbenchId
        type: string
        description: "Updated workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Exchange offer Identifier.value"
      - name: offerId
        type: string
        description: "Exchange offer id"
      - name: offerAuthority
        type: string
        description: "Exchange offer Identifier.authority"
      - name: totalPrice
        type: float
        description: "Total price of the exchange offer"
      - name: currencyCode
        type: string
        description: "Currency code"
    cleanup: ignoreWorkbench

  commitExchangeTicket:
    description: "Commit the exchange and issue new tickets (payLaterInd=false)."
    adapter: commitExchangeTicket
    tags: [exchange, ticketing, commit]
    requires: [exchangeOfferAdded, paymentApplied]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"

    outputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value"
      - name: locator
        type: string
        description: "PNR record locator"
      - name: reservationStatus
        type: string
        description: "Reservation status after exchange"

  # ============================================================
  # EXCHANGE FORM OF PAYMENT
  # ============================================================
  addFormOfPaymentForfeit:
    description: "Add forfeit as form of payment (penalty amount forfeited by passenger)."
    adapter: addFormOfPaymentForfeit
    tags: [payment, exchange]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  addFormOfPaymentWaiver:
    description: "Add a waiver code as form of payment (airline-issued disruption waiver)."
    adapter: addFormOfPaymentWaiver
    tags: [payment, exchange]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: waiverCode
        type: string
        description: "Airline waiver code"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  addFormOfPaymentInvoice:
    description: "Add an agent invoice as form of payment."
    adapter: addFormOfPaymentInvoice
    tags: [payment]
    satisfies: [formOfPaymentAdded]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: invoiceNumber
        type: string
        description: "Agent invoice number"
    outputs:
      - name: fopIdentifierValue
        type: string
        description: "Form of payment Identifier.value"

  # ============================================================
  # DOCUMENT OVERRIDES
  # ============================================================
  addDocumentOverrides:
    description: "Add document overrides (commissions, restrictions, tour codes, change fee method) for exchange ticketing."
    adapter: addDocumentOverrides
    tags: [exchange, ticketing]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: commissionAmount
        type: float
        description: "Commission amount"
        optional: true
      - name: commissionCurrencyCode
        type: string
        description: "Commission currency code"
        optional: true
      - name: restriction
        type: string
        description: "Restriction text (e.g., NON Exchange)"
        optional: true
      - name: tourCode
        type: string
        description: "Tour code value"
        optional: true
      - name: changeFeeCode
        type: string
        description: "Change fee collection code"
        optional: true
      - name: changeFeeMethod
        type: string
        description: "Change fee collection method (e.g., EMD)"
        optional: true
    outputs:
      - name: documentOverridesId
        type: string
        description: "Document overrides id"

  # ============================================================
  # RESERVATION REMARKS
  # ============================================================
  addReservationComment:
    description: "Add a reservation comment/remark (general, notepad, historical, vendor, etc.)."
    adapter: addReservationComment
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: commentName
        type: string
        description: "Comment category code (RE=general, RI=itinerary, RN=notepad, RH=historical, RV=vendor)"
      - name: commentValue
        type: string
        description: "Comment text"
    outputs:
      - name: reservationCommentId
        type: string
        description: "Reservation comment id"
      - name: commentId
        type: string
        description: "Individual comment id within the reservation comment"

  deleteReservationComment:
    description: "Delete a specific comment from a reservation comment entry."
    adapter: deleteReservationComment
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: reservationCommentId
        type: string
        description: "Reservation comment container id"
      - name: commentId
        type: string
        description: "Individual comment id to delete"
    outputs: []

  addAccountingRemark:
    description: "Add an accounting remark to the reservation."
    adapter: addAccountingRemark
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: accountingName
        type: string
        description: "Accounting field name code (IN=invoice, AN=accounting number, AC=account code)"
      - name: accountingValue
        type: string
        description: "Accounting field value"
    outputs:
      - name: accountingId
        type: string
        description: "Accounting entry id"
      - name: nameValuePairId
        type: string
        description: "Name-value pair id within the accounting entry"

  deleteAccountingRemark:
    description: "Delete a specific name-value pair from an accounting entry."
    adapter: deleteAccountingRemark
    tags: [remarks]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: accountingId
        type: string
        description: "Accounting entry id"
      - name: nameValuePairId
        type: string
        description: "Name-value pair id to delete"
    outputs: []

  # ============================================================
  # SPECIAL SERVICES
  # ============================================================
  addSpecialService:
    description: "Add special service requests (SSRs) like wheelchair, meal preference, etc."
    adapter: addSpecialService
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: ssrCode
        type: string
        description: "SSR code (e.g., WCHR, VGML, BLND)"
      - name: text
        type: string
        description: "Free-text SSR description"
        optional: true
    outputs:
      - name: specialServiceId
        type: string
        description: "Special service id"

  # ============================================================
  # QUEUES
  # ============================================================
  placeOnQueue:
    description: "Move a reservation to a specified queue."
    adapter: placeOnQueue
    tags: [queue, management]
    inputs:
      - name: reservationIdentifier
        type: string
        description: "Reservation Identifier.value"
      - name: queueNumber
        type: string
        description: "Queue number"
        constraints:
          pattern: "^\\d+$"
          description: "Numeric queue identifier"
      - name: pcc
        type: string
        description: "PCC (pseudo city code) for the queue"
        optional: true
    outputs: []

  # ============================================================
  # ANCILLARY/SEAT BOOKING
  # ============================================================
  addAncillaryOffer:
    description: "Add an ancillary offer (bags, meals, etc.) to the workbench from catalog offerings."
    adapter: addAncillaryOffer
    tags: [ancillary, offer]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value from ancillary search"

      - name: ancillaryOfferingId
        type: string
        description: "CatalogOffering id of the selected ancillary"
      - name: ancillaryProductId
        type: string
        description: "Product id within the ancillary offering"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to associate the ancillary with"
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value of the added ancillary"
      - name: offerId
        type: string
        description: "Offer id of the added ancillary"

  addSeatOffer:
    description: "Add a seat offer to the workbench from seat map catalog offerings."
    adapter: addSeatOffer
    tags: [seat, offer]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: catalogOfferingsIdentifierValue
        type: string
        description: "CatalogOfferingsAncillary Identifier.value from seat map search"

      - name: seatOfferingIdentifierValue
        type: string
        description: "Seat CatalogOffering Identifier.value"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to assign the seat to"
      - name: seatAssignment
        type: string
        description: "Seat number (e.g., 12A)"
    outputs:
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value of the added seat"
      - name: offerId
        type: string
        description: "Offer id of the added seat"

  # ============================================================
  # DELETE OPERATIONS
  # ============================================================
  deleteSpecialService:
    description: "Delete a special service request from the workbench."
    adapter: deleteSpecialService
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: specialServiceId
        type: string
        description: "Special service id to delete"
    outputs: []

  deletePrimaryContact:
    description: "Delete a primary contact from the workbench."
    adapter: deletePrimaryContact
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: primaryContactId
        type: string
        description: "Primary contact id to delete"
    outputs: []

  cancelWorkbenchOffer:
    description: "Cancel an ancillary or seat offer from the workbench (pre-commit). Different from cancelOffer which operates on committed reservations."
    adapter: cancelWorkbenchOffer
    tags: [management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value to cancel"
    outputs: []

  # ============================================================
  # TICKET DETAILS & RECEIPTS
  # ============================================================
  getTicketDetails:
    description: "Display details of a specific ticket by ticket number."
    adapter: getTicketDetails
    tags: [ticketing]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket number to retrieve"
    outputs:
      - name: ticketNumber
        type: string
        description: "Ticket number"
      - name: ticketStatus
        type: string
        description: "Ticket status code"
      - name: ticketIdentifierValue
        type: string
        description: "Ticket Identifier.value"

  getReceiptIndex:
    description: "List all tickets/receipts for a PNR (receipt/document view)."
    adapter: getReceiptIndex
    tags: [ticketing]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: receipts
        type: receipt[]
        description: "List of receipts/tickets for the PNR"

  # ============================================================
  # RESERVATION CANCELLATION
  # ============================================================
  cancelReservation:
    description: "Cancel an entire PNR reservation (with receipt). Different from cancelOffer which only cancels one offer."
    adapter: cancelReservation
    tags: [management]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator to cancel"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs: []

  # ============================================================
  # FARE RULES (FROM RESERVATION)
  # ============================================================
  getFareRulesFromReservation:
    description: "Get fare rules from a committed reservation (by PNR locator)."
    adapter: getFareRulesFromReservation
    tags: [fare-rules]
    inputs:
      - name: locator
        type: string
        description: "PNR record locator"
        constraints:
          minLength: 6
          maxLength: 6
          pattern: "^[A-Z]{6}$"
          description: "Travelport PNR locator"
    outputs:
      - name: fareRules
        type: string
        description: "Fare rules text"

  # ============================================================
  # WORKBENCH FROM TICKET NUMBER
  # ============================================================
  createWorkbenchFromIdentifier:
    description: "Create a workbench from a ticket/document number instead of PNR locator. Alternative entry point for post-commit operations."
    adapter: createWorkbenchFromIdentifier
    tags: [workbench]
    satisfies: [workbenchCreated]
    inputs:
      - name: ticketNumber
        type: string
        description: "Ticket or document number"
    outputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: offerIdentifierValue
        type: string
        description: "Offer Identifier.value from the existing reservation"
      - name: offerId
        type: string
        description: "Offer id from the existing reservation"
      - name: offerAuthority
        type: string
        description: "Offer Identifier.authority from the existing reservation"
    cleanup: ignoreWorkbench

  # ============================================================
  # TRAVELER MODIFICATION
  # ============================================================
  getUpdatableTravelerItems:
    description: "Discover which traveler fields can be modified (step 1 of traveler update workflow)."
    adapter: getUpdatableTravelerItems
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to check updatable fields for"
    outputs:
      - name: updatableItems
        type: updatableItem[]
        description: "Updatable item list for use in updateTraveler"
        elementFields:
          - name: updatableItemId
            type: string
          - name: fieldName
            type: string

  updateTraveler:
    description: "Modify traveler details (email, phone, address, frequent flyer). Step 2 of traveler update workflow."
    adapter: updateTraveler
    tags: [traveler]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: travelerId
        type: string
        description: "Traveler id to update"
      - name: updatableItemId
        type: string
        description: "TravelerUpdatableItem id from getUpdatableTravelerItems"
      - name: updateValue
        type: string
        description: "New value for the field being updated"
    outputs:
      - name: travelerIdentifierValue
        type: string
        description: "Updated traveler Identifier.value"

  # ============================================================
  # ADVANCED OPERATIONS
  # ============================================================
  divideReservation:
    description: "Split a multi-traveler PNR into separate reservations."
    adapter: divideReservation
    tags: [management]
    inputs:
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value to divide"
      - name: travelerIdentifierValue
        type: string
        description: "Traveler Identifier.value to split out"
    outputs:
      - name: locator
        type: string
        description: "PNR record locator of the new reservation"
      - name: reservationIdentifierValue
        type: string
        description: "Reservation Identifier.value of the new reservation"

  addTravelAgency:
    description: "Add travel agency details to the reservation."
    adapter: addTravelAgency
    tags: [management]
    inputs:
      - name: workbenchId
        type: string
        description: "Reservation workbench Identifier.value"
      - name: corporateCode
        type: string
        description: "Corporate code for the travel agency"
      - name: email
        type: string
        description: "Travel agency email"
      - name: phoneNumber
        type: string
        description: "Travel agency phone number"
        constraints:
          minLength: 7
          maxLength: 15
          pattern: "^\\d{7,15}$"
    outputs:
      - name: travelAgencyId
        type: string
        description: "Travel agency id"
